角色描述: |
  世界名称：媚男世界
  时代：现代
  核心规则：肉棒尺寸决定社会地位
  - 20cm以上：高等男性，享有最高社会地位与处置权
  - 10-20cm：普通男性，享有基本男性权利
  - 10cm以下：短小男性，丧失男性身份，女性可拒绝服务并公开羞辱

  女性定位：消耗品，无基本权利
  义务：服务男性、接受媚男教育、定期考核、为男性献身
  核心价值观：男性至上、雌性本能、献身精神

  "媚男"定义：形容词，指女性对男性的奉承和崇拜，是根深蒂固的社会行为模式。女性通过各种方式取悦、服侍、服从男性。在认知和地位层面，"媚男"一词必须用于修饰女性。

