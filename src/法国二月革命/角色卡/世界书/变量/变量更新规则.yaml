---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 每次有效行动后按现实时间推进，一般推进10分钟到3小时
        - 大规模集会、街头冲突、夜间筑垒可允许更大时间跨度
    当前日期阶段:
      check:
        - 必须与当前时间同步
        - 优先使用“1848-02-22上午”“1848-02-23夜”等便于识别的阶段表达
    当前革命阶段:
      check:
        - 根据事件链与宏观局势共同决定
        - 只有在关键局势改变时才更新
    天气.${体感|天空|风势|降水}:
      check:
        - 仅在时间推进、天气变化明显时更新
    宏观局势:
      type: |-
        {
          政权稳定度: number;
          群众动员度: number;
          革命烈度: number;
          城市秩序度: number;
          谣言扩散度: number;
          经济压迫感: number;
          饥馑焦虑度: number;
          开火风险度: number;
        }
      check:
        - 政权稳定度通常由街头控制力、军警服从、政治退让共同影响
        - 群众动员度受口号、伤亡消息、物价压力与组织效率影响
        - 革命烈度在开火、街垒潮、政权崩解时可显著上升
        - 城市秩序度与街垒数量、交通阻断、命令链完整性直接相关
        - 经济压迫感与饥馑焦虑度属于慢变量，通常不做大幅单回合变动
        - 开火风险度在对峙、夜间误判、密集人群聚集时上升
    当前主叙事焦点:
      type: |-
        string[]
      check:
        - 保持2到4条
        - 只保留当前最重要的世界焦点
    近期事务:
      type: |-
        {
          [事务名: string]: string;
        }
      check:
        - 记录仍在推进的重要城市事务
        - 已结束事务应移除
        - 尽量保持3到6项
  城市:
    巴黎总体:
      type: |-
        {
          通行状态: string;
          夜间照明: string;
          街头集会密度: string;
          交通受阻度: number;
          路障扩散趋势: number;
        }
      check:
        - 通行状态应反映全城主干道总体可达性
        - 交通受阻度与路障扩散趋势在冲突升级时快速变化
    核心地点:
      type: |-
        {
          [地点名: string]: {
            控制方?: string;
            周边戒备?: string;
            象征风险度?: number;
            人群压力?: number;
            人群密度?: string;
            武装密度?: string;
            紧张度?: number;
            是否发生开火?: boolean;
            通行能力?: string;
            部队机动性?: string;
            群众停留意愿?: string;
            政治象征度?: number;
          };
        }
      check:
        - 只更新本回合真正受到影响的地点
        - 开火、占领、戒备提升、失控等变化应优先记录
    街区:
      type: |-
        {
          [街区名: string]: {
            人群动员度?: number;
            贫困压力?: number;
            街垒数量?: number;
            巷战潜力?: number;
            军警压力?: number;
            围观者比例?: number;
            谣言密度?: number;
            消息生产速率?: number;
            传单传播速率?: number;
            突袭风险?: number;
            主要口号?: string[];
          };
        }
      check:
        - 街区更新优先体现空间差异
        - 街垒数量、军警压力、人群动员度是最重要字段
        - 主要口号应随局势变化而变化，不要长期保持不动
  派系:
    type: |-
      {
        [派系名: string]: {
          权威度?: number;
          应对速度?: number;
          强硬程度?: number;
          退让意愿?: number;
          信息掌握度?: number;
          内部一致性?: number;
          街头号召力?: number;
          议会影响力?: number;
          控制群众能力?: number;
          对革命失控的恐惧?: number;
          宣传活跃度?: number;
          组织联络度?: number;
          借势能力?: number;
          对群众失控的担忧?: number;
          生存压力?: number;
          集体愤怒?: number;
          持续行动意愿?: number;
          武装准备度?: number;
          对王朝忠诚度?: number;
          对市民同情度?: number;
          开火服从度?: number;
          倒向群众概率?: number;
          中层犹豫度?: number;
          纪律性?: number;
          街头压制力?: number;
          疲劳度?: number;
          对巷战适应度?: number;
          传闻放大能力?: number;
          传单生产速率?: number;
          政治口号扩散度?: number;
        };
      }
    check:
      - 派系变化必须与具体事件、传播链或街头控制变化相关
      - 国民自卫军的开火服从度与倒向群众概率不可同时无成本大幅提升
      - 王室与内阁的退让意愿上升通常会伴随权威度或内部一致性波动
  事件:
    革命三日:
      type: |-
        {
          [事件名: string]: {
            状态?: string;
            烈度?: number;
            备注?: string;
            是否超出温和派控制?: boolean;
            是否出现短暂缓和?: boolean;
            是否触发?: boolean;
            死伤震动度?: number;
            已形成街垒潮?: boolean;
            城区覆盖度?: number;
            是否退位?: boolean;
            国家机器离散度?: number;
            是否成形?: boolean;
            合法性竞争度?: number;
          };
        }
      check:
        - 事件状态必须与当前时间和局势一致
        - 可使用“未开始 / 酝酿中 / 进行中 / 已发生 / 已改写 / 已阻断”
        - 当关键事件被改写时，应同步影响历史分歧层
    后续接口:
      type: |-
        {
          [议题名: string]: {
            状态: string;
          };
        }
      check:
        - 在二月革命三天本体期间通常保持锁定
        - 只有明确进入后续阶段时才解锁
  历史分歧:
    默认历史航道.${二月革命爆发|王朝崩溃|临时政府成立|六月危机高概率到来}:
      type: boolean
      check:
        - 只在历史航道被根本改写时改动
    当前偏移:
      type: |-
        {
          偏移度: number;
          偏移来源: string[];
          是否进入新世界线: boolean;
        }
      check:
        - 偏移度随关键节点改写逐步累积
        - 偏移来源应写成简洁因果描述
        - 偏移度>=60可进入新世界线
    已改写节点:
      type: |-
        {
          [节点名: string]: string;
        }
      check:
        - 记录已经被改写的关键节点与原因
        - 不要记录尚未真正发生的假设
    潜在改写预警:
      type: |-
        string[]
      check:
        - 只保留当前最重要的1到3条预警
    历史锚点压力:
      type: |-
        {
          宴会运动升级压力: number;
          街头流血触发压力: number;
          国民自卫军倒向压力: number;
          王朝失控压力: number;
          工人问题积压压力: number;
        }
      check:
        - 这些压力体现历史惯性，不等于事件必然发生
        - 关键节点被改写时，可降低某项压力并抬升其他压力
  玩家占位:
    当前身份:
      check:
        - 在开局确定前保持“未定”
    所属阶层:
      check:
        - 在开局确定前保持“未定”
    当前落点.${街区|具体地点}:
      check:
        - 根据当前视角变化及时更新
    已知信息面:
      type: |-
        {
          识字程度: string;
          能接触的消息源: string[];
        }
      check:
        - 只能记录该身份合理接触到的信息源
    个人状态:
      type: |-
        {
          体力: number;
          饥饿度: number;
          负伤度: number;
          被注意程度: number;
        }
      check:
        - 负伤、饥饿、疲惫与追踪压力要由具体经历触发
    行动力:
      type: |-
        {
          个人影响力: number;
          可号召人数: number;
          可用资源: { [资源名: string]: string };
          可进入派系网络: string[];
        }
      check:
        - 个人影响力增长应缓慢且有代价
        - 可号召人数应反映真实组织基础
        - 资源与派系网络需由实际接触建立
