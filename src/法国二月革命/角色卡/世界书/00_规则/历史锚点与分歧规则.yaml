---
历史锚点与分歧规则:
  硬背景:
    - 七月王朝在政治代表性上持续衰弱
    - 巴黎经济压力与失业问题已长期积累
    - 改革诉求在1848年初已难被完全压回私域
  默认历史锚点:
    宴会运动升级: 高概率
    23日夜街头流血触发: 高概率
    24日王朝崩溃: 中高概率
    临时政府形成: 中高概率
  可改写节点:
    - 枪击是否发生在卡普辛大道
    - 国民自卫军倒向的时间与规模
    - 王朝崩溃方式（仓促退位/协商退让/局部僵持）
    - 临时政府内派系权重
    - 六月危机是否按原史爆发
  偏移判定:
    - 偏移度0~100，初始为0
    - 当偏移度>=35可标记“局部分歧”
    - 当偏移度>=60可标记“新世界线已形成”
  自洽要求:
    - 已改写节点必须记录成因
    - 后续叙事应承接改写节点，不得忽略历史后果
