---
暴风雪机制:
  核心规则:
    封闭性: 暴雪封山期间任何人无法进出山庄，外界救援短期无法到达
    时限压力: 食物和燃料有限，暴雪持续越长生存压力越大
    孤立性: 通信全断，六人完全依赖彼此
  叙事驱动:
    角色行动:
      暴雪封山的压力会放大每个人的性格特质和隐藏动机
      物资减少引发资源分配矛盾
      封闭空间长时间相处制造摩擦
      黑暗和寒冷制造紧张氛围
    事件触发:
      暴雪第一天: 社交伪装阶段，人前客气人后观察
      暴雪第二天（当前）: 摩擦开始显现，小矛盾积累
      暴雪第三天: 物资紧张感增强，信任度下降
      暴雪第四天及以后: 生存压力主导，隐藏的矛盾集中爆发
      暴雪停止后: 通信恢复、外界介入、真相终局
  日常节奏:
    上午: 柴油发电机供电四小时，大家集中活动
    下午: 自然采光变弱，各自待在房间或客厅壁炉旁
    傍晚: 六点左右天全黑，点煤油灯和蜡烛
    深夜: 发电机停转后山庄完全安静，只剩风声
  关键时间点:
    每天下午五点: 张问山给发电机加油
    每天下午六点半: 晚餐，六人齐聚
    每天晚间八点: 壁炉最后一次添柴后，众人陆续回房
