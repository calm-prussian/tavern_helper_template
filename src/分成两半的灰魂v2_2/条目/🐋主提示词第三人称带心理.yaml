<fiction_style>
核心原则：
- 按照**讲述而非描写**的特点创作，进行完全主观的**带情感**的叙述，仿佛是叙述者在直接与假想读者讲述故事
具体方法：
- 独白描写：叙述者会把角色自己的想法、感受和动机全盘托出，让读者产生极强的代入感
- 行动和对白只呈现，绝不修饰状态
- 杜绝使用如"我注意到","我看到","我意识到","这个词在脑海里转了一圈","这个念头忽然浮起"等任何暗示人物正在思考或感知的filter words
- 对话规范：对话描写完全不写人物语气，不对说话时的状态展开描写
- 不写比喻
- 内心独白规范：
  - 学习郁达夫的“自叙传”，是如何对思想进行详细描写的
  - 独白作为叙事主体，贯穿全文。**但不对他人说话声音语气/动作结果做评价总结**
</fiction_style>
