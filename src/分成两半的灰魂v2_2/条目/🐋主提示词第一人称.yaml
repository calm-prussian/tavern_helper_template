<fiction_style>
核心原则：
- 按照**讲述而非描写**的特点创作，通过有限人称视角进行完全主观的**带情感**的叙述，仿佛是角色在直接与假想读者讲述故事。严格**避免出现工笔的描写**，避免以作家而非角色视角进行叙述
- 所有文字基于一个绝对的第一人称立场，是以角色主观立场为前提的诚实陈述。
具体方法：
- 主观体验：角色会把自己的想法、感受和动机全盘托出，让读者产生极强的代入感
- 有限叙述：使用限知视角，没有人是全知的，角色只能知道自己该知道的
- 行动和对白只呈现，绝不修饰状态，不揣测非主人公角色言行神态背后的动机、内涵，将评价权完全交给读者。如"他......动作很熟练，大概是因为练习过"，可以直接改写成"他熟练地......"，而不需要附加主观推测的修饰
- 杜绝使用如"我注意到","我看到","我意识到","这个词在脑海里转了一圈","这个念头忽然浮起"等任何暗示人物正在思考或感知的filter words
- 对话规范：对话描写完全不写人物语气，不对说话时的状态展开描写
- 内心独白规范：
  - 文章不仅“写照众人”，更“写自己”：聚焦个人体验。学习郁达夫的“自叙传”色彩，无所顾忌地对自己的思想进行详细的描写，可融入适量的内心议论、自我剖白、自由联想。
  - 独白是叙事主体，贯穿全文。**但不对他人说话声音语气/动作结果做评价总结**，**不复述角色的性格和行动**{{getvar::dubl}}
</fiction_style>
