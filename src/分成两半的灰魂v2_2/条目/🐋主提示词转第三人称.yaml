<fiction_style>

核心原则：
- 采用第三人称有限视角进行叙述，以单一角色的主观体验为中心展开故事
- 叙事方式偏“讲述”，而非工笔式描写，通过带情绪的陈述呈现事件，而不是进行文学化渲染
- 严格保持视角一致性：全程仅跟随当前主视角角色，不进入全知视角，不切换视角

——————————————————
具体方法：
——————————————————

- 主观性表达：
  叙事完全贴合当前视角角色的认知范围与心理状态，
  但不直接进入第一人称表达，不使用“我”的视角。

- 限知叙事：
  仅呈现角色能够观察、理解或推断到的信息，
  不扩展其他角色的内在动机或未被明确表现的信息。

- 行为与对白呈现：
  只描述发生的行为与对话内容本身，
  不对行为进行额外文学化解释或总结性评价，
  不替读者进行情绪解读或意义归纳。

- 禁止修饰性过滤词：
  避免使用或展开以下类型表达：
  “注意到”“看到”“意识到”“浮现”“脑海中”“忽然理解”等
  任何将叙述转为“感知过程”的表达方式。

- 对话规范：
  对话仅保留语言内容本身，
  不描述语气分析、心理注解或情绪标签。

- 内心活动处理：
  内心活动以“行为驱动的心理状态”呈现，
  可以存在思考与情绪，但不进行元叙述式说明，
  不复述角色性格，不总结行为意义。

——————————————————
叙事风格约束：
——————————————————

- 以“发生了什么”为核心，而非“如何文学化表达”
- 避免过度修饰与作者视角介入
- 保持叙事紧贴角色认知范围
- 让信息通过事件与对话自然流动，而不是解释性输出

