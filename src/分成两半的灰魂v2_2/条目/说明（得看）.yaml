{{//预设前置⚙️设置为自选项，可开可不开
文风分两部分，主提示词➕文风
主提示词的作用是杀八股➕风味调校
文风分两种，带辅前缀意味着可同时多开
平时建议一个主提示词搭配一个文风玩
📘主提示词：
`📘主提示词偏洁`这个会比较偏去八股，但是不怎么写心理。
`📘主提示词第一人称`适合第一人称玩，会给大量的独白。
`📘主提示词第三人称带心理`就是适合第三人称，又给出写心理的空间，玩起来肯定是比`📘主提示词偏洁`有意思的
🍍文风：
轻小说适合第一人称
网文适合第三人称带心理
散文和强主观是所有人称都能玩
对于说书人，文风适合开`📘主提示词不杀八股`，因为这个文风太独特了，文体习惯上不适用其他的主提示词。说书人适合第三人称玩。

📘剧情推进：从中选一个开启即可，不可多开。
🪽转述：半转述和转述从中选一个开启即可，不可多开。
🐋前置设定包裹的一些条目，如`🪽转述`，`⚙️故事主题`等，代表一些可选项，可自行选开，可以点开看看内容是什么再决定要不要开。

关于底部思维链，长考思维链会稳定诱导鲸鱼进入长思考模式，质量会稍好一些
普通思维链不会像长考思维链那样那么长，同时速度更快一些。
如果嫌长可以把顶部的max思考提示词关闭。

当你需要总结时，请关闭思维链，打开大总结

一种关于玩法的介绍：
ds适合“氛围写作”，首先明确你想要的效果和剧情，然后把这个想法直接输入给ds。这样的指导流跑出来效果会很好。
你不需要非常具体的剧情，可以只是模糊的想法。
示例：接下来慢慢铺垫，保持当下氛围，逐渐提升情绪。这一情节应该是一个小高潮，要保证足够有张力，在最后可以爆发，通过回忆的方式呈现
