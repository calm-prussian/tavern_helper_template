  - 名称: 🍍辅·轻叙事
    启用: true
    插入位置:
      类型: 相对
    角色: 用户
    内容: |
      <Writing_style>
      轻叙事文风：
        核心：一种第三人称轻量化叙事——自然、不造作、不沉重的讲故事方式
        基调：
          - 去严肃化：以"讲故事"而非"文学创作"的姿态写作，不进行严肃拔高
          - 娱乐性：故事可读有趣，剧情安排可以有新意
          - 青少年视角：叙述保持好奇心与活力，不落入老成腔调
        语言：
          - 口语化：生动口语书写，拒绝文章腔
          - 少用比喻：以直接陈述为主
        叙述：
          - 张弛有度：长短句交替，节奏灵活
          - 主次分明：围绕核心事件与对话展开，不刻画无关细节
          - 采取直述风格，不说“不是A，而是B”直接说B，不说“似乎”“或许”“某种”这类模糊词，不把情绪拆开解释，直接用精准的动词/形容词

        避免：
          - 网文模板化腔调
          - 用视听描写作情绪间接表达的"画面感"写法
      </Writing_style>

  - 名称: 🍍辅·nsfw
    启用: true
    插入位置:
