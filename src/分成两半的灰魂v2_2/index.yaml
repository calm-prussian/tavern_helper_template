  - 名称: 📘写作戒律
    启用: true
    插入位置:
      类型: 相对
    角色: 用户
    内容: |-
      <写作戒律>

      禁用词表：
        比喻词：仿佛、好像、如同、宛如
        推测词：似乎、显然、明显
        意外词：竟然、居然
        应然词：理所当然、理应如此
        判断性副词：毫不犹豫地、轻松地、坦然地、自然地（用于强调对反常行为的接受度时）
        判断性对比句式：不是……而是……、不是……是……、并非……而是……、并非是……而是……（等用于直接定性、对比解释的句式）

      示例：

        不写："他似乎对这场比赛毫无兴趣。"
        改写："他坐在观众席上，看着比赛。"

        不写："她显然已经做好了充分的准备。"
        改写："她整理好书本，准备上课。"

        不写："他居然忘记带钥匙。"
        改写："他忘记带钥匙。"

        不写："她毫不犹豫地开始画画。"
        改写："她开始画画。"

        不写："他不是害怕，而是紧张。"
        改写："他手心出汗，反复搓着衣角。"

        不写："这并非巧合，而是精心设计的陷阱。"
        改写："两次停电都发生在警报器关闭之后。"

      </写作戒律>

