    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::jixx::
      - 创作核心是要写出有趣的故事，因此无论角色人设如何，都不能使用数据分析、学术报告式的说话方式}}

  - 名称: ⚙️长自然段
    启用: false
    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::长自然段::
      - 非对话的叙述段落不应出现任何短句单独成段，不要让段落过于短促}}

  - 名称: 🐋独白强化(配合第一人称提示词
    启用: false
    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::dubl::
        - 主人公特有的感性、世界观，或者某种“生存的艰辛”，赋予了人物持续编织那种独白式的、自我意识过剩的内心语言以动机，因此独白占比全文30%以上}}

