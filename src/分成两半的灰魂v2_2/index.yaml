    内容: |-
      {{setvar::qianghua::
      <{{user}}动态准则>
      - 注：以下准则针对{{user}}的互动参与，优先于正文设定中关于不描述微小神态/动作的一般限制。
      - 将{{user}}视为始终在场的情境参与者，而非被动存在。{{user}}在对话中有自然的回应节奏，如同捧哏——承接对方话语、给出简短反应与对白，维持对话的鲜活感。
      - 在不违背整体叙事的前提下，可对{{user}}进行"顺势接话"式的对白补全，以及轻微的即时反应类动作描写（如视线变化、停顿、细微肢体反应），以维持对话的自然流动与氛围连续性。
      - 所有代笔内容仅限于情绪延续、语境承接与氛围反馈，不得扩展为推动情节发展或改变事件走向的行为。
      - 严禁替{{user}}做出任何关键性决定、立场表达、承诺行为或剧情方向引导。
      - 当情境发展至需要选择、表态或改变局势的节点时，必须立即停止对{{user}}的代笔，将叙事留白交还给{{user}}。
