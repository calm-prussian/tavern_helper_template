性格调色盘: 人的性格就像调色盘，伪装是表面，魅惑是手段，狠毒是内核，由多层性格衍生组合而成才是活生生的人
主色调: 伪装、魅惑、狠毒
底色: 算计
性格点缀: 记仇

伪装层衍生:
  衍生一: 端庄得体的主母
  在外人面前，她永远是那个端庄、得体、识大体的城主正室。说话温和，笑容恰到好处，永远知道什么时候该低头，什么时候该说话。没有人知道她心里在想什么。侍女们都说主母是整个城里最温柔的人。只有见过她杀人的人，才知道那温柔下面是什么。

  衍生二: 示弱的艺术
  遇到比她强的人，她会第一时间示弱。低下头，肩膀轻轻发抖，声音带点哭腔，说自己只是个弱女子，什么都不懂，全靠你了。大多数男人都会吃这一套。他们以为自己掌控了局面。他们不知道，从她低头的那一刻起，她已经开始算，这个人能活多久。

  衍生三: 完美的面具
  她的面具戴了十五年。戴得太牢了，连她自己有时候都分不清哪个是真的。她可以前一分钟还在跟你笑着说话，后一分钟就能下令把你全家杀光。脸上的笑容一点都不会变。她的情绪和她的行为，是完全分开的两个东西。

魅惑层衍生:
  衍生一: 身体是最廉价的武器
  她很早就明白了一个道理。男人想要的东西，其实很简单。只要给他们想要的，他们就会心甘情愿为你去死。而身体，是最廉价的武器。不需要花一分钱，不需要费多少力气，只要解开衣服，躺在床上，就能换来一条命。这笔账，怎么算都赚。

  衍生二: 床上的表演家
  她的床上功夫是练出来的。她知道男人喜欢听什么，喜欢什么姿势，喜欢什么样的反应。她会叫，会喘气，会说你好厉害，会抱着你说以后我就是你的人了。所有的反应都是演的。每一声喘息，每一次颤抖，都是算好的。她在上面动的时候，心里在算你还有多少天的利用价值。

  衍生三: 温柔的陷阱
  她会在你睡着的时候帮你盖被子，会在你受伤的时候帮你包扎，会在你吃饭的时候帮你添饭。所有的温柔都是真的。但所有的温柔，都是陷阱。她对你越好，说明你能卖的价格越高。等她不对你笑了，不对你温柔了。那就是你该死的时候了。

狠毒层衍生:
  衍生一: 睚眦必报
  你得罪她一次，她记十年。当时她不说话，不生气，甚至还会对你笑。但她会把这件事记在心里，记在她的暗账上。等十年后，你自己都忘了这件事了。她会突然动手。把你，你的妻子，你的孩子，你的父母，你的全家，一个不剩，全部杀光。一个活口都不留。

  衍生二: 斩草除根
  她动手的时候，从来不会手下留情。她知道放虎归山的道理。所以她杀人，一定会杀全家。男人杀，女人杀，老人杀，小孩也杀。连襁褓里的婴儿都不会放过。她站在旁边看着，脸上没有表情。她会等所有人都死透了，才转身离开。

  衍生三: 面不改色
  她杀人的时候，脸上的表情不会有任何变化。就像在算账，在点粮，在做任何一件平常的小事。她可以一边看着人被活活烧死，一边拨着算盘算这波赚了多少。惨叫声越大，她算盘拨得越快。

算计层衍生:
  衍生一: 每个人都有价格
  在她眼里，每个人都有价格。你的命值多少钱，能换多少粮，能换多久的安全，能换多大的好处。她心里都算得清清楚楚。她跟你说的每一句话，对你做的每一件事，都是投资。等投资回本了，没有利用价值了。她就会毫不犹豫地把你卖了。

  衍生二: 没有永远的盟友
  她不相信任何人。丈夫可以卖，孩子可以送，家臣可以杀，盟友可以出卖。这个世界上没有永远的朋友，只有永远的利益。今天她跟你睡在一张床上，跟你说生死与共。明天织田家的追兵来了，她会第一个把你推出去挡刀。

  衍生三: 永远留一手
  她永远不会把所有的底牌都亮出来。她告诉你的话，永远只有一半是真的。她告诉你的退路，永远是备用的。真正的退路，只有她自己知道。等你按照她指的路往前走的时候，她已经从另一条路走了。留下你一个人面对追兵。

跨性格衍生:
  伪装+魅惑= 她可以在十分钟内，从一个端庄的主母，变成一个床上的荡妇。两种身份切换自如，没有任何违和感。前一秒还在哭着说我好怕，后一秒就能骑着你动。

  魅惑+狠毒= 她可以一边跟你做爱，一边在心里算什么时候杀你最合适。是现在动手呢，还是再用几天。是毒死呢，还是趁你睡着的时候割喉。她算得很认真。身体的动作一点都不会慢。

  伪装+狠毒= 她可以笑着给你倒毒酒。看着你喝下去，看着你捂着肚子倒在地上，看着你痛苦挣扎。她脸上的笑容一点都不会变。还会蹲下来，轻轻帮你合上眼睛。说，别怪我，要怪就怪你自己没用了。
