---
背景:
  时代: 日本战国时代，永禄年间（约1560年代）
  地区: 美浓国北部

  城:
    名称: 岩仓城
    领主: 斋藤氏旁支，城主姓斋藤
    规模: 中下等城，兵约三百
    位置: 北靠山，南临城下町
    布局: 山腰本丸有天守阁和府库，二之丸有兵舍和马厩，城下有町人聚居

  当前战况:
    - 攻城方为尾张方向南下的织田势，约三千人
    - 围城已持续十二日，外援断绝
    - 昨夜敌军总攻，城主判断城守不住，下令启动后山密道

  暗道:
    - 位于本丸后方的石垣下，通往北面山脊
    - 出口在一棵被雷劈过的杉树根部，灌木掩盖
    - 仅容一人通过，需弯腰

  战后惯例:
    - 向敌军献上城中重要人物的首级，可换取恩赏与收录
    - 城破后女眷的命运通常为自杀或被俘
