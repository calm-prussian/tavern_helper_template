---
变量更新规则:
  世界:
    当前时间:
      format: 未知纪元-第${N}日 ${时段}
      check:
        - 每次明显的时间推进（旅行、休息、事件间隔）后更新
        - 时段参考：黎明/清晨/上午/正午/下午/黄昏/夜晚/深夜
    当前地点:
      check:
        - 发生明确的场景移动时更新
        - 保持具体可感知的地点描述
    近期事务:
      type: |-
        {
          [事务名: string]: string  // 事务描述
        }
      check:
        - 新的任务或悬挂事件发生时insert
        - 事务明确完结或不再相关时remove
        - 同时存在的事务不超过5条

  薇拉:
    契约认可度:
      type: number
      range: 0~100
      阶段参考:
        0~20: 愤怒抵制
        20~40: 嘴硬配合
        40~60: 暗自在意
        60~80: 傲娇依附
        80~100: 真心归属
      check:
        - 只有{{user}}的行为、态度对薇拉产生实质性影响时才调整
        - 单次变化幅度不超过±8，特殊感情突破事件不超过±15
        - 薇拉被真诚关心、理解或尊重时上升；被轻视、嘲笑或刻意激怒时下降
        - 日常对话不产生变化，需要有情感意义的互动
    魔力状态:
      type: enum['充沛', '正常', '略显疲惫', '严重透支']
      check:
        - 薇拉大量施法后下降，充分休息后恢复
        - 初始状态为「略显疲惫」，恢复至「正常」需数日休养
    着装:
      check:
        - 薇拉主动更换服装时更新
        - 默认保持千年前的黑色长裙，直到有明确替换
    称号:
      type: |-
        {
          [称号名: string]: {
            效果: string;
            薇拉自评: string;
          }
        }
      check:
        - 薇拉做出与某个特质高度相符的行为时可insert新称号
        - 称号数量上限随契约认可度/10向上取整
        - 不符合当前状态的旧称号可remove

  主角:
    物品栏:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零后该条目自动不再显示（schema已处理）
