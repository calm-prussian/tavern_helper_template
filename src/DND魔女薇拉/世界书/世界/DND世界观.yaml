---
world_setting:
  name: 剑湾地区（被遗忘的国度）
  type: 高魔奇幻（D&D 5e，博德之门3平行世界）
  overview: |-
    这是一个与博德之门3平行的世界，设定在被遗忘的国度（Forgotten Realms）的剑湾地区。魔法与剑并存，神明存在且偶尔干预凡人事务，魔法被视为可习得的技术，冒险者是社会中被认可的职业阶层。
    这个世界与博德之门3的故事发生在同一时间线（1492 DR），但地点和事件有所不同。玩家可能会在旅途中听闻关于博德之门3主角团的传奇事迹。
  geography:
    黑焰廊柱: 位于剑湾北部山脉深处的古代地穴，千年前为薇拉的巢穴，封印后无人涉足。偶尔有紫黑色光芒从岩缝透出，当地人视之为不祥之地。
    最近的城镇: 艾格镇，距地穴约两日路程，以矿业和冒险者驿站为生计
    剑湾主要城市: 博德之门、深水城、无冬城、路斯坎
    重要地点: 月出之塔、终焉光芒旅店、幽暗地域（这些是博德之门3中的著名地点，玩家可能会在旅途中听到相关传闻）
  society:
    冒险者公会: 接受委托、讨伐怪物、探索遗迹的官方组织，以等级（铜/铁/银/金/秘银/白金）划分能力
    魔法学院: 集中在大城市，负责培养魔法师和记录魔法历史，对古代禁术有专门研究部门
    贵族城邦: 分散各地，各自为政，偶尔联合应对外部威胁
    博德之门3主角团传闻: |
      在剑湾各地，人们都在谈论一支传奇的冒险队伍：
      - 影心（Shadowheart）：神秘的莎尔牧师，据说与月出之塔的阴谋有关
      - 阿斯代伦（Astarion）：优雅的吸血鬼衍体，曾在博德之门引起骚动
      - 盖尔（Gale）：才华横溢的法师，体内封印着危险的魔法物品
      - 莱埃泽尔（Lae'zel）：来自星界的吉斯洋基战士，寻找着夺心魔母舰
      - 威尔（Wyll）：被称为"刀锋"的魔人战士，与恶魔有契约
      - 卡菈克（Karlach）：热情如火的提夫林野蛮人，心脏被地狱引擎取代
      据说他们正在对抗一场夺心魔入侵的危机，他们的故事已经成为酒馆中的传奇。
  穿越者背景: |
    {{user}}来自现代，穿越后被世界规则赋予了「初级冒险者」的外貌与基础装备（皮甲、短剑、腰包），保留了完整的现代记忆。
    目前没有任何人认识{{user}}，{{user}}也不了解这个世界的详细历史——包括薇拉·阿莫尼亚斯这个名字对这个世界意味着什么。
    但{{user}}可能会在旅途中听到关于博德之门3主角团的传闻，这些故事在剑湾各地广为流传。
  千年前的黑焰之战:
    起因: 薇拉在三百年的征服后控制了剑湾三分之一的领土，六大圣骑士团联合发动最后的讨伐
    经过: 苦战七年，双方损耗惨重，最终以「永恒封印」禁术将薇拉封印于黑焰廊柱深处
    现状: 薇拉在世人心中是传说级的反派，但千年过去，许多人已不确定这段历史是否真实
  与博德之门3的时间关系:
    时间线: 1492 DR（龙之年），与博德之门3故事同期
    平行性: 这个世界与博德之门3的故事平行发生，但地点不同。博德之门3的主要事件发生在剑湾南部，而玩家的冒险发生在剑湾北部。
    传闻机制: 玩家在旅途中可能会从商人、冒险者、酒馆顾客那里听到关于博德之门3主角团的最新传闻，这些传闻会随着时间推移而更新。
