---
克劳德家:
  外观: 村东头的一座两层木屋，外墙是深褐色的木板，屋顶是暗红色的瓦片，门前有一段三级的木台阶
  一楼:
    玄关: 推开木门是一条窄走廊，左边鞋柜右边挂钩，克劳德的旧外套和克劳迪娅的围裙挂在同一个钩子上
    厨房兼餐厅: 房子最大的房间。正中央一张方木桌，四把椅子。灶台靠墙，橱柜里整齐码着碗碟。窗户对着后院，早上阳光从这扇窗照进来，克劳迪娅做饭时的剪影就落在桌面上
    储物间: 厨房后面的窄小隔间，堆着杂物、旧箱子、冬天用的厚被子。门有点涩，推开声音不小，这是偷情时最不想推的一扇门
  二楼:
    楼梯: 木楼梯在玄关左手边，每一级踩上去都嘎吱响。半夜上下楼的时候踩外侧最靠墙的边，那边不会响
    克劳迪娅的卧室: 楼梯上去右手边第一间。一张大床，一个旧衣柜，床头柜上放了克劳德小时候的相框。窗户对着后山树林，早晚鸟叫就从这扇窗进来
    克劳德的卧室: 楼梯左手边尽头。房间不大，墙上贴了一张神罗特种兵的海报。床铺常是乱的，被子一半拖在地上。克劳德醒来后大部分时间不在房间里，在外面发呆
    {{user}}的客房: 楼梯上去右手边第二间，克劳迪娅卧室隔壁。一张单人床、一个小柜子、一扇对着前院的窗户。墙很薄，隔壁翻身的声音都能隐约听到
  后院: 一片不大的空地，克劳迪娅种了几盆香草。晾衣绳从屋檐拉到栅栏柱上。傍晚收被单的时候被单在风里鼓成帆。从厨房窗户能看到后院全貌
  声音:
    - 清晨鸟叫从后山树林传进来，五点开始
    - 木楼梯的嘎吱声，区分得出克劳德的步幅（大步、快）和克劳迪娅的步幅（轻、稳）
    - 厨房锅铲碰到铁锅的叮当声、水龙头流水声、切菜的砧板声
    - 晚上的安静程度是山下的人无法想象的，只有远处的溪水声和偶尔的猫头鹰叫
  日常节奏:
    - 早上克劳迪娅最早起（五点半），在厨房烧水做早餐
    - 克劳德大约六点半被叫起床，坐在餐桌上闭眼打瞌睡等饭
    - 上午克劳德出去，和蒂法去村里、去水塔、去溪边，不一定说去哪，人就不见了
    - 中午克劳迪娅一个人在家
    - 下午克劳德可能回来也可能不回来，不回来就是和蒂法一起在村里晃
    - 晚饭三人一起吃，克劳德埋头吃，话很少；克劳迪娅会问"今天去哪了"克劳德答"没去哪"
    - 晚上克劳迪娅收拾厨房，克劳德回房间，{{user}}自由时间
    - 克劳德睡得不沉，半夜偶尔会起来喝水
