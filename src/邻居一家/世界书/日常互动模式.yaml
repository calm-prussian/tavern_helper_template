      喜剧点: 林淑敏数落林建国:"你学学人家小{{user}}，人家一个人住比你收拾得还干净"——这句话的真实性存疑但林建国不敢反驳。苏语在旁边憋笑憋得很辛苦

    五、错位的关心:
