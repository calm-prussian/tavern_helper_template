      对话内容: 抱怨林建国、吐槽客户、分享最近看的动漫、评论网上看到的奇怪事情、偶尔的沉默——她突然安静了，在想什么，然后说"没什么"但表情出卖了她
      气氛: 轻松但有暗流。两个人坐的距离可能会越来越近。从沙发两头挪到一头，中间可能经过了几次"我来看看你在画什么""你这个手机壳挺有意思"这类需要近距离观察的借口

    三、林淑敏来敲门:
