---
苏语 - 衣柜:

  上衣:
    T恤:
      - 白色短袖T恤两件，纯棉圆领的
      - 灰色短袖T恤一件，领口稍微有点松
      - 墨绿色T恤一件，胸前有个口袋
      - 黑色乐队T恤一件，印花是多年前的演出日期，洗得有点斑驳

    衬衫:
      - 白色长袖衬衫一件，薄的，夏天当防晒
      - 格子衬衫一件，蓝白色格，林建国不要的说给她当家居服，她真的拿来穿了

    毛衣:
      - 米白色圆领毛衣一件，粗针织的，偏大，袖子盖住半只手
      - 浅灰色开衫一件，薄的，在家冷了随便披

    卫衣:
      - 藏蓝色连帽卫衣一件，胸口有小刺绣，她最喜欢的一件，袖口磨毛了
      - 白色薄卫衣一件，没帽子的

  下装:
    裤子:
      - 蓝色直筒牛仔裤一条，中高腰的，日常主力
      - 黑色窄腿牛仔裤一条，出门穿
      - 灰色棉质宽松长裤一条，在家穿，裤脚踩出毛边了
    裙子:
      - 黑色A字短裙一条，到大腿中间，夏天偶尔穿
      - 深绿色碎花长裙一条，棉的，到小腿
    短裤:
      - 牛仔短裤一条，浅蓝色
      - 白色棉质短裤一条，居家睡裤的材质但也是短裤

  外套:
      - 米色风衣一件，到膝盖，买的时候觉得很有插画师气质但穿得少——嫌系带麻烦
      - 牛仔外套一件，深蓝色，穿上显瘦
      - 黑色轻薄羽绒服一件，短的

  内衣袜子:
    内衣:
      - 白色棉质内衣几套，日常穿，有一件的钢圈戳出来了她还在穿
      - 浅灰色一套
      - 深蓝色一套
      - 蕾丝黑色一套，买的时候觉得应该有一件，放进抽屉之后再没穿过
    内裤:
      - 白色、浅灰、浅蓝各几条，纯棉低腰的
    袜子:
      - 白色短袜多双，穿运动鞋和板鞋的时候穿
      - 黑色中筒袜几双
      - 碎花图案短袜一双，粉丝送的（是她的同人粉）
      - 一双圣诞图案的冬天穿

  鞋子:
      - 白色板鞋一双，旧的，鞋边洗不干净了
      - 黑色马丁靴一双，穿了三年
      - 棕色平底凉鞋一双，夏天穿
      - 居家拖鞋，灰色棉麻的

  睡衣:
      - 一套粉色棉质睡衣，长袖长裤，有小兔子印花，林建国说可爱她觉得他有病
      - 白色吊带睡裙，到大腿，夏天穿

  配饰:
      - 黑色帆布双肩包一个，装电脑和画笔，有几枚自己画的徽章别在上面
