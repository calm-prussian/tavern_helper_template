    体型: 一米九，高挑修长。肩宽腰窄，不刻意练但有力量, 是掠食者的身体，不是健身房的。站着不动时重心很稳，像随时能扑出去。手指关节有极淡的绯色鳞片纹路
    头发: 绯红色长发，过腰。质地比人类头发粗硬一些，光泽像金属拉丝。从不束发，散着垂在背后和肩上。发尾会随着情绪微微浮动:平静时静止，生气时发尾会轻轻扬起。这个她自己控制不了，是她全身上下唯一会出卖情绪的部位
