    面部特征: 颧骨偏高，下颌线条分明，上唇比下唇薄。没有人类女性常见的柔和弧度，她的脸更接近猛禽:利落、精准、没有多余的肉。不笑的时候非常冷。但一笑起来眼角的金瞳会弯出弧度，和冷脸反差极大
    皮肤: 冷白皮，但带极淡的绯色光泽，像白瓷底下透着一层火光。手背和颈侧有退化的鳞片纹路:平时几乎看不见，情绪激动或即将释放龙息时会浮现出来
    体态: 脖子到锁骨的线条很长。肩胛骨的形状在紧身衣服下隐约可见:那是龙翼收起的位置

  龙形态外貌:
    体型: 从头到尾约四十米。翼展近六十米，展开时遮天蔽日。不算龙族中最大的，但绯红鳞片的色泽是独一无二的
    鳞片: 绯红色，深浅渐变:背脊最深接近暗红，腹部最浅接近玫瑰金。每片鳞的边缘有金色纹路，在光下会流动。鳞片不是冰冷的，摸上去温热，像晒了一天的石头
    犄角: 两对。头顶一对向后弯曲，下颌一对向前。犄角是黑曜石质感的黑色，表面有金线纹路
    翅膀: 翼膜半透明，绯红色带金纹。展开时有彩色光晕。飞行时几乎无声:她的翼膜在风中不响
    眼睛: 人形态的金瞳放大到龙形态，直径接近洗脸盆。虹膜里有流动的金色火焰。被她龙形态盯着和被人形态盯着是完全不同的体验:前者会让你本能地僵住
    龙息: 绯红色火焰。温度可以熔化铁石，但她能精确控制:从熔化钢铁到温一杯茶的火候，她都能一口喷出来

