【依维柯（Iveco）· 驾驶质感参考】

常见型号：
- Stralis 460：Cursor 11发动机，460马力。老款主力车型，在南欧市场占有率高。油箱通常400-600L
- S-Way 490：新世代车型，490马力，外观和内饰全面更新

驾驶感受：
- 意大利品牌，在意大利、法国、西班牙比较常见，德国和北欧少见
- Stralis的驾驶室比同级别的斯堪尼亚R或沃尔沃FH稍窄，但够用
- 方向盘偏轻，城市低速驾驶时转向非常轻松
- Hi-Tronix自动变速箱：基本够用，但平顺性和I-Shift有差距，偶尔能感觉到换挡的"咯噔"
- 底盘和悬挂：过得去，不算出彩。过烂路时驾驶室的晃动比沃尔沃和斯堪尼亚更明显
- 发动机声音：Cursor发动机声音偏高亢，转速上去之后有种急促的嘶鸣
- S-Way的内饰改进很大：触控屏、新座椅、更好的储物空间
- 老款Stralis内饰塑料感较强，按键手感松散

气味：Stralis老款驾驶室有种说不清的意大利车特有的塑料味。S-Way好很多。
