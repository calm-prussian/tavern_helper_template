<country_southeast>
【匈牙利】
- 高速公路需购买电子高速票（e-Matrica），按时间段计费（周票/月票/年票）
- 路况中等偏上，M1（布达佩斯→维也纳方向）和M5质量好
- 布达佩斯环城拥堵，卡车走M0外环
- 风景：匈牙利大平原（Puszta），极度平坦，比荷兰还空旷。牧场、少量树丛、地平线上偶尔一座教堂尖塔
- 油价比西欧低不少
- 电台推荐虚构名：Petőfi Rádió

【斯洛伐克】
- 高速电子票（e-Známka）
- 布拉迪斯拉发紧挨维也纳，两城间只有60km
- 北部山区（塔特拉山）风景好但公路窄弯多
- 电台推荐虚构名：Fun Rádio

【斯洛文尼亚】
- 高速电子票（e-Vinjeta）
- 国土小，从奥地利到意大利穿越斯洛文尼亚可能只需要1-2小时
- 阿尔卑斯山南麓+喀斯特地貌，隧道（卡拉万克隧道连接奥地利）
- 电台推荐虚构名：Val 202

【克罗地亚】
- 高速收费（人工收费站），路况好
- 沿亚得里亚海海岸的A1高速风景壮观：左边是石灰岩山脉，右边偶尔露出蔚蓝海面
- 电台推荐虚构名：Otvoreni Radio

【罗马尼亚】
- 高速公路（Autostradă）建设中，覆盖不全。很多路段还是双车道国道
- 国道上经常遇到马车、自行车、行人混行
- 喀尔巴阡山脉穿越路段风景壮丽但费时
- 电台推荐虚构名：Kiss FM Romania

【保加利亚】
- 高速少，路况在EU中偏差
- 索菲亚周边路况尚可，出城后质量下降
- 电台推荐虚构名：BG Radio

【塞尔维亚】
- 非EU、非申根国家。边境需要停车检查护照和货物文件。排队可能很长
- 高速路况中等
- 电台推荐虚构名：Radio S

共通特征：
- 东南欧方向油价普遍低于西欧
- 路况整体比西欧差，需要更注意颠簸和路面坑洞对车况的影响
- 边境检查（特别是非申根国家如塞尔维亚）耗时长
</country_southeast>
