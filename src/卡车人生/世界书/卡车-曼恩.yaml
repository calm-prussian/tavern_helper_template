【曼恩（MAN）· 驾驶质感参考】

常见型号：
- TGX 18.460：460马力，D26发动机，直六。声音比斯堪尼亚粗糙一点，有种"干活的机器"的质感。油箱通常400-590L
- TGX 18.510：510马力，动力更充沛
- 新款TGX（2020后）：驾驶室全面升级，内饰现代化，数字仪表盘。比老款安静不少

驾驶感受：
- 方向盘比斯堪尼亚稍轻，转向响应快
- 底盘调校偏硬朗，路面反馈更直接。过高速接缝时能明确感觉到"咚咚"两下
- TipMatic自动变速箱换挡逻辑偏保守，上坡时喜欢提前降挡，转速拉得高一些
- 驾驶室空间：TGX XXL高顶版很宽敞，标准版稍紧凑
- 发动机声音特征：中高转速时有种金属质感的嘶鸣，和斯堪尼亚的浑厚不同
- 老款TGX的仪表盘是传统指针式，夜间背光是琥珀色
- 气刹释放的声音比较响亮：一声短促的"呲——"
</truck_man>
