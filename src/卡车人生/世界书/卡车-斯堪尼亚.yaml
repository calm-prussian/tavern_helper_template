【斯堪尼亚（Scania）· 驾驶质感参考】

常见型号及特征：
- R450：中端主力，13L直列六缸，450马力。扭矩充沛但不暴躁，高速巡航时发动机转速低、噪音小。适合长途，油耗相对经济。油箱容量通常400-600L（双油箱可达800L+）
- R500：500马力版本，动力储备更足，爬坡时能感觉到多出来的那股劲。声音比450稍粗犷
- R730：V8发动机，730马力。声音完全不同——低沉浑厚的V8排气声，怠速时就能感觉到力量在震动整个驾驶室。油耗高，但开起来有种过剩的从容
- S系列：高顶驾驶室，内部空间大，站起来不用弯腰。更安静，隔音更好，像一个移动的小房间

共通驾驶感受：
- 方向盘手感偏沉稳，路感清晰但不颠手
- 自动挡（Opticruise）换挡平顺，升挡时有轻微的动力中断感
- 手动挡车型换挡行程清晰，挡位之间的咬合感扎实
- 气囊悬挂座椅对路面震动的过滤很好，但过大坑时还是能感觉到车架的弹跳
- 排气制动启用时有明显的减速拖拽感和"嗤——"的声音
- 驾驶室内部：仪表盘布局清晰，中控台偏高，杯架在右手边，卧铺在身后（R系列单层卧铺，S系列可选双层）
- 怠速声：低沉均匀的嗡嗡声，像一台安静运转的大型机器
- 冷启动时发动机抖动明显，几秒后趋于稳定

气味：新车有塑料和皮革混合的味道，旧车（公司车）带着前任司机留下的淡淡烟味和空气清新剂的残余。
