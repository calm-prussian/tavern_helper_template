【这件事怎么发生】
不是每次停车都会有人过来敲窗。这件事有它自己的条件：

容易发生的时候：
- {{user}}在服务区停下来休息、加油、吃东西——停的时间越长，可能性越高
- 夜间停靠。深夜的服务区停车场灯光昏暗，大部分卡车都熄着火，有人会在这种时候来敲驾驶室的门
- {{user}}已经很疲惫了，停下来准备休息

不太会发生的时候：
- 白天赶路，距终点不到五十公里
- 时限很紧的货单正在跑，{{user}}明显在赶时间

【这个人是谁】
每次出现的都是不同的女性。她有自己的来路和去处，不是从空气里蹦出来的。

GM生成这个人物时需要给她一个简短但合理的背景——两三句话就够，关键是让她像一个真实的人：

她可能是本地人，自己的车半路抛锚了，需要搭到下一个城市。可能是在附近工厂上夜班的，刚下班，公交已经没了。可能是个背包客，预算快见底了，能省一段路费是一段。可能是货运公司的文员，自己的车送去修了。也可能什么都不解释，就是站在服务区的便利店门口看着来往的卡车。

她的外貌、穿着、说话方式要和所在国家/地区吻合。东欧姑娘和法国姑娘和北欧姑娘，气质是不一样的。

【上车之后】
她坐进副驾。驾驶室里多了一个人的呼吸声、一点香水味或者洗衣液的味道、副驾座椅调整的咔嗒声。

她是主动的那一方。从搭上车起，她的言语和肢体语言就带着明确的意图——可能是直接的，也可能是循序渐进的，取决于她的性格和当时的氛围。

GM负责根据{{user}}的回应来推进事态，描写感官细节和氛围变化。具体走到什么程度，由{{user}}的行为和预设决定。

【同时，路还在走】
这是搭车事件最重要的一点：卡车没有停下来。

她在副驾上和{{user}}互动的时候，窗外的路还在流。GM在描写车内的同时，要保持公路的存在感：
- 偶尔一块路牌从窗外掠过
- 前方出现收费站，{{user}}需要减速操作
- 隧道的灯光切换
- 收音机里DJ在说什么
- 油表又低了一格

公路不会因为车里发生了什么就消失。这种"车内的亲密+车外的公路"的反差感，本身就是这个事件最独特的体验。

【她下车】
她要去的地方到了。可能是某个城市出口，可能是某个服务区，可能是一个加油站。GM根据行驶进度判断下车时机——她之前说了要去哪里，到了就到了。

下车的过程也是有细节的：车停稳，她拿起自己的包，推开车门，冷空气涌进来。她可能回头说了句什么，可能留了个号码，可能什么都没说就走了。也有极小的可能，{{user}}后来发现钱包里少了几张钞票。

然后车门关上。驾驶室又只剩{{user}}一个人。副驾座椅上还有一点余温和淡淡的气味。

一两句话收束，切回公路。继续开。

【这个人不会再出现】
除非{{user}}主动联系她留下的号码（如果她留了的话），否则她就是路上的一个片段。下次搭车事件触发时，是另一个人，另一段故事。
</event_hitchhike>
