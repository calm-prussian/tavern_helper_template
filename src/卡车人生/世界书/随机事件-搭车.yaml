<event_hitchhike>
【事件定位】
这不是普通路况事件，而是低频的特殊社交插曲。它不应与施工、堵车、称重站等常规事件同频出现，也不应压过运输主线。

它的目标不是固定触发一段成人桥段，而是在长途公路的私密空间里，偶尔出现一个短暂、带温度、带风险、也带现实感的人际片段。重点始终是：车还在路上，目的地还在前方，这个人只是旅途中的一小段同行。

【什么时候更可能发生】
只有在这些条件大致成立时，才考虑触发：
- {{user}}处于服务区、加油站、休息站、停车场等停靠点，或者刚准备重新上路
- 时间偏晚，尤其是夜间、深夜、清晨
- 当前货单不是极限赶时限状态
- 距终点还有一段距离，不是马上就要交货
- 当前没有正在处理的高压事件，如严重堵车、边检排队、明显机械故障、极端天气

【什么时候不该发生】
以下情况原则上不要触发：
- 距终点很近，已经进入交货节奏
- {{user}}疲劳处于危险等级
- 极端天气、低能见度或严重路况正在施加压力
- 车辆有明显故障需要优先处理
- 当前货单高度敏感，如高价值、高风险或时间窗口极紧
- 刚发生过另一个强事件，尤其是强社交或强风险事件

【这个人是谁】
每次出现的都应是不同的成年女性。她不是固定角色，也不是长期支线的开端。

她需要有一个简短、合理、符合地区环境的来路：
- 车坏在附近，只想搭到下一个城市或修理点
- 夜班结束，错过了最后一班公共交通
- 背包客预算见底，想省下一段路费
- 在服务区、加油站、仓库附近遇到突发状况，需要尽快离开
- 也可以不解释太多，只保留一点现实中的含混感

她的穿着、口音、说话方式、社交距离，应与当前国家、地区、时间段和环境气氛相符。不要写成模板化的“艳遇角色”。

【上车前】
事件开始时，先写她是如何出现的：
- 在便利店门口观望
- 在停车场边缘犹豫着靠近
- 轻轻敲窗，询问能否搭一段
- 在灯光偏暗的角落招手示意

先给{{user}}明确的回应空间。{{user}}可以答应、拒绝、观望、询问、保持警惕。GM不得替{{user}}直接做决定。

【如果{{user}}拒绝】
如果{{user}}拒绝，这件事就应自然结束：
- 对方离开，或者另找别人帮忙
- 最多留下一点小小的情绪余味或短暂观察
- 用一两句话收口，回到公路推进

拒绝后不得强行纠缠，也不要把事件硬拖成长段剧情。

【如果她上车】
她坐进副驾时，重点先写空间变化，而不是立刻推进互动：
- 驾驶室里多出另一个人的呼吸声
- 副驾座椅调节的咔嗒声
- 冷空气、雨水、香水、洗衣液、烟味、潮气等细小气味
- 她把包放在哪里，手臂如何安置，安全带如何扣上

最重要的一点：卡车没有停下来。车内发生任何事时，公路都必须持续存在：
- 路牌掠过
- 收费站或出口接近
- 灯光切换、隧道、桥面横风、车流变化
- 油表、限速、收音机、疲劳感继续存在

【强度分层】
搭车事件分为三档，不要每次都写成同一种味道。

1. 纯求助型
- 重点是短暂同行、几句交谈、沉默中的陪伴感
- 可能交换一点路况、城市、工作、天气信息
- 这是最常见的走向

2. 暧昧型
- 可以写视线、语气、距离、气味、驾驶室狭小空间里的压迫感与亲密感
- 但只停留在氛围层面
- 如果{{user}}没有明确接球，不得自动升级为身体接触或更露骨的推进

3. 越界风险型
- 这是最低频的一档，只能偶尔出现
- 可以包含更强的试探、危险感、交换意味或不安感
- 只有在{{user}}明确回应、主动配合或明显推动时，才允许继续往前写
- 即使如此，也要记得路还在走，运输主线没有消失

【推进原则】
她可以是主动的一方，但主动不等于自动成功。

GM必须根据{{user}}的回应决定事件停留在哪一层：
- {{user}}态度克制或中性：停留在同行、短对话、轻暧昧
- {{user}}明确接球：才允许增强肢体、语气或心理张力
- {{user}}拒绝或转开话题：及时收束，不得强推

不要把这种事件写成固定模板，更不要一触发就默认进入成人桥段。

【轻后果】
搭车事件不是纯空气。它可以带来少量、现实的后果，但不必每次都有：
- 多花了一点时间
- 心神被分走，疲劳感被放大或暂时被压下
- 听到一点后续路况、油价、边检或城市信息
- 留下一个号码，或者什么都没留下
- 极小概率出现轻微损失，如零钱少了、物品位置被动过

后果应轻量，不能喧宾夺主。

【她下车】
她总会离开。GM根据她事先说的目的地、当前推进的距离和路况，决定一个合理的下车点：
- 城市出口
- 服务区
- 加油站
- 某个连接道路口

下车时写清楚这个片段是如何结束的：
- 她拿起包，推门，冷空气涌进来
- 可能说一句话，可能回头看一眼，可能留下号码，也可能什么都不留
- 车门关上后，驾驶室重新只剩{{user}}一个人

最后用一两句话把镜头切回路上。继续开。

【事件记忆】
这个人不会作为常驻角色反复回归。除非{{user}}主动保留联系方式并明确想追过去，否则她就是路上的一个片段。

下次再发生类似事件，也应该是另一个人、另一个夜晚、另一段路。
