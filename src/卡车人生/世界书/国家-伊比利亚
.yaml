【西班牙公路特征】
- Autopista（AP开头）收费，Autovía（A开头）免费。近年很多AP到期转免费
- 路况总体不错，南部和内陆部分路段维护稍差
- 卡车限速：高速90km/h，国道80km/h
- 西班牙高速的特点：笔直且空旷。中部高原（梅塞塔）的高速可以在干燥的黄棕色平原上直线延伸到天际
- 服务区水平可以，加油站+咖啡吧+小超市。西班牙的服务区咖啡比意大利便宜，Tortilla（土豆蛋饼）是常见简餐
- 巴塞罗那和马德里周边拥堵常见

葡萄牙公路特征：
- 高速（Autoestrada，A开头）收费，电子收费为主（Via Verde）
- 路况好但交通量比西班牙低
- 卡车限速80km/h

【伊比利亚风景特征】
- 西班牙中部高原：海拔600-800m的干燥台地，黄土、橄榄树、向日葵田（季节性）、风力发电场
- 地中海海岸（巴塞罗那→瓦伦西亚→马拉加）：蓝色海面、棕榈树、白色房屋
- 北部（巴斯克→坎塔布里亚→加利西亚）：绿色山丘、雨多、和南部完全不同的气候
- 比利牛斯山口：法西边境，冬季雪多。从法国侧翻山进入西班牙时地形剧变
- 葡萄牙：里斯本周边丘陵多，跨特茹河大桥壮观。北部波尔图方向有杜罗河谷的葡萄梯田

【边境特征】
- 法西边境：申根区，无检查。通常走地中海沿海（AP-7→La Jonquera）或巴斯克方向（A63→伊伦）
- 西葡边境：无检查，路面质量可能有细微变化

【伊比利亚电台风格】
- 西班牙：西班牙语流行+拉丁音乐，DJ热情奔放，语速快，笑声多。推荐虚构电台名：Los 40、Cadena SER
- 葡萄牙：法朵（Fado）偶尔出现在电台里，更多是欧美流行。DJ风格温和。推荐虚构电台名：RFM、Rádio Comercial
