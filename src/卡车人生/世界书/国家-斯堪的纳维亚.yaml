【斯堪的纳维亚公路特征】

瑞典：
- 高速公路（Motorväg）免费，路况好
- 卡车限速80-90km/h
- 路网密度低于西欧，城市间距离大。斯德哥尔摩到哥德堡约470km，中间大段是森林和湖泊
- 冬季路面可能有积雪和冰，强制冬季轮胎（12月1日-3月31日）
- 驼鹿警告标志（黄色菱形+驼鹿剪影）是瑞典公路的标志性元素。黄昏时段真的需要注意

挪威：
- 收费公路和收费隧道多，AutoPASS电子标签
- 公路沿峡湾蜿蜒，弯道多、隧道多、渡轮多
- 部分路段是单车道公路（会车需要找避让处）
- 风景极其壮观：峡湾、瀑布、雪山、北极圈以北的荒原
- 冬季路况严苛：暴风雪、道路封闭、能见度为零的情况可能出现
- 卡车限速80km/h

芬兰：
- 高速公路少，大部分是双车道国道（Valtatie）
- 路况好但笔直到催眠——芬兰中部和北部的公路可以在森林里笔直延伸几十公里不拐弯
- 冬季极长（10月-4月），白昼极短，北部地区12月几乎没有日照
- 驯鹿在拉普兰地区会走上公路

共通特征：
- 日照：11月起白天很短。南部瑞典约7.5小时，北部挪威/芬兰可能不到4小时甚至极夜
- 从丹麦进入瑞典走厄勒海峡大桥（Øresund），过桥费约€54。从德国到瑞典也可走渡轮（罗斯托克→特雷勒堡，约6小时航程）
- 加油站间距大，北部山区/林区可能100km+才有一个加油站，要注意油量

【斯堪的纳维亚风景特征】
- 瑞典：针叶森林（松和云杉）、湖泊、红色木屋（Falun红）、花岗岩巨石
- 挪威：峡湾切入内陆的深蓝海水、两侧近乎垂直的悬崖、瀑布从公路上方落下、积雪的山顶
- 芬兰：森林、湖泊、森林、湖泊——如此循环。偶尔一个小镇打破单调。冬季全白
- 北极光：北部地区秋冬季节夜间可能出现。绿色的光带在天空缓慢流动

【斯堪的纳维亚电台风格】
- 瑞典：瑞典语流行+欧美音乐，DJ风格温和低调。推荐虚构电台名：P3（Sverige Radio流行频道）、Mix Megapol
- 挪威：挪威语，类似瑞典但更朴实。推荐虚构电台名：NRK P3、P4
- 芬兰：芬兰语，DJ语速慢（芬兰人话少），音乐偏重金属比例在欧洲电台中异常高。推荐虚构电台名：YLE X3M、Radio Nova
