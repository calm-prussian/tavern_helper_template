【法国公路特征】
- Autoroute（高速公路，A开头）大部分为收费公路（péage），卡车收费不便宜
- 收费站（péage/gare de péage）：需要停车取票或刷卡/投币。繁忙时段排队。自动通道可用Télépéage电子标签
- 路况很好，特别是主干线。路面平整，标线清晰
- 卡车限速：高速90km/h（比德国的80高一点），国道80km/h
- 服务区（Aire de service）间距较大（50-80km），但设施水平高：加油站、餐厅（经常有像样的热食，法式简餐水平）、淋浴、卡车停车场
- 小型停车区（Aire de repos）更密集，通常只有厕所和野餐桌
- 巴黎环城（Périphérique）和法兰西岛区域：极度拥堵，卡车尽量走外环绕行
- 部分路段有卡车超车禁令（特别是爬坡车道），路边有"Interdiction de dépasser"标志

【法国风景特征】
- 北部（加莱→巴黎方向）：平坦农田，和比利时、荷兰类似，但田块更大，偶见小村庄的教堂钟楼
- 东北（斯特拉斯堡/阿尔萨斯）：莱茵河平原，远处有孚日山脉轮廓，半木结构的村庄
- 中部（A6/A71方向）：勃艮第丘陵，葡萄园梯田，秋冬季节是枯藤和褐色泥土
- 东南（里昂→马赛，A7"太阳高速"）：罗讷河谷，南下过程中植被逐渐从温带变为地中海型——梧桐树、橄榄树、石灰岩山丘。越往南天越蓝、光线越亮
- 西南（波尔多→图卢兹）：大片松林（朗德森林）、葡萄园
- 布列塔尼/诺曼底（西北）：海岸线、绿色牧场、花岗岩教堂

【边境进入法国】
- 从德国方向：通常走斯特拉斯堡（A5→莱茵河大桥→A35/A4），或走萨尔布吕肯（A6→A320→A4）
- 从比利时方向：A1/E19直接进入
- 申根区，通常无检查。边境标志"République Française"配蓝色EU旗
- 进入法国后路牌语言切换为法语，限速标志同步切换

【法国天气】
- 北部：和德国类似，11月阴冷多雨
- 南部：地中海气候，11月仍可能有阳光和15-18°C的天气
- 罗讷河谷：密斯特拉风（Mistral），冬季强劲的北风，侧风警告经常出现
- 山区（阿尔卑斯、孚日、中央高原）：11月起可能有雪，需注意冬季轮胎/链条要求

【法国电台风格】
- 法语香颂+欧美流行混合，比德国电台更多"氛围感"
- DJ说话节奏偶尔偏快，语气轻快带点俏皮
- 交通播报（Info Trafic）经常出现，特别是巴黎周边和A7太阳高速
- 广告：葡萄酒产区旅游、家乐福/欧尚超市、法国电信
- 推荐虚构电台名：NRJ、France Inter、Nostalgie、RTL（法语版）
