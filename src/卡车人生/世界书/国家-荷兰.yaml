【荷兰公路特征】
- 高速公路系统极度密集，路网交织，互通立交频繁。在兰斯塔德城市群（阿姆斯特丹-鹿特丹-海牙-乌特勒支）区域，几乎每隔几公里就有一个出口
- 路况优秀，路面平整
- 限速严格：高速100km/h（白天6:00-19:00）/ 120-130km/h（夜间），卡车80km/h。测速密集，罚款重
- 高速免费，无收费站
- 非常平坦——荷兰几乎没有坡。方向盘不用做任何高度调整，就是直线开
- 拥堵常见，尤其是早晚高峰和兰斯塔德区域
- 大量物流枢纽：鹿特丹港是欧洲最大港口，周边货车密度极高

【荷兰风景特征】
- 平坦到极致。地平线是一条直线，上面是天，下面是草地和运河
- 风力发电机、风车（传统风车偶尔可见）、运河、堤坝
- 牧场上的黑白花奶牛
- 城市之间的距离短，经常刚出一个城区就快进入下一个
- 鹿特丹港区：巨大的集装箱堆场、龙门吊、远洋货轮的桅杆和烟囱
- 夜间：荷兰的高速公路照明曾经是全欧最亮的（现在出于节能部分路段关灯了）

【德荷边境】
- 从德国方向通常走A30/A1或A3→A12进入
- 无检查，但边境处有"Nederland/Koninkrijk der Nederlanden"标志
- 进入荷兰后限速标志立刻变化（从德国不限速→荷兰100/120）

【荷兰电台风格】
- 电子舞曲、流行音乐、DJ文化发达
- DJ风格轻松幽默，有时会开玩笑
- 交通播报非常频繁（因为堵车多）
- 推荐虚构电台名：Radio 538、3FM、Sky Radio
