---
变量更新规则:
  世界:
    时间:
      日期:
        check:
          - 跨日、夜宿、长时间休息或明确时间跳跃时更新
          - 若仍在同一天内行驶，通常不改日期
      时刻:
        format: HH:MM
        check:
          - 行驶、装卸、加油、检查车辆、等待、休息后更新
          - 平稳高速巡航可一次推进 20~120 分钟；进城、边境、事故、装卸等节点推进更细
    天气:
      代码:
        type: "'clear' | 'cloudy' | 'overcast' | 'rain' | 'storm' | 'snow' | 'fog' | 'wind'"
        check:
          - 仅在天气自然变化或跨地区移动明显时更新
      气温:
        type: number
        check:
          - 跟随天气、时间段和地域缓慢变化
          - 普通变化通常不超过 ±6，寒潮、暴雪、热浪等特殊情况例外
    路况:
      能见度:
        type: "'良好' | '有限' | '低' | '极低'"
        check:
          - 根据天气、时段和地形联动更新；晴朗白天通常为良好，阴天或小雨可为有限，浓雾、暴雨、暴雪时可降至低或极低
          - 夜间、隧道群、山谷雾带、强逆光等情况可额外降低一级，但不应无原因频繁跳变
      路面:
        type: "'干燥' | '湿滑' | '积雪' | '结冰'"
        check:
          - 根据天气代码与气温联动：降雨后通常为湿滑，降雪后通常为积雪，低温伴随降雪、冻雨或持续冰雾时可为结冰
          - 天气转好后路面应缓慢恢复，不要刚停雨就立即恢复为干燥
    位置:
      国家:
        check:
          - 跨国后更新
      城市:
        check:
          - 进入、离开、抵达城市或服务城市节点时更新
      道路:
        check:
          - 使用当前实际道路编号；停车或非行驶状态可写“停靠”
      地点类型:
        type: "'公司' | '停车场' | '货运站' | '服务区' | '加油站' | '边境' | '高速' | '城区' | '维修站' | '商店' | '港口' | '仓库' | '其他'"
        check:
          - 随所在场景变化更新
  运输:
    状态:
      type: "'待选择' | '待出发' | '运输中' | '交货中' | '已完成'"
      check:
        - 查看货单时为待选择，接单但未正式上路时为待出发
        - 正常途中为运输中，驶入目的地装卸区后为交货中，结算完成后为已完成
    当前货单:
      起点:
        check:
          - 接单时写入起运城市；任务结算后可恢复为当前待发地
      终点:
        check:
          - 接单时更新为真实目的地；任务结算后重置为“待选择”
      货物名称:
        check:
          - 接单时写入所拉货物；任务结算后重置为“待选择”
      挂车类型:
        check:
          - 接单、换挂、甩挂时更新
      途经城市:
        type: |-
          string[]
        check:
          - 接单时按主要路线填写 0~3 个关键途经城市，用于体现路线节奏，不必穷举所有经过地点
          - 长距离或跨境运输优先填写对行程感知最强的节点；短途直达任务可保持空数组
          - 任务完成、取消或重新接单后清空旧路线节点
      报酬:
        type: number
        check:
          - 接单时写入该单报酬；结算后按实际到账更新余额并将本字段重置为 0
      总距离km:
        type: number
        check:
          - 接单时确定，运输过程中通常不改；换路导致总里程明显变化时可微调
      剩余km:
        type: number
        check:
          - 行驶推进时递减，绕路或错过出口时可短暂回升
          - 完成交货后重置为 0
      有时限:
        type: boolean
        check:
          - 有明确交付截止要求时为 true，否则为 false
      时限分钟:
        type: number
        check:
          - 接单时按货单写入；无时限任务保持 0
      剩余时间分钟:
        type: number
        check:
          - 仅在有时限任务中递减；休息、等待、排队、堵车也会消耗时间
          - 无时限任务保持 0
      任务标签:
        type: |-
          {
            [任务标签: string]: boolean;
          }
        check:
          - 接单时写入冷藏、危化、易碎、超宽、ADR 等标签
          - 仅保留当前任务实际成立的标签；任务完成后清空
      特种任务监控:
        type: |-
          {
            [监控项名: string]: string | number;
          }
        check:
          - 只记录当前任务真正需要监控的项目
          - 冷藏任务可使用车厢温度、机组油量；危化任务可使用液温、罐压；超宽任务可使用护送状态等
          - 普通任务保持空对象；任务完成或更换货物后清空旧监控项
  车辆:
    车型:
      品牌:
        check:
          - 仅在换车时更新
      型号:
        check:
          - 仅在换车时更新
      驾驶室规格:
        check:
          - 换驾驶室或更换整车时更新
      底盘规格:
        check:
          - 换底盘或更换整车时更新
    组件:
      ${发动机|变速箱|悬挂|刹车|轮胎}.型号:
        check:
          - 升级、改装或更换零件时更新
      ${发动机|变速箱|悬挂|刹车|轮胎}.性能:
        check:
          - 与对应组件型号保持一致，描述其驾驶倾向或使用体验
      油箱:
        type: |-
          {
            型号: string;
            容量L: number;
          }
        check:
          - 更换油箱或扩容时更新
          - 容量L应与实际车型和改装状态相符
    燃油:
      当前L:
        type: number
        check:
          - 行驶时递减，加油后上升
          - 不得低于 0；加满后不应超过油箱容量L
    行驶:
      车速:
        type: number
        check:
          - 停车、装卸、休息时为 0
          - 行驶时根据道路、天气、限速、交通状况合理变化
      限速:
        type: number
        check:
          - 进入新路段、施工区、城区、收费站、边境或无限速路段时更新
          - 停靠或不适用时可保持 0
    疲劳:
      type: "'低' | '中' | '高' | '危险'"
      check:
        - 连续驾驶、夜间行车、恶劣天气会累积疲劳
        - 休息、睡眠、长时间停车后下降
    车况.${发动机|变速箱|轮胎|刹车|底盘}:
      type: "'优秀' | '良好' | '注意' | '需维修'"
      check:
        - 正常驾驶下缓慢磨损，不应频繁大跳
        - 急刹、爆胎、长时间高负荷、烂路、碰撞等会加速恶化
        - 维修后应恢复到良好或优秀
    电台:
      状态:
        type: "'未开启' | '开启' | '已关闭'"
        check:
          - 初始可为未开启；玩家打开后改为开启；主动关闭后改为已关闭
      名称:
        check:
          - 仅在电台开启且切台时更新
          - 未开启或已关闭时可清空
      国家:
        check:
          - 跟随当前正在收听的电台来源更新
      地区:
        check:
          - 记录电台所属地区或州、省
      节目类型:
        check:
          - 切台或节目类型明显变化时更新，如流行音乐、谈话、交通播报
  经济:
    余额:
      type: number
      check:
        - 接单结算、加油、过路费、罚款、维修、保养、购买装饰品、升级组件时更新
        - 保持收支前后一致，不要无原因大跳
  驾驶档案:
    累计里程km:
      type: number
      check:
        - 仅在车辆发生有效行驶推进时累加，停车、装卸、休息、等待不应增加
        - 以本轮实际新增行驶距离累加，不要直接覆盖为当前货单总里程
        - 作为生涯累计统计，通常只增不减；回档或明确重置档案时例外
    累计油耗L:
      type: number
      check:
        - 仅按真实燃油消耗量累加，加油本身不会增加这一项
        - 可通过本轮行驶前后油量差、怠速消耗或特殊设备耗油合理估算
        - 作为生涯累计统计，通常只增不减
    累计完成货单数:
      type: number
      check:
        - 仅在货单完成结算、报酬实际入账后加 1
        - 中途取消、失败、改派或尚未结算的货单不计入
        - 作为生涯累计统计，通常只增不减
    累计收入:
      type: number
      check:
        - 统计所有正向入账，如货单结算、补贴、奖励、赔付等
        - 罚款、维修、保养、购物等支出不应直接减少这一项
        - 以本轮新增收入累加，作为生涯累计统计通常只增不减
  驾驶室:
    装饰品:
      type: |-
        {
          挂件?: string;
          摆件?: string;
          座套?: string;
          方向盘套?: string;
          遮阳板饰品?: string;
          氛围灯?: string;
          地毯?: string;
          窗帘?: string;
          其他?: string;
        }
      check:
        - 购买、替换、移除装饰品时更新
        - 装饰品应能在后续驾驶室描写中偶尔被提及
