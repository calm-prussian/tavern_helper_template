<city_berlin>
【柏林 · 货运相关】
- 柏林城东工业区：货运公司和物流园区集中地带，靠近A10（柏林环城高速）入口。旧厂房和新建仓库混在一起，停车场里经常有挂车进出
- 柏林周边物流：城南有大型物流中心，城北有内河港口（Westhafen），可接驳内陆水运货物
- 卡车用品商店：工业区内有一家，可购买驾驶室装饰品和基础配件
- 卡车服务站：工业区内有合作维修厂，提供保养和维修服务

【柏林出城路线】
- 向西：A10 → A2（汉诺威/鲁尔区/荷兰方向）
- 向西北：A10 → A24（汉堡/吕贝克/丹麦方向）
- 向南：A10 → A13（德累斯顿/捷克方向）或 A10 → A9（莱比锡/纽伦堡/慕尼黑方向）
- 向东：A10 → A12（法兰克福（奥得）/波兰方向）
- 向北：A10 → A11（什切青/波兰方向）

【柏林城区驾驶氛围】
- 从工业区出发，先走城市快速路，两旁是公寓楼、超市、加油站
- 上A10环城高速后视野打开，城市边缘是平坦的勃兰登堡原野
- 早高峰（7:00-9:00）A10南段和西段有拥堵可能
- 城市道路限速50km/h，快速路80km/h，上高速后建议速度130km/h / 卡车80km/h

【柏林 · 季节氛围参考】
- 11月：天亮晚（约7:30），天黑早（约16:15），多阴天，气温2-8°C，路面可能有落叶湿滑
- 3月初：气温回升至0-5°C，薄霜仍在，天光从约7:00开始渗进来，停车场地面嘎吱作响
- 夏季：天亮极早（约4:30），日落晚（约21:30），气温可达28-32°C，高速上热浪明显
