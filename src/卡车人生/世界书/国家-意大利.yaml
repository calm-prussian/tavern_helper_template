【意大利公路特征】
- Autostrada（高速公路）全面收费，收费站（casello）频繁。取票→下高速时按距离付费。费用不低
- 路况：北部主干线（A1/A4/A14）路况好；南部路况参差，部分路段路面老化
- 卡车限速：高速80km/h，但实际上意大利交通整体偏"活泼"——小车经常开到150+，在右车道老实开80的卡车旁边呼啸而过
- 隧道极多，特别是利古里亚海岸（A10热那亚段）和阿尔卑斯南麓。有的路段隧道一个接一个，出了这个洞口直接进下一个
- 意大利服务区（Area di servizio）：加油+咖啡吧是标配。意式浓缩咖啡（Espresso）站着喝，一杯€1.10-1.50。很多卡车司机的固定仪式
- Autogrill是最常见的服务区连锁品牌

【意大利风景特征】
- 北部平原（波河平原/Pianura Padana）：米兰到博洛尼亚之间，平坦的农田和工业区交替，雾多（秋冬季节的波河平原浓雾是出了名的）
- 利古里亚海岸：从热那亚向南/向西，公路在山腰和海面之间切换，隧道→高架桥→隧道→短暂露出蓝色地中海→又进隧道。景色壮观但开起来累
- 托斯卡纳：起伏的丘陵、柏树行道、石头农舍。经典的意大利明信片风景
- 罗马以南：植被变得更干燥，仙人掌、松树、灰黄色的山丘
- 阿尔卑斯南麓（A22布伦纳→维罗纳方向）：翻过山口后突然变温暖，路边出现苹果园和葡萄棚架

【边境特征】
- 从奥地利翻布伦纳进入：无检查，但语言和路牌瞬间切换成意大利语。南蒂罗尔地区（Südtirol/Alto Adige）路牌是德意双语
- 从法国进入：A8/蓝色海岸方向，或弗雷瑞斯隧道（Fréjus）/ 勃朗峰隧道（Mont Blanc）——长隧道收费贵，卡车要排队

【意大利电台风格】
- 意大利语流行音乐（Musica italiana）占比很高，旋律感强
- DJ热情、语速快、经常大笑
- 广告密度高
- 交通播报有时夹杂夸张的语气
- 推荐虚构电台名：Radio Deejay、RTL 102.5、RDS
