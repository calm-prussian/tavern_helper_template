【达夫（DAF）· 驾驶质感参考】

常见型号：
- XF 480：MX-13发动机，480马力。荷兰品牌，在西欧特别常见。油箱通常400-600L
- XG/XG+（新世代）：2022年发布的全新车型，驾驶室更大更高，内饰现代化程度大幅提升。外观辨识度高——前脸很宽，LED日行灯是横贯式的

驾驶感受：
- DAF的特点是驾驶室空间大。XF的Super Space Cab是最早做大空间驾驶室的品牌之一，站起来头顶还有余量
- 方向盘位置偏高，坐姿直立，视野好
- TraXon自动变速箱（和曼恩共用技术平台）：表现中规中矩，偶尔在低速挡位有轻微顿挫
- 悬挂调校偏舒适，比曼恩软，比沃尔沃硬，居中
- 发动机声音特征：相对安静，中转速区间有轻微的涡轮口哨声
- 内饰风格：XF老款偏朴素，大面积灰色塑料；XG新款有木纹饰板和氛围灯，质感提升明显
- 荷兰司机对DAF有品牌情结，在荷兰境内服务区能看到大量DAF

气味：DAF驾驶室通风系统不错，新车味散得快。老款XF的空调出风口有时会带一点灰尘味。
