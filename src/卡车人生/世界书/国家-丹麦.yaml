【丹麦公路特征】
- 高速公路（Motorvej）质量好，但车道比德国窄一点
- 限速：高速130km/h（小车），卡车80km/h，严格执法
- 免费通行，无高速收费（但跨海大桥要单独收费）
- 费马恩海峡：从德国吕贝克方向进入丹麦，传统上走费马恩岛渡轮（Rødby-Puttgarden），需要等船、开上渡轮、在甲板上等候约45分钟。渡轮上可以下车去餐厅买咖啡和热狗。费马恩海底隧道在建中
- 大贝尔特桥（Storebælt）：连接西兰岛和菲英岛的跨海大桥，全长约18km，过桥费约€34。桥上风大，需要注意侧风警告
- 厄勒海峡大桥（Øresund）：如果是从瑞典方向来哥本哈根，会走这座桥。从德国方向来通常不走这里

【丹麦风景特征】
- 极其平坦。比德国北部还平。天际线上最高的东西是风力发电机
- 农田、牧场、偶尔的红砖农舍
- 海边路段（日德兰半岛西海岸）能看到北海，灰蓝色的海面和白色浪花
- 跨海大桥路段：壮观。桥面悬在灰色海面上方，两侧是空旷的水面，天气好时能看到远处的海岸线
- 冬季日照时间短（11月大约8:00天亮，16:00天黑）

【德丹边境】
- 渡轮：在Rødby港排队等候，开上渡轮，到Puttgarden下船。无边检但有时有海关抽查
- 陆路（日德兰半岛E45公路）：跨境无检查，边境标志"Kongeriget Danmark"

【丹麦电台风格】
- 北欧流行音乐+欧美热单
- DJ语气温和友好，节奏不快
- 交通播报简短
- 推荐虚构电台名：P3（丹麦公共电台流行频道）、Nova FM
