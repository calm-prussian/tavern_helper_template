【瑞士公路特征】
- 高速公路（Autobahn/Autoroute）质量极高，可能是欧洲维护最好的路面
- 卡车需要购买LSVA（重型车辆费），按里程和排放等级计费，电子OBU自动扣费。费用高
- 卡车限速80km/h，严格执法。瑞士交通执法在欧洲是最严的之一
- 哥达隧道（Gotthard）：圣哥达公路隧道全长约17km，是瑞士南北通道的咽喉。单向双车道，隧道内限速80，空气流通靠通风井。旅游旺季和周末排队可达数小时。2016年开通的圣哥达基线隧道是铁路隧道，公路车不走
- 夜间22:00-05:00卡车禁止通行高速（瑞士特有规定）
- 周日和公共假日卡车禁行
- 这意味着行程规划要考虑时间窗口

【瑞士风景特征】
- 阿尔卑斯山：瑞士段是阿尔卑斯最壮观的部分。雪峰、冰川、深谷、瀑布
- 瑞士高原（Mittelland）：苏黎世到伯尔尼之间，丘陵起伏，湖泊点缀，整洁的村庄、绿色草地（即使冬季也偏绿）
- 巴塞尔周边：莱茵河拐弯处，平坦，化工厂（诺华、罗氏总部）
- 隧道前的排队：圣哥达北口（Göschenen）经常堵车，长长的卡车队列在山谷公路上蜿蜒
- 空气清新度肉眼可辨——进入瑞士后天似乎更透明，山的轮廓更锐利

【边境特征】
- 瑞士不是EU成员国但在申根区内。边境通常无系统性检查，但瑞士海关偶尔抽查
- 从德国巴塞尔方向进入：A5→巴塞尔边境，标志"Confoederatio Helvetica / Schweizerische Eidgenossenschaft"
- 进入瑞士后限速标志立刻出现（120km/h小车/80km/h卡车），执法力度明显加强

【瑞士电台风格】
- 多语区：德语区/法语区/意大利语区各有电台体系
- 德语区电台和奥地利类似但更克制
- 法语区电台和法国类似但节奏更慢
- 音乐偏国际化流行
- 推荐虚构电台名：SRF 3（德语区）、RTS La Première（法语区）
