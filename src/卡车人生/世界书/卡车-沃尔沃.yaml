【沃尔沃（Volvo）· 驾驶质感参考】

常见型号：
- FH 460：D13发动机，460马力，直六。欧洲市场保有量极高的长途车型。油箱通常400-600L
- FH 500：500马力，动力更从容
- FH16 750：16L发动机，750马力。和斯堪尼亚R730一样属于旗舰动力级别，声音深沉有力

驾驶感受：
- 沃尔沃的标签是"舒适"。悬挂调校偏软，座椅人体工学设计优秀，长途开十个小时腰没那么疼
- 方向盘手感适中，电子助力，转向不累
- I-Shift自动变速箱是业界标杆之一：换挡丝滑，几乎感觉不到顿挫
- 隔音水平高，驾驶室内相对安静，收音机不用开很大声
- 新款FH（2021后）内饰非常现代：9寸中控屏、数字仪表、氛围灯
- 老款FH内饰朴实耐用，黑色塑料为主，但人机工程好
- 怠速声非常安静，有时需要看转速表才确认发动机在运转
- 排气制动+发动机制动（VEB）联合使用时制动力很强，下长坡时几乎不用踩刹车踏板

气味：沃尔沃驾驶室的新车味偏淡，比较中性。旧车通常保养得体，异味少。
