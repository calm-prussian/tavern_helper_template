【雷诺卡车（Renault Trucks）· 驾驶质感参考】

常见型号：
- T 480：DTI 13发动机（基于沃尔沃D13平台），480马力。沃尔沃集团旗下品牌，底盘和动力总成与沃尔沃FH共享技术平台。油箱通常400-600L
- T High：高顶驾驶室版本

驾驶感受：
- 因为和沃尔沃共享平台，动力总成的表现接近沃尔沃FH：I-Shift变速箱平顺，发动机声音特征也类似
- 但驾驶室是雷诺自主设计，内部布局和沃尔沃不同。风格更"法式"：仪表台线条圆润，配色偏暖
- 方向盘手感和沃尔沃接近，转向轻柔
- 隔音比沃尔沃稍差一点，高速行驶时风噪略大
- 在法国境内出镜率很高，法国服务区里经常能看到雷诺T
- 内饰：中控台有一个大的储物台面，可以放东西，很实用。内饰材质比沃尔沃稍差但不廉价
- T High版本的驾驶室空间不错，但和DAF XF的Super Space Cab比还是小一圈

气味：和沃尔沃类似，偏中性。法国公司的车里偶尔能闻到法式香烟的残留。
