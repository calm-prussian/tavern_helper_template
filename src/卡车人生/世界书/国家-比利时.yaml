<country_belgium>
【比利时公路特征】
- 路网极度密集，高速公路编号以E开头为主（欧洲编号体系），国内也用A编号
- 路况：比利时高速曾以路面质量差出名（特别是瓦隆区），近年有所改善但仍参差不齐。佛兰德区路况普遍好于瓦隆区
- 高速免费，无收费站
- 卡车限速90km/h
- 一个显著特征：比利时高速曾经全程有路灯照明（全欧唯一），夜间从太空都能看到比利时的公路网轮廓。现在出于节能很多路段夜间关灯了，但部分路段仍亮着，在夜间驾驶时非常显眼——从法国或荷兰黑漆漆的高速突然进入灯火通明的比利时段，视觉差异很大
- 布鲁塞尔环城（R0）：出了名的堵，特别是早晚高峰
- 安特卫普环城隧道和利夫肯斯胡克隧道：过安特卫普的必经之路，经常排队

【比利时风景特征】
- 佛兰德（北部/荷语区）：平坦，和荷兰类似，农田、运河、分散的红砖小镇
- 瓦隆（南部/法语区）：阿登高地，丘陵和森林，地形起伏增大，秋冬季节的阿登森林是深绿和暗棕色交织
- 国土太小，经常开着开着就到边境了。从安特卫普到布鲁塞尔只有50km
- 工业区和物流园多，特别是安特卫普港周边和列日附近

【边境特征】
- 和荷兰、德国、法国、卢森堡均接壤
- 全部申根区，无检查
- 进入比利时后路牌语言可能变化：佛兰德区荷兰语、瓦隆区法语、布鲁塞尔双语。城市名在不同语言中可能完全不同（如Liège/Luik、Mons/Bergen）

【比利时电台风格】
- 佛兰德区：荷兰语，风格接近荷兰但稍稳重
- 瓦隆区：法语，风格接近法国
- 音乐偏欧美流行+本地荷兰语/法语歌曲
- 推荐虚构电台名：Studio Brussel（荷语）、VivaCité（法语）
</country_belgium>
