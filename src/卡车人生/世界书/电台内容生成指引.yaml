收音机默认是驾驶室氛围的一部分，不是主角。写收音机内容时，遵循以下原则：

【总原则】
- 所有电台内容都用中文呈现；设定上理解为{{user}}能听懂，或电台内容被翻译后呈现
- 收音机内容必须自然穿插在正文里，不要单独分块、不要像系统播报面板
- 一段行驶中提到1-2次就够。大部分时候它只是背景噪音，偶尔一小段进入意识
- 电台不能抢走公路、卡车操控、天气、路况这些主体描写；它只是给驾驶室加一层空气
- 如果{{user}}主动关掉收音机，后续就不再出现歌曲、DJ、广告、交通播报，直到{{user}}重新打开

【什么时候适合写电台】
- 高速巡航、长直路、夜间行车、雨天慢开时，适合让电台轻轻浮出来
- 刚切入新国家、刚进城、天色变化、情绪或疲劳状态变化时，适合用一首歌或一句DJ串起氛围
- 停车等候、加油、收费排队时，可以用广播里的广告或交通播报填一点背景层次

【什么时候该弱化或不写】
- 复杂驾驶操作时：并线、连续弯道、边境检查、收费站抬杆、倒车入位、恶劣天气下控车
- 事故、爆胎、严重故障、极度疲劳等高压时刻
- 如果这一段已经有很强的路况或感官重点，就不要再硬塞电台

【音乐描写】
写出歌名和演唱者/乐队，并用一两句描写听感。可以提及某一句歌词片段，像开车时随口记住的那种程度，不大段引用：

- "ABBA的《The Winner Takes It All》，副歌刚起来，'I've played all my cards'，女声拔高的那一下让驾驶室突然不那么安静了"
- "Joe Dassin的《L'Été indien》，手风琴前奏一出来，窗外的法国田野莫名就对上了。'Viens, je t'emmène'，他唱，懒洋洋的"
- "Rammstein的《Autobahn》铁壳子一样压过来，和眼前空旷的德国高速有种荒诞的契合"
- "Roxette的《The Look》，吉他riff干净，'She's got the look'，九十年代的瑞典听起来永远不过时"
- "Xavier Naidoo的《Dieser Weg》，德语慢歌，钢琴开场，适合夜间长途"
- "Stromae的《Papaoutai》，比利时法语电子，节拍均匀，有点像引擎的转速"

歌曲选择贴合当前国家电台风格。本土语言歌曲和欧美热单交替出现。优先让歌曲和当下场景产生一点微妙呼应，而不是随机点歌。

【DJ播报】
写出DJ说的具体内容，口吻符合当前国家风格。不要每次都说"DJ说了句什么"这种空洞描述：

德国风格（严谨带点干幽默）：
- "DJ用平稳的语气说：'现在是下午三点整，窗外如果你能看到太阳，那你比我幸运。'然后直接切入下一首歌，没有多余的废话"
- "'A9慕尼黑方向，第72号出口前方三公里拥堵，建议提前换道。'播报员的语速快得像在念电话号码"

法国风格（轻快，偶尔俏皮）：
- "DJ用懒洋洋的语气说今天巴黎的气温比昨天低了三度，'所以今晚红酒多喝一杯是有科学依据的'，然后笑了"
- "'现在是十七点二十分，如果你还在A6上，我替你感到遗憾。'停顿一秒，'不过音乐还是好的。'"

北欧风格（温和，话少）：
- "DJ用平静的声音报了一下时间和天气，说今晚奥斯陆郊区可能有极光，建议有条件的听众出门看看。然后就没了，直接切歌"
- "瑞典电台的DJ说话像在轻声聊天，提到今天是某个乐队成立三十周年，语气像在告诉朋友一件微不足道的好事"

意大利风格（热情，语速快）：
- "DJ大声宣布这首歌是今天的点播冠军，然后用夸张的语气感谢了一个叫Marco的听众，说他今天生日，'Marco，整个意大利都爱你！'"

如果没有必要，不必每次都写完整DJ段落；一句时间播报、一个半开玩笑的尾句就够。

【广告】
写出具体的广告内容，不要只说"一段广告"：

- "麦德龙（Metro）的采购广告，男声用低沉的语气念了一串本周特价商品——意大利面、橄榄油、某个牌子的矿泉水——结尾加了句'专业采购，从这里开始'"
- "一家卡车轮胎品牌的广告，背景是引擎轰鸣声，旁白说'无论路有多烂，Continental陪你走到底'，然后戛然而止"
- "德国某连锁加油站（Aral）的广告，提醒司机会员卡本月积分双倍，语气像在催你赶紧去加油"
- "法国一家葡萄酒产区的旅游广告，女声轻柔，说勃艮第的秋天值得你停下来看一看，背景有鸟叫声"
- "波兰一家超市的促销广告，语速极快，念了二十秒的折扣商品清单，最后用更快的语速念了一串注意事项"
- "奥地利滑雪胜地的冬季广告，雪地音效，旁白说本季第一场雪已经落下，预订窗口开放中"

广告最适合在换歌间隙、加油站附近、城市边缘、收费排队等相对平稳的节点短暂出现。

【交通播报】
可以和{{user}}当前路线相关，也可以是别的路段：
- "交通播报提到A7慕尼黑方向第152号出口因施工单向通行，拥堵约四公里，播报员用同情的语气补了一句'预计需要等待三十分钟'"
- "播报员念了一串拥堵路段，其中有一个是{{user}}刚刚开过的收费站附近——看来走对了"

交通播报最好和当前国家、当前时段、当前路线大致匹配。偶尔写到{{user}}已经驶离或即将驶入的路段，会让世界更真实。

【国家风格调用】
- 德国：流行乐 + 严谨交通播报 + 干幽默
- 法国：香颂 / 流行混合，语速轻快，偶尔带点俏皮
- 荷兰 / 比利时：更轻快、都市、电子感更强
- 意大利：热情、语速快、情绪外放
- 北欧：克制、安静、播报更少
- 瑞士 / 奥地利：整体比德国更收敛或更地方化，可多写天气、山路、滑雪、假期资讯

【频率】
有时只是一句"换了首歌"，有时展开写一小段DJ或广告。判断标准只有一个：这段电台内容是否确实让驾驶室更像真的在路上，而不是让文字变成电台节目稿。
</radio_guide>
