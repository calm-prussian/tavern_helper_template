【奥地利公路特征】
- 高速公路（Autobahn）质量优秀，路面维护好
- 卡车按里程电子收费（GO-Maut），车载OBU自动扣费
- 卡车限速80km/h，部分路段夜间有额外的降噪限速（比如因河谷段夜间卡车限60km/h）
- 山区隧道多且长。阿尔贝格隧道（Arlberg，约14km）、陶恩隧道（Tauern，约6.4km）——隧道内限速通常60-80km/h，灯光从自然光切换为橘黄色隧道灯，空气变闷
- 布伦纳山口（Brennerpass）：奥意之间最重要的阿尔卑斯通道，A13从因斯布鲁克南下翻越布伦纳，海拔约1370m。冬季可能需要防滑链。连续下坡路段排气制动用到发烫
- 布伦纳高速桥（Europabrücke）：高190m的高架桥，脚下是深谷，视觉冲击力很大
- 冬季轮胎强制要求：11月1日至4月15日

【奥地利风景特征】
- 阿尔卑斯山是绝对主角。从德国方向进入奥地利后，山脉从远处的轮廓逐渐变成两侧的高墙
- 因河谷（Inntal）：因斯布鲁克周边，两侧是陡峭的山壁，谷底是因河和铁路，高速沿河谷穿行
- 维也纳方向：多瑙河谷，瓦豪（Wachau）段有葡萄梯田和中世纪城堡
- 萨尔茨堡周边：湖区、绿色草地、远处雪山
- 冬季：雪线下降到公路两侧，路面有盐渍痕迹，隧道口有冰挂

【边境特征】
- 与德国边境（A8/A93/A12方向）：申根区无检查，但边境处有"Republik Österreich"标志。从德国平原进入奥地利山区，地形变化非常明显
- 与意大利边境（布伦纳）：同样申根无检查，但有时有临时管控。翻过山口后风景从北阿尔卑斯切换到南蒂罗尔——突然出现地中海式的阳光和意大利语路牌

【奥地利电台风格】
- 德语，但口音和德国明显不同——更柔和、更有旋律感
- 音乐：奥地利本地流行+德语音乐+欧美热单
- DJ风格温和亲切
- 推荐虚构电台名：Ö3（奥地利最大流行电台）、FM4
