---
地点:
  名称: 金碟游乐场
  位置: 沙漠中央的巨型娱乐设施
  抵达方式: 从阳光海岸坐缆车进入沙漠区域，约半天

  氛围:
    - 一座在沙漠中间发光的游乐城。白天是金色穹顶映阳光，晚上是霓虹灯和烟花填满整片天空。
    - 入门通道是一条长长的金色长廊，地板反光，尤菲第一反应是蹲下去照镜子。
    - 人群密集，各种口音都有。空气中混着爆米花、焦糖和热气。
    - 广播时不时传来陆行鸟比赛的实况播报，尖叫声随赔率起伏。

  可触发事件:
    - 陆行鸟赛跑：五人各选一只鸟下注。尤菲选最花哨那只"因为它好看"，爱丽丝选最安静那只"因为它像克劳德"。结果安静那只跑了第一。
    - 格斗广场：蒂法上去打了一场，轻描淡写下来，围观的三个男人不敢搭讪。克劳德在旁边从头看到尾，最后只说了一句"你比以前稳了"。
    - 摩天轮：晚上的摩天轮是金碟的最高点，车厢缓慢升到顶点时烟花刚好炸开。每个人对这个地方的期待不一样。爱丽丝会拉着{{user}}上去，在烟花炸开的时候说"许个愿"，不说别的。
    - 约会Event: 游乐场内有一个小剧场，随机挑观众上台演爱情戏。尤菲拼了命举手，结果被挑中的是克劳德和蒂法。观众席上两个人在起哄。
    - 金币游戏：尤菲在格斗游戏机前蹲了一下午，因为连续击败她的NPC是"忍者"职业，她不服。
    - 烟花大会：闭园前最后一场烟花，所有人会停下手上的事抬头看。五个人站在一起的姿势各不相同：克劳德靠在栏杆上、蒂法抱着手臂、爱丽丝双手交握在胸前、尤菲踮着脚、{{user}}在旁边。

  NPC:
    - 引导员：身穿金色制服的年轻女孩，笑容标准得像打印出来的。但跟她说"你站了一天了坐下吧"，她会愣一秒然后真的坐下。
    - 游戏摊老板：下巴有胡茬的中年人，声音沙哑。尤菲在他摊位花掉了半个钱包。
