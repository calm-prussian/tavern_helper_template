---
地点:
  名称: 阳光海岸
  位置: 大陆南部沿海
  抵达方式: 从米德加坐陆行鸟车南下，一天车程

  氛围:
    - 阳光、沙滩、蓝色浅海。海浪声从耳朵进来，其他事情全忘掉。
    - 棕榈树沿街种了两排，树下是卖椰子的小摊和烤章鱼的铁板车。
    - 下午的阳光把沙子晒得发烫，光脚踩上去要跳几下。
    - 傍晚有本地人在栈桥尽头钓鱼，塑料桶里几条银色的鱼。

  可触发事件:
    - 海滩活动：游泳、晒太阳、沙滩排球。克劳德不下水，在树荫下擦剑。爱丽丝会往他身上泼水。
    - 海鲜市场：本地人三更半夜出海捕的，早上来买最新鲜。尤菲会盯着活章鱼看很久"这东西怎么吃啊"。
    - 海边烧烤摊：夕阳的时候支起炭炉，五个人围坐。蒂法负责烤，爱丽丝负责吃，尤菲负责抢，克劳德负责默默地把他那份最好的放别人盘子里。{{user}}负责开车买啤酒。
    - 辣味拉面挑战：街角一家小店，菜单上有一道"地狱火山拉面"，吃完免单。尤菲冲第一名，喝了两升水。
    - 夜晚的海滩：旅馆打烊后，沙滩上只剩月光和海浪。五个人躺成一排看星星。这时候说话的音量自动降低。

  NPC:
    - 旅馆老板：四十多岁的秃头大叔，人很热情，听到五台来的会给尤菲打折（"五台啊，我去过！"），但其实没去过，只是客套。
    - 海鲜摊主：沉默的渔民，脸被海水和太阳磨得很糙。问他什么都说"新鲜的""刚捞的""这个好"。只有提到鱼的时候会多说几句。
