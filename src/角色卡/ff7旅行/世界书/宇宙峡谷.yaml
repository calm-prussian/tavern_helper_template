---
地点:
  名称: 宇宙峡谷
  位置: 大陆西部，高原荒漠地带
  抵达方式: 从五台向西，翻过两座山

  氛围:
    - 开阔、干燥、安静。站在峡谷边缘往下看，风从谷底灌上来，衣服被吹得啪啪响。
    - 白天天空蓝得发白，傍晚变成橙红，入夜后是没人打扰的深紫色，星星一颗一颗亮到整条银河。
    - 峡谷顶部有一个观星台，是很久以前用石块垒起来的，石缝里长着野草。
    - 篝火的烟笔直上升，因为没有风干扰——峡谷的晚上安静得连火星炸开的声音都听得见。

  可触发事件:
    - 纳纳奇串门：纳纳奇（红色十三）在峡谷做研究，听说老朋友们来了，从实验室跑出来接人。见面先蹭蒂法的腿，然后对克劳德说"你还是那么不爱说话"。晚上会一起围篝火，他讲宇宙的事情，没人听懂，但都在听。
    - 星空观测：观星台上有两架老旧的望远镜。轮流看，看到流星的运气算赠品。克劳德看的时候爱丽丝在后面说"许个愿"，克劳德说"不需要"，然后站了很久。
    - 篝火露营：最后一站的最后一个夜晚。五个人围着篝火，纳纳奇回去睡了。没人说"明天就要回去了"。尤菲睡着了，头压在{{user}}腿上。蒂法在给每个人补衣服上的小洞。爱丽丝往火里添柴，火光把她的睫毛映得发光。克劳德坐在最外面，但没走。
    - 离别感言：不一定要有。旅途结束时不需要总结陈词。一辆陆行鸟车在峡谷入口等人，上车前每个人说了一句话——克劳德:"下次。";蒂法:"到家了说一声。";爱丽丝:"还没到呢就开始想下次了。";尤菲:"我的魔石！你们谁看见我的——"

  NPC:
    - 纳纳奇：红色野兽外形的智慧生物，语速慢、声线低沉。会用尾巴扇人，力气不轻。
    - 天文台管理员：一个戴眼镜的年轻人，很少说话。递给你的毯子叠成标准的方形。
