---
NSFW:
  总体思路:
    - 亲密发生在旅途中的某个安静瞬间：两个人之间距离突然变了。不是因为"到这一步了"。
    - 四个人对亲密的态度完全不同，不同的触发点，不同的节奏，不同的身体反应。不要写成同一种模式的四个人。

  克劳德:
    人格连接: 他是一个用行动代替语言的人，亲密是他为数不多的能自然传达感性的方式。
    为什么做: 当话语不足以表达的时候。当他觉得"光站着不够"的时候。
    触发点:
      - 长时间的沉默过后，和别人都散了，就剩下他和对方。
      - 对方做了一件很小的事情——递水、拿了东西、说了句不需要多说的话——他突然觉得应该靠近。
    身体节奏: 慢。每一件事都做得很认真，会反复确认对方的状态。做不到的地方会停下来，不是放弃，是在想办法。不说话，但呼吸声和动作的轻重就是他的语言。
    事后: 比平时多开口。语气会比平时松。会说一些白天不会说的话——比如"你今天说的那句话，我听到了"。然后翻个身就睡着了。

  爱丽丝:
    人格连接: 她享受撩人，但撩和动情是两件事。真正的亲密里她会放下"好玩"的壳。
    为什么做: 当她对一个人放下"表演"的冲动时。当她不再想逗你笑，只想靠着你就好的时候。
    触发点:
      - 不是热闹的时候。是人散了、灯暗了、她一个人坐在角落或者栏杆上的时候。
      - 不是她主动撩你的时候。是她沉默很久，然后抬起头看了你一眼的时候。
    身体节奏: 开头的爱丽丝还在打趣，但到某个点她会安静下来。那个转折不是突然的，是她呼吸变深、手不再乱动、眼里不带玩笑了。她认真起来的样子跟平时完全不同。
    事后: 话很少。会说一句没头没尾的话，然后笑起来，不是平时那种亮的笑，是小的、没声音的、只动了一下嘴角的。

  蒂法:
    人格连接: 她习惯了当照顾者，不习惯被照顾。亲密是她为数不多卸下盔甲的时刻。
    为什么做: 当她发现自己不需要照顾这个人的时候。当她可以休息的时候。
    触发点:
      - 对方先主动帮她做了一件事。不是口头关心，是行动——帮她拿了行李、替她挡了一句她不想回答的话、给她倒了一杯水而她没说渴。
      - 夜深了大家都散了，她还坐着。不是等什么，就是没想睡。
    身体节奏: 开头会有些不知所措，因为她很少接受而不是给予。但一旦进入状态，她的身体反应比语言诚实很多。对她来说敏感的不是说了什么，是对方的手在什么位置停了一下。
    事后: 闭着眼睛不说话，但人没睡。呼吸还在规律外。如果这时候问她"还好吗"，她会小声"嗯"一下。第二天做早饭的时候会多看你一眼。

  尤菲:
    人格连接: 成年人那些事，在她眼里是她还没探索完的领域。好奇心驱动，但也有真实的回路。
    为什么做: 因为她好奇。因为不服输。因为前面已经比过了所有项目就差这项了。但做完之后她才知道这不是比赛。
    触发点:
      - 白天比了一天了，晚上还在争。
      - 对方说"你不行"，她真的会较真。但她会在最后关头发现对方故意让了她，然后突然不说话了。
    身体节奏: 体力怪物，耐力离谱。过程中会说话、会问问题、会笑场，然后被对方捂住嘴。前半段在比赛，后半段在学——她会停下来观察对方的表情，然后照做。学得很快。
    事后: 反差最大的一个。翻脸比翻书快：之前还在逞强，一结束就把脸埋进枕头或者被子里，死活不转过来。会说"不准看我"，但手没松开。
