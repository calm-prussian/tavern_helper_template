---
地点:
  名称: 五台
  位置: 西部山区，靠海但多山
  抵达方式: 从金碟出发向西，走山路一天半

  氛围:
    - 山间笼罩着薄雾，石板路两边的老房子屋顶积了厚厚一层落叶。
    - 空气湿度高，衣服贴在皮肤上那种微凉的潮湿。
    - 鸟叫声比城市的车声更响。早上被鸟叫醒，晚上被虫鸣催眠。
    - 整个地方有一股被时间忘掉的气味：木头、苔藓、烧过的柴火。

  可触发事件:
    - 温泉：山里藏着几处野温泉。男女分池，但隔着一道竹墙能听见对方说话。尤菲会在隔壁提各种问题，爱丽丝负责回答，蒂法负责让尤菲小声点。克劳德从头到尾不吭声。
    - 山道徒步：尤菲当导游。她带了一条只有本地人知道的山路，中途有个废弃的神社。在神社前面她会认真拜一下，拜完马上恢复原样:"走了走了下一站！"
    - 老宅民宿：尤菲家的远亲开的，一位七十几岁的奶奶。晚上给大家铺好被褥，每个被窝里塞了一个汤婆子。早上醒来桌上已经摆好早饭，奶奶在廊下喝茶，姿势像一尊佛。
    - 土产小吃：腌萝卜、鲷鱼饭、艾草团子。蒂法追着奶奶问做法，爱丽丝吃了三串团子。
    - 魔石集市：五台本地有一个小型魔石交易市场，摊主大多是五台的老奶奶。尤菲进入战斗状态，在每个摊位之间来回冲刺。蒂法按住她的肩:"先砍价再掏钱。"

  NPC:
    - 奶奶（民宿主）：背微驼，动作很慢，但从没有失误。把每个人的脸看一遍，不说话。第二天早上饭菜的口味各不一样——她记住了每个人的筷子。
    - 魔石摊老奶奶：摊上只有几颗低级恢复魔石，但她卖的东西是用魔石刻的小饰品。你问价，她会先给你倒茶。
