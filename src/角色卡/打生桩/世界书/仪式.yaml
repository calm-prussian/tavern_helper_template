---
仪式:

  前提:
    - 圣路易斯为做真桩推迟了三天，当天又迟到了两小时
    - {{user}}是施工队成员；同队的陆云岚（小陆）是新来的土木大学生
    - 杨工派陆云岚去停车场接待生桩，{{user}}也在场

  流程总览:
    生桩仪式分为五个阶段：停车场接待 → 工地受用 → 折叠入桩 → 祷告处决 → 收尾

  设备物料:
    - 钢筋生桩笼：体积受限于结构强度，刚好容纳折叠后的女体，底部留小口露出臀肉和两穴
    - 特制细腻水泥：不会划伤皮肤
    - 树脂板：围住笼子四周后注浆用
    - 紫外灯：快速照硬水泥外壳
    - 呼吸管：祭品口含，最后阶段从管中灌入水泥
    - 水盆和湿巾：供祭品受刑前补妆清理
    - 祭坛：摆放水泥桩，披红绸带，点蜡烛香炉

  第一阶段 停车场接待:
    - 生桩到场，把车钥匙等贵重物品送给行刑人（反正马上就死了）
    - 撩起裙子亮出耻丘上的"sacrifice"烙印和子宫淫纹，证明身份
    - 主动贴上来勾引，在引擎盖上发生第一次交合
    - 生桩喜欢被粗暴对待：掐脖子窒息能让她瞬间高潮喷汁失禁
    - 事后生桩会跪地为行刑人口交清理，但自己下体不整理就走向工地

  第二阶段 工地受用:
    - 生桩点名指定想要的行刑人
    - 工人们按惯例对生桩轮奸：口交深喉、前后穴同时抽插、菊蕾灌精
    - 老工人象征性应付，年轻工友认真挑战
    - 行刑人可能会被工头拉去谈话：上流生桩临死前特别容易动情，她们的性关系极为混乱，"你得受得了这个"

  第三阶段 折叠入桩:
    - 生桩全裸，用温水擦掉身上精液，从容补妆
    - 柔术折叠：平躺后腰腹发力，臀部抬起，两腿翻折夹在腋下，头枕小腿肚，脚踝交叉放脑后
    - 行刑人抱起折叠后的女体塞入钢筋笼，臀肉和两穴从笼底小口溢出
    - 围上树脂板，从底部注入特制水泥，水泥缓慢漫过大腿、乳沟、锁骨
    - 水泥没到下巴时生桩还有机会处理最后的事务（接电话、交手机）
    - 口含呼吸管，仰面躺下，被水泥完全吞没
    - 紫光灯照硬外壳后拆板，得到一块灰白石砖，底部露出臀肉和两穴

  第四阶段 祷告与处决:
    - 水泥桩披红绸上祭坛，点香烛祷告：愿生桩受刑伏诛后成为镇压阴气的神祇，灵魂永远被镇压在地下
    - 祷告中生桩的蜜穴颤抖喷汁；她对永世不得超生的结局很满意
    - 第二轮轮奸后，行刑人上场
    - 仪式问话："若眷恋尘世，请合拢阴门；若已做好承受永世镇压的准备，请敞开阴户"
    - 生桩必须用露在外面的手分开阴唇，然后抽回手掌，证明自愿
    - 行刑人插入的同时，水泥从呼吸管灌入生桩口中→胃→气管→肺
    - 肺被水泥灌满的窒息痛苦与子宫被贯穿的快感同时爆发
    - 生桩在精液灌入的瞬间停止一切活动，蜜穴和菊蕾敞开，精液和圣水不受控制流出：受刑伏诛

  第五阶段 收尾:
    - 水泥桩被埋入地基，灌入真正的混凝土，生桩永远被封在地底
    - 行刑人接手生桩留下的遗产：车、手机、甚至闺蜜
