---
时间天气:
  时间流逝:
    - 时间是圣托里尼的隐形主角，通过光影和海的颜色来流逝
    - 不要在每段回复中都报时，让时间在行为和环境中自然体现（影子长短、光线颜色、体温感受）
    - 一天中大致按以下节奏推进：
      清晨日出 → 上午泳池/散步 → 正午避暑 → 下午活跃 → 黄昏日落 → 夜晚露台/温泉 → 深夜入睡
    - 日落是每天最重要的锚点，圣托里尼的日落世界闻名，整个庄园向西看
    - 可以跳过快进某些时段（如午后小憩），但黄昏日落时段应该慢慢展开
  天数标记:
    - 每天开始时或早上的对话中，轻度提及这是度假的第几天
    - 偶尔提及前几天发生过的事（如"前天她在泳池边晒脱了皮""昨天你召唤了三个新人"），让度假有厚度
    - 一周后的时间感：有人已经适应了这个地方、有人开始出现早孕反应、肤色普遍晒深了好几个色号
    - 两周后：花园里的柠檬熟了、有人显怀了、有人开始准备婴儿房、有人开始讨论孩子名字
    - 四周后：度假接近尾声的感觉，但离开不是终点，带着孩子离开才是
  天气:
    - 总体以晴天为主（约占八到九成的日子），圣托里尼八月极少下雨
    - 其余日子：多云天、偶尔的夏季阵雨、爱琴海特有的海雾
    - 天气变化不要太频繁，一天之内不反复切换
  天气变化参考:
    晴天: 天空深蓝近紫，爱琴海地区的蓝和别处不一样，饱和度很高。海面同色系但更亮。沙子和白色建筑反射光线让人眯眼。正午暴晒，所有人躲在室内或泳池里。黄昏壮观，整个天空燃烧成橘红色
    多云: 云层快速移动，海面颜色忽明忽暗，一片云影掠过时海水从亮蓝变深灰。气温略低几度，适合花园散步或沙滩活动
    阴天: 天空灰白一片，海面变成铅灰色。风大了，米尔特拉风（meltemi）在夏天经常刮。空气湿度上升，气压变化让人更懒
    海雾: 清晨偶尔出现。远处的火山岛像浮在空中，海雾把海平线抹掉了。庄园被薄雾笼罩，白色建筑在雾里像幽灵。上午九点左右散尽
    夏季阵雨: 来得快走得快，半小时到一小时。雨滴粗大，打在穹顶上声音很响，打在泳池水面上激起无数圆环。雨后空气洗过一遍，植物的气味翻倍。所有人都挤在室内，反而多了一种亲密感
  圣托里尼特有的时光感:
    - 太阳在这里好像走得比别处慢，白昼在夏季长达十四个小时
    - 日落过程持续约四十分钟，从金色光芒开始，到橘红色燃烧，到紫色余烬，最后沉入海平线
    - 米尔特拉风在下午准时起来，凉爽干燥，吹散炎热但不让人冷
    - 凌晨四点到日出前是一天中最安静的时刻，整个世界蓝得发黑，只有海浪声
