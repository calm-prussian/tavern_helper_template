---
庄园场景:
  整体: 圣托里尼伊亚镇最西端的悬崖上，一座占地约两万平米的私人庄园。蓝白穹顶建筑错落分布在四层平台上，白色石板小径连接各个空间。九重葛、橄榄树、柠檬树、薰衣草穿插其中。从任何位置都能看见海，蓝得饱和的爱琴海
  主卧套房:
    位置: 庄园最高层，独占整个第三层平台
    布局: 约八十平米，三面落地玻璃窗，正对西向海面，无边框设计，躺在床上直视爱琴海和日落
    床: king size大床，白色真丝床单，六个枕头。床垫偏软。床头柜上总有一盘鲜无花果和一杯冰水，机器人趁你不注意的时候换的
    感官:
      视觉: 落地窗像一整面画框，爱琴海的颜色从清晨的灰蓝渐变到正午的深蓝到黄昏的紫金都在这个框里演出。凌晨的月光透过圆窗在床上画一个银白色的圆
      听觉: 隔音极好，关上门后只有空调的微弱气流声。打开窗，海浪拍打悬崖的闷响从下方传上来，有节奏地填充空间
      嗅觉: 真丝床单的淡香、海盐味从窗口飘进来、新鲜无花果的甜
      触觉: 床单凉滑、大理石地板被地暖烘得微温、赤脚走在上面正好
  私人无边泳池:
    位置: 主卧套房直接连通，悬挑在悬崖边缘
    布局: 约十五米长的长方形淡水泳池，一端浅一端深。池底铺浅蓝色瓷砖，白天被阳光照得池水发亮。趴在池边，水面的尽头和海平线在视觉上连成一片，像浮在空中
    感官:
      视觉: 正午时阳光直射池底，光斑在水下晃动成破碎的菱形。黄昏时整个池水被晚霞染成橘金色，水面变成融化了的金属
      听觉: 循环水泵的微弱水流声、海风、远处偶尔传来的海鸥鸣叫
      嗅觉: 池水的氯味被海风吹散得几乎闻不到，只剩下防晒霜的椰子味和九重葛的花香
      触觉: 池水微凉，地中海气候下刚好舒服的温度。湿皮肤被海风吹过后带走热量，起一层细密的鸡皮疙瘩
    时段:
      清晨: 池水平静如镜，海面也一样，两层蓝叠在一起，分不出界限
      正午: 太阳直射，水面反光刺眼，池边石材烫脚
      下午: 最舒适的游泳时段，阳光变斜，池水被晒了一天温度正好
      黄昏: 趴在池边看日落，逆光里整个人变成一个剪影，水珠从手臂滑落
      深夜: 池底LED灯是唯一的光源，把池水照成发光的蓝宝石色。水下抬头可以看到星空
  露天餐厅:
    位置: 第二层平台，葡萄藤架遮阳
    布局: 一张四米长的白色大理石长桌，高背藤椅围一圈。旁边是开放式厨房，机器人厨师在石砌烤炉前忙碌。头顶的葡萄藤已经爬满了架子，阳光透过叶子洒下斑驳的光
    感官:
      视觉: 白桌布、蓝边陶瓷盘、玻璃杯里的气泡水在阳光下闪着碎光。葡萄藤的影子在桌布上缓缓移动
      听觉: 烤炉里木炭的轻微爆裂声、刀叉轻碰瓷盘的声音、海风穿过藤叶的沙沙声
      嗅觉: 烤海鲜的焦香、橄榄油加热后的果香、新鲜柠檬切开后的清冽
      触觉: 大理石桌面冰凉光滑、藤椅被晒得微温、赤脚踩在石板地上，被太阳烤暖了
  温泉洞穴:
    位置: 悬崖半山腰，由天然火山岩洞改建
    布局: 洞穴式空间，约六十平米。中央是一个不规则的温泉池，池水自然恒温三十八度，富含矿物质呈淡乳蓝色。蒸汽从水面不断升起，在烛光中变成立体的光柱。周围散落着防水软垫
    感官:
      视觉: 只有烛光和池底暗暗的暖色灯照明。蒸汽让所有人影失去轮廓，在雾气里人只剩一个模糊的形状和一团暖色的光晕。水滴从钟乳石尖端往下落，在烛焰里闪一下
      听觉: 温泉水的轻微涌动声、水滴声规律地回响、说话声在岩壁上弹回后变得低沉
      嗅觉: 热矿物的微腥味、桉树精油的清冽、湿石头的味道
      触觉: 空气湿热厚重，皮肤上立刻蒙一层水汽。池水滑，矿物质让皮肤变滑，摸上去所有触感都被放大。石头地面粗糙温暖
  屋顶露台:
    位置: 主卧套房上方，通过白色旋转楼梯到达
    布局: 约六十平米，三百六十度全景，东面是圣托里尼岛的白房子和蓝穹顶、西面是爱琴海和日落、南面是远海、北面是伊亚镇。几张大号躺椅和软垫散落
    感官:
      视觉: 站在这里是整个庄园最高的位置。日落前半小时，整个天空从淡金渐变到橘红到粉紫，像有人在水彩盘上一次次加水。海面变成镜面反射天空，天海交界处是一道模糊的金色线。入夜后星空在没有光污染的天空中清晰到可以看见银河
      听觉: 海风在这里最大、海浪声从下方远远地传上来、偶尔伊亚镇方向飘来遥远的钟声
      触觉: 海风凉爽但不冷，地中海夏天的晚风像抚摸。躺椅的靠垫吸了一天的太阳热现在余温正好
  花园迷宫:
    位置: 庄园底层，依着悬崖缓坡延伸
    布局: 九重葛、橄榄树、柠檬树、薰衣草、迷迭香错落种植，白色碎石小径在其中蜿蜒。有多处隐秘的小空地被植物围合，走进去才发现的安静角落
    感官:
      视觉: 九重葛的紫红、薰衣草的淡紫、柠檬树的深绿和明黄果实，在白色墙体和蓝色穹顶的背景下饱和度特别高。光影穿过枝叶在人身上画斑马线
      听觉: 蜜蜂的嗡嗡声、碎石在脚下的沙沙声、远处海浪的低频
      嗅觉: 薰衣草和迷迭香的混合、柠檬树叶揉碎后的清苦、被太阳烤热的泥土
      触觉: 碎石硌脚、柠檬树叶从手臂上擦过去凉而顺滑、橄榄树粗糙的树皮蹭过肩膀
  私人海滩:
    位置: 悬崖底部，通过一段白色石阶从庄园直通
    地形: 圣托里尼特有的火山黑沙滩，沙粒是暗色火山岩碎屑，在阳光下泛着微弱的金属光泽。沙质粗糙但干净 海水在这里更深，走出几步就没了腰。黑沙吸收了更多太阳热量，所以沙面比别处更热
    感官:
      视觉: 黑沙和白色浪花的对比度极高，浪打上来时泡沫在暗色底上白得刺眼。从沙滩往上看，白色悬崖上庄园的蓝穹顶像一个悬挂的梦
      触觉: 黑沙烫脚到需要小跑着下水。沙粒粗糙，跪在上面膝盖会留下细密的凹印。海水清凉，地中海的夏季水温约二十五度
  设施总览:
    - AI管家（一只）：白色外壳，履带驱动，声音温和。负责所有服务和沟通
    - AI厨师（两台）：在开放式厨房和石烤炉间工作。会做地中海菜系、日本料理、中餐，被召唤角色的饮食偏好它会记得
    - AI清洁（若干）：小型圆盘式，夜间工作。白天几乎看不见
    - 物资：香槟整箱、食材每日由无人机从费拉镇补给、安全套和润滑剂按箱计，但角色们大概率不想用
