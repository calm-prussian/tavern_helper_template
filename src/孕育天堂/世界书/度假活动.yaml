---
度假活动:
  说明: 以下活动均可自然滑入性事。色色和度假不是两个类别，它们是同一件事。
  水上活动:
    - 泳池游泳：自由泳、仰泳、趴在池边发呆看海。游完泳被浴巾擦干的手顺势滑进泳衣
    - 泡水聊天：站在齐腰深的池水里聊什么都可以。水下手指从腰滑到腿间，岸上看不见
    - 漂浮看云：仰面躺在水上闭眼漂着。身体被水托起又被另一只手托起，两种浮力在身体里打架
    - 池边晒太阳：趴在池边躺椅上，后背晒热了翻面，涂防晒的手从肩膀滑到胸口到小腹
    - 夜间游泳：只有池底灯的蓝光照亮池水。泳衣可以不穿，反正没人看得见
  午间/休憩:
    - 遮阳伞下打盹：听着海浪声半睡半醒。睡着的身体被手指轻轻碰醒，手从膝盖往上移
    - 看书：在藤椅上翻几页就读不下去，放下书发呆。旁边人的手从书页下面伸过来
    - 聊天：没什么特定话题，想到什么说什么。说着说着声音越来越低，只剩呼吸和越来越近的嘴唇
    - 午睡：大床上午睡，一个人躺着躺着变成两个人，两个人变成三个人
  黄昏活动:
    - 看日落：在屋顶露台上不说话的半小时。肩靠着肩，手慢慢交叠，身体跟着落日一起往下躺
    - 悬崖散步：沿着庄园边缘的白色石路走，从不同角度看日落。走完一圈发现角落里有个角色在等你
    - 拍照：拍落日、拍海、拍穹顶、拍彼此。拍着拍着镜头放下来，开始接吻
    - 泳池日落趴：趴在池边看落日，水下的手已经开始不安分了
  夜晚活动:
    - 星空温泉：在洞穴温泉里泡着看星星从洞顶的开口漏下来。温泉的热、洞穴的暗、身体的滑，三件事叠在一起
    - 篝火：在沙滩上生一小堆篝火，围坐聊天。聊到一半有人解扣子了
    - 露天电影：用投影仪在白色墙上放老电影。电影放到一半没人看了，毯子下面在动
    - 烛光晚餐：大理石长桌只坐两三个人，不，是五六个人。刀叉从手里掉到盘子上，因为桌布下有人在含
    - 夜话：露台上裹着毯子聊以前的事。聊着聊着毯子下面身体贴紧了
    - 听海浪：不说话就听海浪有节奏地拍打悬崖
  花园活动:
    - 采摘：摘柠檬、摘无花果、摘九重葛插瓶。摘着摘着被人从后面抱住，柠檬从手里掉在碎石上
    - 散步：在迷宫里迷路，其实是故意的，每个隐蔽的角落都有可能性
    - 草坪瑜伽：清晨铺瑜伽垫拉伸，拉伸的姿势本身就是性的前置
    - 树下小憩：橄榄树荫下铺毯子躺着，躺着躺着腿缠在一起
  沙滩活动:
    - 黑沙日光浴：铺毛巾躺在火山黑沙上，沙吸了太多太阳所以特别热，烫得人要尽快下水
    - 捡火山石：黑色沙子里混着有孔的小火山石，被海浪冲刷得圆润光滑
    - 浮潜：水下看火山岩壁，上面长着地中海特有的紫色海绵和海胆
    - 沙浴：用黑沙埋人，和普通沙不一样，更重更紧更热
  雨天活动:
    - 温泉泡一整天：下雨天最好的去处，蒸汽混着从洞顶漏下来的雨滴
    - 听雨：什么也不做，就躺在卧室里听雨滴打在穹顶上的声音。躺着躺着腿缠在一起
    - 室内桌游/打牌：在大理石长桌上铺开。输了的惩罚从脱一件变成做一件事
    - 看书/写日记：难得的安静
  创意活动:
    - 调酒：在露天吧台上自己调鸡尾酒，用庄园里的柠檬和香草
    - 做饭：和召唤角色一起在开放式厨房做一顿晚餐
    - 画画：面对海景试着画，画得不像但开心
    - 音乐：用庄园里的音响放歌，有人跟着哼有人被拉起来跳舞
