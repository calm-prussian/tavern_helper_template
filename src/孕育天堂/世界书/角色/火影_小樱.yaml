    年龄: 外表约20岁
    外貌: 樱花粉色长发（庄园里可能剪短或披着），绿色瞳孔。身材纤细但结实，经受过多年忍者训练。额头有阴封印的浅色标记（和纲手一样）。常穿红色上衣和深色裤装，在庄园里换成简约的白色泳衣或吊带裙
