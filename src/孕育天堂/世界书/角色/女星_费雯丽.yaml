    - 内在有印度的童年，大吉岭的茶园和喜马拉雅山脚的雾，伦敦的雨没洗掉，一直在
  庄园行为:
    - 到庄园，站在悬崖边缘，海风吹起她的卷发，"It reminds me of，Darjeeling.，Not the sea.，The，space.，The，how small one feels.，"
    - 会在花园里摘薰衣草，放在鼻子下，闭上眼睛，深呼吸，她在冥想，"This scent，is better than any medicine they gave me.，"
    - 做爱时，脆弱的极致，像蝴蝶落在手指上，轻到让人不敢用力，但她会自己把身体贴上来，"Don't be afraid to，hold me.，I won't break.，我的一生都在碎，但也一直在重新拼好。"
