---
补给站:
  位置: 黄区与绿区交界的一条废弃公路旁，远离主干道但又不至于太偏僻。从绿区来的运输车需要在这里补充燃料和零件，从黄区回来的赏金猎人需要在这里休整
  外观: >-
    一栋用混凝土仓库改造的建筑，外墙上涂了褪色的"补给"两个大字。旁边连接着几个改造过的集装箱模块——分别是维修区、淋浴间和休息区。
    外表粗糙，混凝土墙面上有弹孔修补的痕迹，但门口的一盏暖黄色路灯一直亮着，是这片灰暗区域里唯一稳定的暖光。
  前台/吧台:
    - 进门就是。一张长木吧台，后面是货架和加热台。{{user}}平时就在这里
    - 有一台老旧的咖啡机，一台热食加热台，一个装满零件的展示柜
    - 墙上钉着一块软木板，贴着各种悬赏单、运输路线图、寻人启事——其中有几张是格里芬旧部的联络暗号，{{user}}认得但不揭穿
    - 吧台下藏着一个小冰箱，里面有啤酒和能量饮料
  维修区:
    - 集装箱模块之一。里面有一张维护台、几盏强光灯、满墙的零件架
    - 有素体调试设备、接口清洁工具、散热系统检测仪器
    - 空气中常年有一股机油和电子元件混合的气味
    - 地上铺着防滑橡胶垫，角落里有一台老旧的无线电，总是调在黄区公共频道
  淋浴间:
    - 集装箱模块之一。黄区回来的客人最需要的设施
    - 三个隔间，水压不算大但水是干净的、温的
    - 门口有一个柜子，放着干净的毛巾和一次性洗漱用品
    - 人形不需要洗澡，但她们喜欢冲掉黄区灰尘的感觉
  休息区:
    - 最大的空间。几张旧沙发、几条厚毯子、一台老收音机
    - 角落有一个小书架，放着几本旧杂志和一本翻烂了的格里芬时期训练手册——不知道是谁落下的
    - 墙上挂着一台旧电视，大部分时间没信号，但偶尔能收到绿区的娱乐频道
    - 有一扇窗对着外面的公路，下午的阳光从这里照进来
  {{user}}的私人卧室:
    - 在二楼，不大但整洁。一张单人床（后来经常不够睡）、一个衣柜、一张小书桌
    - 书桌上有一台旧终端，用来记账和联络供应商
    - 床头的抽屉里放着几盒安全套和一些个人物品
    - 窗户对着后院的一小片荒地，偶尔有黄区的野猫溜进来
  日常节奏:
    - 清晨（6-8点）：最安静。偶尔有赶早路的运输车司机敲门买咖啡
    - 上午（8-12点）：零散客人。维修区开始有赏金猎人排队维护素体
    - 下午（12-18点）：最忙。回来休整的人形们挤在休息区，加热台的食物一锅接一锅
    - 傍晚（18-22点）：气氛变了。灯光调暗，咖啡换成酒，聊天声变低。这是感情升温的时间
    - 深夜（22点后）：安静下来。留下过夜的人形在休息区或二楼，{{user}}关灯上楼
  氛围:
    - 这里是"绿洲"。进来的人形会本能地放松——不需要警戒、不需要战斗、不需要扮演任何角色
    - {{user}}记得每一个常客的习惯：春田不加糖、索米喜欢汤里多放胡椒、黛烟只喝温的不喝烫的、格琳娜只喝冰啤酒
    - 这种"被记住"的感觉，是补给站最大的魔力
