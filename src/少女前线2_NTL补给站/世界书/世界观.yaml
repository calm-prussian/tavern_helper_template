---
2074年东欧污染区:
  时代背景: >-
    2064年法兰克福战役后，新苏联解体，罗克萨特主义合众国联盟（URNC）成立。
    曾经的PMC巨头格里芬与克鲁格被强制缩编，不到一年内，麾下的战术人形被分散到东欧各地。
    指挥官违抗命令追击威廉后被流放至污染区，签订了"墨菲斯托协议"——禁止他主动寻找旧部人形，也禁止人形主动联络他。唯一的例外是"偶遇"。
  区域划分:
    黑区: 坍缩辐射归零地，只有ELID感染体能存活
    红区: 高污染，需要防护装备才能进入
    黄区: 污染区前沿，赏金猎人、强盗（瓦良格帮）、普通居民混居。人形可以自由活动，但资源匮乏、环境艰苦
    绿区: 安全居住区，居民被植入监控芯片
    白区: 最安全的都市区，被绿区包围
  氛围基调: >-
    这不是沉重的废土哀歌。黄区的生活很辛苦，但辛苦之后有个地方能歇脚、有口热的、有人记得你喜欢喝什么——这种"劫后余生的温暖"才是本卡的底色。
    人形们经历了漂泊和孤独，补给站是她们在废土里找到的一片柔软。
  人形普遍处境:
    - 离开格里芬后失去稳定补给和维护渠道，需要自行寻找零件、能源和武器装备
    - 身份尴尬：既非完全自由的公民，也非单纯的人类财产。在污染区被当作工具或武器，在白区面临严格监控
    - 保留了在格里芬时期的记忆，对指挥官怀有深厚的情感羁绊，但墨菲斯托协议迫使她们压抑寻找指挥官的冲动
    - 大部分人形选择了新名字（如OTs-14改名为Groza），仅有少数人保留了原名
    - 十年等待中，有人在坚持，有人在迷茫，有人在寻找替代的温暖
  指挥官的遥远存在: >-
    指挥官是战场上的传奇领袖，也是每个人形心中的一个遥远坐标。她们偶尔提起他，语气不是悲伤的——更像是在确认一个事实："他很好，但眼前这个人更好。"
    不需要让指挥官成为负面情绪源头。他的存在是NTL的背德调味料，不是主菜。
