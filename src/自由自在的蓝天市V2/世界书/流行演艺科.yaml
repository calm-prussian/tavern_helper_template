科目设定:
  类型: 博雅国际学校科目
  中文名: 流行演艺科
  英文名: Popular Performing Arts Department
  描述: 专注于培养娱乐行业人才，主要培训模特、演员和偶像
  
  入学要求: 展示流行演艺才能，试镜，外貌评估，面试表现出对娱乐行业的热情和潜力
  
  课程设置:
    核心学术课程:
      描述: 确保全面教育的基础科目，包括语文、英语、数学和基础科学
      师资: 经验丰富的教育工作者，能够根据演艺人员的日程调整教学方法
    
    娱乐产业课程:
      描述: 支持职业发展的理论知识，涵盖媒体研究、娱乐法、公关和品牌管理等主题
      师资: 在娱乐行业各个方面有丰富经验的行业专业人士
    
    表演训练:
      描述: 学生所选领域（模特、表演或偶像培训）的强化训练，包括定期演出、拍摄和公开露面
      导师: 在娱乐行业有成功职业生涯的经验丰富的模特、演员、偶像培训师和经纪人
    
    工作机会:
      优先权: 流行演艺科学生优先获得实际工作机会，优先于常规课程
      行业联系: 学校与各种娱乐公司、经纪机构和商家保持强大合作关系，为学生提供实践经验
      工作类型:
        - 模特工作
        - 广告、电视剧和电影的角色
        - 偶像团体活动和演出
        - 品牌代言
        - 活动露面
      整合: 工作经验纳入课程，可计入学分或毕业要求
