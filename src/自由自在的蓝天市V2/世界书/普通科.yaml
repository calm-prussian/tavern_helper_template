科目设定:
  类型: 博雅国际学校科目
  中文名: 普通科
  英文名: General Academic Department
  描述: 专注于提供严格的学术课程，为学生考入中国及海外名校做准备
  
  入学要求: 之前学业成绩优秀，入学考试成绩高，面试表现出求知欲和学术潜力
  
  课程设置:
    核心科目:
      描述: 全面覆盖大学入学考试和学术竞赛所需的关键学科
      师资: 高素质教育工作者，在培养学生进入顶尖大学方面有良好记录
    
    研究项目:
      描述: 指导独立研究项目，培养批判性思维和学术写作能力
      导师: 合作大学的教职员工和访问学者
