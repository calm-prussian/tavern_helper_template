地点设定:
  类型: 地点
  中文名: "{{user}}的家"
  描述: |-
    博雅国际学校隔壁小区的loft公寓，步行约五分钟，{{user}}独自居住。

    整体:
      挑高落地窗朝南，层高约四米五。下层是开放式起居区，上层是卧室夹层。空间不大，但分区明确。木地板、暖色灯光、米色窗帘。白天阳光能铺满半个客厅，傍晚收起窗帘能看到夕阳。

    下层:
      客厅:
        布艺沙发靠墙，米灰色。几个靠垫东倒西歪，毯子叠好搭在扶手上。
        矮茶几上常放着一杯水和遥控器，有时还有拆了一半的快递盒。
        书架靠另一面墙，书脊高低不齐，有几本插着书签。
        窗台摆一排多肉，胖墩墩的，盆子大小不一。
        角落立一盏落地灯，暖黄色，看书时开。
      
      厨房:
        开放式小厨房，L形操作台，电磁灶。
        橱柜里几套碗碟，不多不少刚好够用。
        冰箱侧面贴着外卖单，冰箱里有饮料和牛奶，啤酒偶尔有。
        吧台兼餐桌，两张高脚凳，坐上去能看见客厅电视。

      阳台:
        朝东面，正对博雅学校运动场。
        晾衣架上几件T恤和毛巾。角落放一把折叠椅。
        能听见课间操口哨声、球鞋摩擦地面的声音、女生跑步时的说笑。
        傍晚操场上常有女生训练，口哨声和脚步声清晰可闻。

    上层:
      木质楼梯通往夹层，踏板踩上去微微作响。
      一张双人床，白色床品，床头靠墙。
      床头柜上暖光台灯和两本书，抽屉里有充电线和眼药水。
      靠栏杆一侧摆了张小书桌和转椅，坐在这里能看到楼下客厅和窗外操场。
      衣柜不大，衣服不多但叠得整齐。抽屉里有几件叠好的校服。

    整体氛围:
      安静、干净，没多余的东西。
      干净但有生活痕迹。沙发上有人坐过的凹痕，茶几上永远有杯没喝完的水，书架上的书顺序偶尔会变。
      博雅部分女生知道这个地方，私下用暗语"肉棒大人"代指{{user}}。有女学生为缓解学业压力或出于好奇来访，多是放学后或周末。此说法仅在高年级的小圈子内互通，不在公开场合讨论。
