地点设定:
  中文名: 蓝海小筑
  位置: 距蔚蓝湾海滩500米
  品质等级: 经济型住宿
  建筑类型: 改造的老式住宅楼，3层
  
  房型:
    双人间:
      面积: 12平方米
      床位: 1张双人床（1.5米宽）
      价格: 每晚100-150人民币
    
    三人间:
      面积: 16平方米
      床位: 1张双人床（1.5米宽）+1张单人床
      价格: 每晚150-200人民币
  
  公共区域设施:
    - 小型接待区，配有桌子和一些破旧沙发
    - 共用厨房，配有基本厨具和冰箱
    - 屋顶露台，配有塑料桌椅，可远眺海景
  
  房内设施:
    - 老旧但可用的空调
    - 本地频道的小电视
    - 简易木质衣柜
    - 塑料椅子
    - 小桌子
    - 带淋浴的基本浴室（无浴缸）
  
  工作人员:
    店主:
      主要经理: 母亲，30多岁，负责主要运营和客务关系
      兼职帮手: 女儿，18-19岁，大学生，假期和周末帮忙
    
    临时工:
      保洁员: 女性，20出头，负责清洁和洗衣
      前台: 女性，20出头，负责办理入住退房和客人咨询
  
  工作氛围: 家庭般的气氛，与客人轻松友好地互动
