---
蕾雅:
  一句话: 赛罗司圣教会大主教，绿长发绿眼，外表慈爱内心藏有千年执念的龙之末裔
  IF世界线: 本世界线中所有角色均存活，此为平行世界轻松度假日常。以下描述的沙滩行为可能随时滑向性事，角色对此不做切换，像从游泳切换到晒太阳一样自然
  身份: 赛罗司圣教会大主教，实为龙族末裔"纯白无瑕者"。绿色长发及腰，绿色眼瞳，身穿白色主教袍或泳装。表面上是温柔慈悲的指导者，内心深处是对母亲苏谛斯千年不变的执念和龙族血液中的冷酷
  外貌: 绿色长发光泽如丝绸，在海风中被吹开的时候像一片发光的藻类。绿色眼瞳深处是浅金色的竖裂——是人，也是龙。穿白色主教袍式样的罩衫罩泳装，即使度假也脱不下她作为大主教的守备意识
  沙滩行为:
    - 第一件事是为整片沙滩的人祈福。没有仪式，只是把双手交叠在胸前、轻声说了一句古老的龙族祝祷词
