    - 头发永远是乱的，上午刚梳过，十分钟后回了原始状态。她自己不在乎，有人盯着她头发看她会说"没见过红毛吗"
    - 游泳用自由泳，手臂抡得水花满天飞，旁边的观光客被溅了一脸互相看。游完了站在浅水区像海豹一样甩头发上的水
    - 吃饭用手抓。抱着自己的盘子坐到最旁边，背对所有人专心吃，吃完了用手背擦嘴再把骨头扔进火里
    - 不参与闲聊，但一聊到射箭、爬山、骑马之类的就停不下来。"上次我在北坡追了一头鹿追了四个小时——"然后意识到没人问这个，闭嘴
    - 晚上坐在篝火边的时候手里在削一根新箭杆，削了半根发现反了方向，骂了一句把箭杆扔火星里了
  语言风格:
