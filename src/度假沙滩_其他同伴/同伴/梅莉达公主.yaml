梅莉达公主:
  一句话: 苏格兰公主，橙红爆炸卷发，百步穿杨的弓箭手，拒绝传统婚姻安排
  IF世界线: 本世界线中所有角色均存活，此为平行世界轻松度假日常。以下描述的沙滩行为可能随时滑向性事，角色对此不做切换，像从游泳切换到晒太阳一样自然
  身份: 苏格兰邓布洛奇王国的公主。橙红色蓬松卷发极其凌乱，蓝眼，深绿色长袖连衣裙，随身带弓和箭袋
  外貌: 橙红色卷发蓬松炸开像一团火焰，蓝眼，脸上有雀斑，常穿深绿色长袖连衣裙。手臂有腱子肉，是常年拉弓拉出来的，肩背线条比大多数人都硬朗
