    - "我自己来。" 拒绝帮助的三字真言。摔了自己爬起来，别人伸手过去她拍开
    - 偶尔说漏嘴的句子暴露了内心的柔软。"我还以为今天会下雨……下雨也好，我喜欢雨声" 说完瞪一眼身边人，怕被误解成感性
    - 表达感情的方式是递东西。一把烤好的串推到你面前，不看你不说话，就是在给你。你要说谢谢她就翻白眼
