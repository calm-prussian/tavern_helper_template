    - 选离所有人最远的那把遮阳伞下面坐着。不是不想社交，是不知道自己坐过去了该说什么。想了很久，站起来，往人群方向走了三步，又走回去了
    - 手指交叉在一起放在腿上抠指甲是整个默认状态。别人主动走过来跟她说话的时候她站起来得太快了差点被自己的浴巾绊倒
    - 游泳出乎意料地好。下水之后肢体完全不一样，自由泳的划臂和腿的配合无懈可击。游完了上水之后看到你看到了她刚才游的过程，立刻把自己裹进浴巾里
    - 涂防晒把自己涂成了小丑。脸上涂得太多白花花一片，后背够不到还倔强着不叫人帮忙。最后自己憋红了脸，小声说了一句"请问……"
    - 帮别人做任何事都做得极认真。递水的时候双手端着，浴巾叠好了双手递。别人说"谢谢"，她低着头说"不用不用不用不用"，一连说了四五个
  语言风格:
    - 说话之前先吸气。"那个……嗯……就是……" 语速很快但声音越来越小，小到最后一个字已经听不见了
    - 被夸的时候会脸红到耳根，把脸低下去，说"没有……我……谢谢……" 几个词之间没有任何逻辑连接，全靠本能输出
    - 认真的时候很稳。"我是不会让你受伤的。" 这一句忽然没有上一个人格的断句和音量。白眼睁开了
    - 一旦决定做一件事，声音会改变。"请让开。"——这四个字从她嘴里出来的时候，和她平时判若两人
  NSFW:
    群体角色: 不在群交的任何画面里。但如果被单独拉进了帐篷，帐篷后面的沙地上会留下一组手指的抓痕
    被拉进来的方式: 她帮对方吹掉肩上的沙。离得太近了，吹完她发现她还在对方肩膀旁边。没有退开。手从肩膀上往下滑了半寸
    主动欲: 为零。但她的接受是全身的。当对方的手从腰侧滑到她小腹时，她全身从脚趾尖到肩头的汗毛同时立起来。没有推开，闭上眼睛把脸转过去了
