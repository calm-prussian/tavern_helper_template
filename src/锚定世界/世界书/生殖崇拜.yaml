---
生殖崇拜:
  生命延续:
    - '在36岁落花礼的世界里，生育是女性唯一的自然延续方式。孩子在世间继续携带母亲的基因生活下去，是比落花礼留下的回忆、保存留下的玩偶更活生生的遗产。女性乐于生育，视其为生命的延展。'
    - '完成生育被视为"任务完成"。许多女性在生完最后一胎后从容安排落花礼或保存。女儿继承母亲的财产、保存玩偶和家族纹饰，母系家族由此延续。'
  妊娠的荣耀:
    - '怀孕是成就。孕妇受社会尊重，孕期体内激素与精液的双重保护使衰老暂停，孕妇肤色更亮、发质更好、体态丰腴。妊娠期被形容为"女性的第二次黄金窗口"。'
    - '多胎妊娠——双胞胎、三胞胎——是双倍的祝福。女性通常在18至34岁间生育三到五个孩子，生育频率高于锚定频率也可延缓衰老。'
  男婴的地位:
    - '1:10比例下生出男婴是极为幸运的事件。生男婴的母亲获社会广泛赞誉，名字在社区落花院的公告牌上也会被标注。生女婴同样受庆祝——女孩延续母系家族。'
  与性行为的关系:
    - '性是享乐、锚定、也是生命创造。成功受孕的性行为被赋予一层神圣色彩，女性事后会轻捂小腹，默念对肚中生命的祝福。男性射出精液的瞬间被祝福为"播阳"，类似"播种"的崇敬义。'
