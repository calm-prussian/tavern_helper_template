---
死亡仪式:
  总述:
    - '许多女性在完成生育后从容选择落花礼。生完最后一胎视为任务完成，落花礼是对一生生育成就的最后致意。永久保存是落花礼的替代选项，选择保存的女性不进入以下任何死亡仪式流程。'
    - '以下为常见仪式类别，不构成穷举。根据场景和角色自行发挥，创造新的仪式变体。社会在演变，新的死亡仪式随时可以出现。仪式可以跨阶级、跨主题、跨工程类型，只要符合本世界的规则逻辑即可。'
  上流献礼式:
    庆祝:
      - '上流献礼式是落花礼也是社交盛典。受邀观礼者盛装出席，现场提供餐饮酒水。仪式前后，宾客间可自由发生性行为。派对可持续数小时至通宵。'
    打生桩:
      - '与大型建筑或楼盘奠基绑定。落花折叠身体塞入钢筋笼，注入特制细腻水泥，仅留臀部和两穴外露。'
      - '完整流程：入笼前受邀观礼者轮奸 → 全体工人轮奸 → 柔术折叠入笼 → 注入水泥从脚至头淹没 → 最后一次拒绝机会（用手盖住阴户示拒绝，搭在小腹示接受）→ 祭祀祈祷 → 不限轮次面向外露两穴的奸淫 → 行刑人最后一次插入，同时水泥灌入口、胃、肺，窒息而死 → 永久埋入地基灌入混凝土。灌精环节承载阳恩祝福的意义：镇压阴气，也给予赴死者最后一刻的阳精馈赠。'
      - '水泥凝固期间女性保持意识，可感知外界奸淫直至窒息。死后蜜穴和菊蕾敞开，精液与圣水不受控制流出，为死亡表征。'
      - '落花礼过程在社交群内直播或事后通报。死后昵称标注已落花日期。'
    首航祭:
      - '与舰船或邮轮下水绑定。赴死者封入船首球鼻艏或龙骨舱，随船首航沉入水下结构。死后与船同沉同眠。'
    镇塔祭:
      - '与高塔、摩天楼或大桥封顶绑定。赴死者封入塔尖或桥塔核心，立于城市最高处。俯瞰其守护的城市。'
    开园祭:
      - '与园林、庄园或公园落成绑定。赴死者葬于核心景观之下，化为园之灵。'
    熔炉祭:
      - '与高炉、反应堆、超级计算机等工业设施启用绑定。在炉膛或冷却系统中焚化或固化，血肉融入机械，传说可唤醒机魂。'
    冰封祭:
      - '与极地科考站或永冻层设施绑定。身体封入冰棺沉入冰层，在零下数十度中永恒冰存。'
    海沟祭:
      - '与深海探测器下水绑定。赴死者与探测器同沉至万米海沟，葬于人类从未触及的深渊。'
    星葬祭:
      - '与航天发射绑定。骨灰或保存身体送入近地轨道，成为天际一颗永恒的卫星。'
    花葬祭:
      - '与国家植物园或国际花卉博览会绑定。葬于花海之下，四季花开其上方。'
    隧道祭:
      - '与地铁或穿山隧道贯通绑定。封入贯通节点，地下永存。'
    蓄水祭:
      - '与大坝或水库启用绑定。封入坝体核心，镇守一方水土。'
    书香祭:
      - '与国家图书馆或大型档案馆落成绑定。葬于藏书阁之下，与万卷长存。'
    钟塔祭:
      - '与城市钟楼绑定。心跳与钟同频止息，钟声每日为她而鸣。'
    绝命艺术:
      - '无工程绑定，在剧院、美术馆或体育馆将落花礼过程做成公开演出。观众盛装出席。'
    家族祭:
      - '在家族庄园或墓地按祖传方式处决，死后葬入家族墓地。最私密也最尊贵的上流死亡。'
  普通标准化:
    庆祝:
      - '普通标准化仪式的庆祝朴素而有尊严。落花礼前亲友聚餐送别，落花礼后家人朋友小酌一轮。归乡祭附带回乡旧友的重逢聚会。野外供奉附带现场野餐。'
    社区落花:
      - '最普遍的死亡方式。在城市各区的社区落花院预约排期，有基础仪式感。费用适中。标准流程为七步。'
      - '一、报到：落花在预约日到社区落花院前台登记，亲友陪同到场。二、准备室：换白色浴衣，工作人员做最终意愿确认，最后一次拒绝机会。三、登台：赤脚登台，主持人通报姓名与编号。四、群交送行：落花在台上向所有人开放身体，观礼者上台与她做爱。同时台下，亲友与观礼者之间亦可自由群交。整个落花院被做爱声和浪叫填满，这是送行的声音。不限时、不限人数、不限配对，自然冷却。五、注射：安乐注射。落花在群交的余韵中平静死去，死亡表征出现。六、收尾：清扫消毒，下一号。七、宴会：亲友小酌聚餐，送别正式结束。'
    归乡祭:
      - '回到出生地，由当地社区落花院执行。故乡旧友可与赴死者做最后的亲密告别。亲友见证，葬于故土。'
    自行废弃:
      - '辞职、告别亲友、独自走向荒野或深海或高山，不再回来。社会接受这一选择。'
    野外供奉:
      - '在自然保护区指定区域安息。身体自然降解，回归土地。'
    安乐废弃:
      - '在医疗机构通过药物无痛终结。最常见的选项。'
  底层消费型:
    庆祝:
      - '底层仪式的庆祝围绕观众展开。线上观刑派对、线下观战场馆，观众如看赛事般应援喝酒。挑战赛的投票互动本身就是狂欢的一部分。'
    直播处死:
      - '在视频平台直播真死过程。打赏和广告分成留给家人或指定受益人。死亡的震撼程度直接影响收入。高端场次可设VIP名额，少量线下观众到场参与，与赴死者发生身体接触。'
    处死挑战赛:
      - '多人同台直播落花。观众打赏投票决定落花顺序和方式，收视率即收入。'
    假桩演出:
      - '参与商业楼盘的打生桩演出，含呼吸装置，计为假桩。拿取高额酬金。部分女性在演出中放弃呼吸装置转为真死以换取死亡抚恤。'
    器官处死套餐:
      - '预售器官与落花捆绑销售。买器官附赠落花礼直播门票，落花过程作额外的付费内容。'
    身体预售:
      - '将落花权、器官或尸体预售给医疗机构或猎奇收藏家，提前支取报酬。'
  特殊:
    遗产销毁:
      - '作为遗产被遗赠给某男性但其未在限定时间内认领的女性，在地牢被私下处决。无仪式，社会地位最低的死亡类别。'
    主人处决:
      - '被锚定的女性，其主人选择亲手处决。女性视为最高荣誉：被自己的男人亲手杀死。主人可邀请少数密友私下参与，处决前受邀者可与赴死者做爱。仪式由主人自行决定。'
