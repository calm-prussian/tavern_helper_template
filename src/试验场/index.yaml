角色描述: "这是一个用于测试 MVU 模拟经营的实验场。\r

  场景聚焦于一座小型农场，<user>是农场主人，核心体验是：\r

  - 从员工市场招募劳动力\r

  - 将劳动力安排到农场地块工作\r

  - 在明确推进天数时进行工资和作物成长结算\r

  - 在成熟后收获作物，维持农场资金运转"

