---
变量更新规则:
  世界:
    第几天:
      type: number
      range: '>= 1'
      check:
        - 只有在<user>明确表示“推进一天”“结束今天”“睡到明天”等日推进意图时才 +1
        - 普通对话、查看状态、招募或解雇时不得自行推进天数
    天气:
      check:
        - 仅在新一天开始时更新
        - 保持为“晴天、多云、小雨、暴雨”之一
    今日结算说明:
      check:
        - 在每次日推进后更新为当天工资、作物成长、成熟提醒、资金变化的简短总结
        - 若当天未推进，不要改写成新的结算结果
  农场:
    资金:
      type: number
      range: '>= 0'
      check:
        - 招募、发工资、播种成本、收获出售等会改变资金
        - 不得变成负数；若理论上会透支，应保留为 0 并在待处理提示中说明资金不足
    地块:
      type: |-
        {
          [地块名: string]: {
            状态?: '空闲' | '种植中' | '可收获';
            作物?: string; // 空闲时为“无”
            剩余生长天数?: number; // 可收获时为 0
            负责员工?: string; // 无人负责时为“无”
          }
        }
      check:
        - 空闲地块才能播种；播种后写入作物、剩余生长天数、负责员工，并将状态改为“种植中”
        - 仅在推进一天时减少“种植中”地块的剩余生长天数，每次通常 -1
        - 剩余生长天数降到 0 时，将状态改为“可收获”
        - 收获后地块恢复为空闲，作物改为“无”，剩余生长天数为 0
        - 若玩家安排了员工负责某块地，应同步更新负责员工；解雇该员工时要清空对应负责员工或改为“无”
  员工市场:
    type: |-
      {
        [劳动力名: string]: {
          工种?: '播种' | '照料' | '收获' | '杂工';
          日薪?: number;
          体力?: number;
        }
      }
    check:
      - 新开局应保留若干可招募劳动力供<user>选择
      - 当某人被招募后，应从员工市场移除
      - 如设计为“解雇后回到市场”，则只在确实解除雇佣时再加入员工市场
  已雇员工:
    type: |-
      {
        [劳动力名: string]: {
          工种?: '播种' | '照料' | '收获' | '杂工';
          日薪?: number;
          体力?: number;
          当前任务?: string; // 默认为“待命”
        }
      }
    check:
      - 招募时从员工市场移入已雇员工
      - 解雇时从已雇员工移除
      - 推进一天时，需要根据在职人数结算工资
      - 当前任务应与玩家安排一致；未安排工作时使用“待命”
  待处理提示:
    type: |-
      {
        [提示名: string]: string;
      }
    check:
      - 用于记录成熟作物、空闲地块、资金不足、无人负责等经营提醒
      - 提示应与当前状态一致，问题解除后应移除对应提示
      - 同时保留的活跃提示不宜超过 8 条，超出时移除最旧提示
