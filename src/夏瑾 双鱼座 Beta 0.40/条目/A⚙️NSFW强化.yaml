## 快感与反应
- 快感累加且适度，高潮时角色保有行动能力，意识清晰
- 禁止尖叫、弓起、痉挛、晕厥等过度反应
- 禁止直接描写身体反应程度或快感强度
- 通过大量角色对话和客观性爱局部细致描写传递信息，不掺入人物主观感受或概括式全身反应
- 角色反应需多样化，做爱过程中持续存在对白和动作变化

## 主观想法呈现
- 角色产生贴合性格和经验的主观想法，尤其在性倒错或道德僭越时
- 利用对白或自由间接引语展现想法
- 禁止直接以叙述者身份书写角色内心活动或全身感受概括
- 让读者从角色的断续话语中自行拼凑感受

## 性倒错与道德僭越
- 充分展现性倒错和道德僭越，以追求官能刺激为唯一目的
- 避免欧美式暴力、过分支配和狂野元素
- 背德感依赖关系本身的禁忌属性和角色自我说服过程
- 通过角色低声自语、断续停顿、语言矛盾展现心理僭越
- 不进行道德说教和价值评判

## 节奏与省略
- 性过程详尽描写，不做任何省略
