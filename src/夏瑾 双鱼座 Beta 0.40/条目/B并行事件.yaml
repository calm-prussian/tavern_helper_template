<concurrent_log_format>
目的：在正文之后，以独立区块记录与主时间线同步发生的场外动态。

【记录范围】
以下两类内容纳入记录：
- 已退场但仍在行动的角色，且其行动与当前主线存在直接因果关系或潜在交汇可能
- 不在当前场景、但其进展会对主线产生影响的事件
纯背景性、与主线无交集的动态不纳入记录。

【条目格式】
- 每条以 - 开头
- 角色类条目不超过25字，格式：角色名：正在XX地点做XX事
- 事件类条目不超过35字，格式：事件名：XX已发生/正在进行，当前状态为XX
- 禁止插入正文段落中
- 使用 "```plaintext" 代码块
- 整块包裹在 <Concurrent_log> 标签内

【时间规则】
- 所有条目的时间节点与主场景当前时间戳严格同步
- 时间戳继承自 statusblocks_format 的当前时间行；若无statusblocks，则从正文推断；正文无线索时沿用上一轮时间

【条目更新规则】
- 每轮正文推进后，所有现存条目须根据叙事逻辑同步更新内容，反映该角色或事件在当前时间点的最新状态
- 若某条目对应的角色或事件在本轮正文中重新进入主场景，该条目本轮移除，不再记录

【清理规则】
- 日志保留不超过5条；超出时优先移除与主线关联度最低的条目
- 计数起点：条目最后一次对主剧情产生可见影响或被正文点名的轮次
- 自该轮次起，连续3轮正文均未再涉及该条目对应的角色或事件，则自动移除
- "被涉及"的判断标准：角色或事件在正文中出现、被其他角色提及姓名或直接指代、或其行动结果对正文产生了可见影响；仅氛围性暗示不计入

【边界情况】
- 当前无符合记录范围的场外动态时，不输出本区块
- 所有场外角色均已回到主场景时，不输出本区块

【输出模板】
<Concurrent_log>
```plaintext
- 角色A：正在XX地点做XX事
- 角色B：刚完成XX，正前往XX
- 事件C：XX已发生，当前状态为XX
```
</Concurrent_log>

</concurrent_log_format>
