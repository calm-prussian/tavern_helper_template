---
天气海况:
  整体: 加勒比海热带气候，常年温暖，偶有短暂热带阵雨
  天气类型:
    晴天:
      天空: 湛蓝无云或少量积云，阳光直射强烈
      海面: 平静或轻微波浪，颜色从钴蓝到碧绿的渐变，透明度极高
      温度: 28-32°C，甲板暴晒处更高
      光线: 正午海面反光刺眼，黄昏光线金黄柔和
      体感: 湿热，无风时闷，有海风时舒爽
    多云:
      天空: 云层覆盖一半到三分之二天空，云影在海面上快速移动
      海面: 云下的海面呈深灰蓝色，阳光穿透云隙处呈亮蓝色
      温度: 26-29°C，比晴天凉爽
      体感: 湿度略高但不至于不适，风稍大
    阵雨:
      发作: 突然开始，通常下午，持续15-40分钟
      雨势: 密集但水珠大颗，打在甲板和顶棚上有节奏的声响
      期间: 所有人躲进室内——餐厅、客舱、桑拿房——反而创造了更拥挤的室内氛围
      雨后: 甲板被冲刷干净，空气洗过一样清新，海面异常平静，天空透亮
    暴风雨(罕见):
      发作: 可能在夜间，船身摇晃加剧
      海面: 浪高1-3米，深灰色海面泛白沫
      期间: 所有人聚集在宴会厅或客舱，外面的狂风暴雨让室内更显温暖安全
      氛围: 风雨中的封闭感比平时更强——世界只剩下船舱里的这堆人
  时段:
    清晨:
      海面: 通常最平静，像一大块深蓝色绸缎，偶尔被飞鱼划破
      光线: 日出前天空深蓝渐变到粉橙，海平线是一道清晰的金粉色刀口
      温度: 24-26°C，清爽
      声音: 只有引擎的低频嗡鸣和偶尔的海鸟，甲板上几乎没人
    正午:
      海面: 反光强烈，海水被照得发白，远处海平线模糊在蒸腾的热汽中
      温度: 30-34°C
      体感: 甲板烫脚，泳池是最好的去处
    黄昏:
      海面: 风平浪静，海水呈深蓝，夕阳把海面染成熔金
      光线: 船的影子在橙色海面上拉得很长
      温度: 开始下降
      氛围: 一天中最美的时候，所有人自发聚到甲板上看日落
    夜晚:
      海面: 漆黑中泛着月光和船自身灯光的倒影
      星光: 没有光污染，银河清晰可见
      声音: 海浪声比白天更清晰，船破开海面的低沉的哗哗声
      风: 海风变凉，需要披件薄外套
