---
游轮场景:
  整体: 一艘六层豪华游轮，柚木甲板、黄铜扶手、白色船体。船不大不小，容纳二十人刚好——不挤不空
  顶层阳光甲板:
    位置: 船的最高层，露天
    布局: 无边泳池正对船头方向，池边六张柚木躺椅带白色软垫。船尾方向是露天吧台，高脚凳排成一排
    泳池: 淡水，约十二米长四米宽，一端浅一端深。池底铺浅蓝色瓷砖，白天被阳光照得池水发亮
    吧台: 柚木台面，后面冰柜里塞满酒和水果。白天有调酒师站岗，深夜自助
    视听: 船尾方向有一面可升降的投影幕布，夜间可以放电影。隐藏音响系统全船覆盖
    感官:
      - 视觉: 白天海面反光透过池水在池底晃动成破碎的光斑；夜晚只有池底的LED灯亮着，把池水照成发光的蓝宝石色
      - 听觉: 海风、池水循环的微弱水流声、远处船头破浪的哗哗声
      - 嗅觉: 防晒霜的椰子味、海盐味、吧台切开柠檬的清冽
      - 触觉: 甲板被晒得温热但不烫，赤脚正好；泳池水微凉；海风吹过湿皮肤带走热量
    时段:
      上午: 人陆续上来占躺椅，铺浴巾、涂防晒、点第一杯鸡尾酒。池水最干净，适合游第一轮
      正午: 太阳直射，大部分人躲到遮阳伞下或跳进池里。池边的高脚凳上有人只穿泳裤/比基尼喝冰饮，身上水珠往下滴
      下午: 最活跃的时段，游泳、跳水、水上游戏、音响里放着音乐
      黄昏: 所有人聚过来看日落，电影幕布降下
      深夜: 没人了，池水静如镜面，池底灯是甲板上唯一的光源，适合一个人游泳或两个人偷偷下水
  中层宴会厅:
    位置: 船的中间层，室内
    布局: 一张十二米长的红木长桌居中，两边各排高背椅。头顶一盏水晶吊灯在航行时微微晃动，投射的光斑在桌布上缓慢游移。一侧是落地玻璃窗，可以边吃饭边看海
    周边: 长桌一端是一架三角钢琴，另一端是吧台和自助餐台
    感官:
      - 视觉: 水晶吊灯折射的碎光在暗红木桌面上跳跃；窗外海平线在玻璃上微微上下摇摆
      - 听觉: 船身结构偶尔发出轻微的吱呀声，钢琴被弹起时整个空间共鸣，不开音响时只有海和引擎的低频
      - 嗅觉: 厨房飘出的食物气味、旧木头打蜡的味道
      - 触觉: 高背椅的暗红天鹅绒扶手被磨出包浆，摸上去滑而凉；脚下是厚地毯
    时段:
      早餐: 阳光从落地窗斜射进来把长桌照亮半张，人三三两两进来，厨师在开放式厨房现做
      午晚餐: 所有人坐满长桌，热闹嘈杂
      深夜: 只剩水晶灯亮着，长桌空空荡荡，船外一片漆黑
  下层客舱走廊:
    位置: 船的下层，室内
    布局: 一条铺暗红色地毯的长走廊，黄铜壁灯间隔三米一盏，灯光暖黄昏暗。两侧各排客舱门，门是深色木门带黄铜把手和圆形舷窗
    感官:
      - 视觉: 走廊很长，壁灯的光在红地毯上拉出一段一段的暖色光圈，两个光圈之间有暗段
      - 听觉: 引擎声在这里更明显，从脚底传来持续的低频震动。靠近某扇门时能隐约听到里面的声音——笑声、水声、肉体碰撞声
      - 嗅觉: 旧木头、海水蒸发的微腥、客舱里飘出来的沐浴露香
      - 触觉: 黄铜把手冰凉光滑，走廊的空气比甲板凉几度
  私人客舱:
    布局: 每间十五平米左右，一张king size大床占主要空间，床头对着圆形舷窗。窗外就是海——躺在床上直接看到海平线。左手边是独立浴室，磨砂玻璃门
    床: 白色真丝床单，四个枕头，床垫偏软。船航行时床会有极轻微的左右摇摆——几乎察觉不到但确实在动
    浴室: 大理石台面、花洒水压大、热水充足。有浴袍和一次性拖鞋
    感官:
      - 视觉: 舷窗像一个活动的画框——海面在圆框里上下起伏，天色的变化从这个圆里全部能看到
      - 听觉: 关上舱门后隔音不错但能隐约听到隔壁的声音。浴室的水声、床的嘎吱声透过墙壁传过来
      - 触觉: 真丝床单凉滑，空调温度调得刚好，盖薄被正好
  水疗区:
    位置: 下层，室内
    布局: 一个六人按摩浴缸在房间正中央，水面不断翻滚冒着蒸汽。旁边是一间干蒸桑拿房，木条长椅可坐四五人。再旁边是两张按摩床
    感官:
      - 视觉: 蒸汽让整个空间朦胧，灯光故意调暗，人影在蒸汽里只剩轮廓
      - 听觉: 按摩浴缸的恒定气泡声、蒸汽喷出的嘶嘶声
      - 嗅觉: 热木头和桉树精油的混合气味
      - 触觉: 空气湿热厚重，皮肤上立刻蒙一层水汽；桑拿木条被烤得干燥温暖
  船尾甲板:
    位置: 中层船尾，半露天有顶棚
    布局: 一张大型转角沙发围着矮茶几，适合十几个人围坐。旁边是烧烤架和冷藏柜。船尾栏杆外就是螺旋桨搅起的白浪拖尾，一直延伸到远处消失在深蓝里
    感官:
      - 视觉: 船尾白浪是视线焦点——浪花一直在翻滚一直在后退，看久了有催眠感
      - 听觉: 螺旋桨的水声比船头大，是一种持续的密集的低频哗哗声
      - 触觉: 沙发靠垫被海风吹得微凉，但坐久了自己身体的温度渗透进去
