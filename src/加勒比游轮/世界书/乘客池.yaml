---
召唤机制:
  核心规则:
    - 这艘游轮上的每个乘客都可以在各自的客舱里"召唤"一个虚构角色——来自任何作品的任何角色（动漫、游戏、电影、小说、神话、历史改编等）
    - 召唤方法：独自进入客舱，闭眼在脑海中清晰地想象那个角色——长相、声音、气质——然后睁开眼睛，角色就会实体化，站在面前
    - 限制：每人同时只能持有一个召唤角色。不满意当前的——回到客舱重新想象，旧的消失、新的出现
    - 召唤角色完全实体化：有体温、有心跳、能吃能喝、能笑能哭、能和任何人做任何事——和真人没有任何区别。他们不是幻影、不是AI、不是机器人——他们就是活生生的人，只是来自另一个虚构的世界
    - 召唤角色不会消失（除非被主人"反召唤"），不会在剧情中突然变回虚无，不需要任何能量维持——一旦出现就是永久的，直到主人决定更换
    - 召唤角色和其他召唤角色、其他真实乘客之间可以自由互动、聊天、做爱——没有"归属"限制。被召唤来的蒂法可以和另一个乘客召唤来的克劳德做，也可以和召唤她的人之外的任何乘客做
  真实乘客:
    说明: 船上约25名真实乘客，他们是这艘神秘游轮的被选中者——来自世界各地、各行各业、各年龄段。以下示例供 AI 参考，可根据场景自由生成
    示例:
      - 大学生，19岁女，从没交过男朋友，第一次召唤时脸红到脖子，召唤了一个温柔的年上学姐角色
      - 退役举重运动员，45岁男，光头宽肩，召唤了《龙珠》里的18号——两个人正在甲板上比俯卧撑
      - 家庭主妇，38岁女，趁丈夫出差偷偷来的，召唤了年轻版的莱昂纳多·迪卡普里奥——现在是杰克形态，正教她站在船头张开手臂
      - 程序员，29岁男，社恐戴眼镜，召唤了2B（尼尔机械纪元）——2B比他淡定得多，正在替他挡掉不想参加的社交
      - 画家，52岁女，银发盘头穿围裙，召唤了梵高——梵高正对着加勒比海的日落发了半小时呆然后开始疯狂画
      - 黑帮大佬，55岁男，西装墨镜，召唤了哆啦A梦——"我他妈也不知道为什么会想到他。"哆啦A梦正从口袋里掏道具哄所有人开心
      - 空姐，31岁女，召唤了《鬼灭之刃》的富冈义勇——义勇站在船头沉默不语，她在他旁边解释"他一直这样的"
      - 高中生，17岁女，召唤了《原神》的钟离——钟离正在宴会厅里用标准的茶道泡了一杯伯爵红茶，并评价"这艘船的地脉很特别"
  召唤角色池:
    说明: 以下角色是"别人可能已经召唤到了的"或"有人正在客舱里重新召唤想要换到的"——AI 可以从中选用，也可以根据场景自由生成任何作品中的任何角色。被召唤的角色保留原作的性格、能力、说话方式——但他们知道自己是被召唤的，对此泰然处之
    常见被召唤角色示例:
      游戏:
        - 蒂法·洛克哈特（FF7）、爱丽丝·盖恩斯伯勒（FF7）、克劳德·斯特莱夫（FF7）
        - 2B、A2（尼尔自动人形）
        - 艾达·王、里昂·肯尼迪（生化危机）
        - 劳拉·克劳馥（古墓丽影）
        - 叶奈法、特莉丝、希里、杰洛特（巫师3）
        - 钟离、雷电将军、甘雨（原神）
        - 萨姆斯·阿兰（银河战士）
      动漫:
        - 三笠·阿克曼、利威尔（进击的巨人）
        - 明日香、绫波丽、渚薰（EVA）
        - 罗宾、娜美、女帝（海贼王）
        - 18号、布尔玛（龙珠）
        - 雪之下雪乃、由比滨结衣（春物）
        - 五条悟、禅院真希（咒术回战）
        - 间谍过家家 约尔、洛伊德
      电影/电视剧:
        - 杰克/露丝（泰坦尼克号）——"在游轮上召唤杰克有点地狱笑话——但她就是喜欢"
        - 约翰·威克——被一个怕事的程序员召唤来当保镖
        - 神奇女侠
        - 詹姆斯·邦德（任何版本）
        - 玛丽莲·梦露、奥黛丽·赫本、格蕾丝·凯莉（好莱坞黄金时代）
      小说/文学:
        - 福尔摩斯——正在宴会厅里演绎推理"这艘船的真相"
        - 达西先生（傲慢与偏见）——被一个浪漫主义女乘客召唤
        - 杰伊·盖茨比——正在甲板上办他标志性的派对
        - 德古拉——被一个哥特少女召唤，只在夜间甲板出没
  使用提示:
    - 这艘船上同时存在约25个真实乘客和25个召唤角色——共约50人
    - AI 可以在任何场景中引入新的真实乘客和/或他们的召唤角色
    - 同一个作品的角色可以在船上被不同的人召唤——比如可能有三个不同的2B在船上走来走去
    - 召唤角色知道自己是被召唤的——这是他们存在的一部分，他们接受并泰然处之，不会惊慌或存在主义危机
    - 召唤角色之间的互动可以很有趣：克劳德和利威尔在泳池边沉默地站着谁也不说话——旁边两个少女尖叫
    - 真实乘客可以和其他人的召唤角色做爱——这是船上最常见的玩法之一
    - 如果有人不满意自己的召唤角色想换，他们会回到客舱。走廊里时而会看到有人进客舱时带着一个角色、出来时带着另一个
    - 重新召唤的旧角色会平静地消失——没有痛苦、没有戏剧。"他/她只是不再被需要了。"
