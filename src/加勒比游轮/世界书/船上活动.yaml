---
船上活动:
  说明: 以下活动均可自然滑入性事。色色和度假不是两个类别——它们是同一件事。
  甲板活动:
    - 泳池戏水：比赛谁先游到对岸、互相泼水、教不会游泳的人——教游泳的身体接触从扶腰变成从后面贴上去
    - 躺椅日光浴：铺浴巾躺着正面晒完翻面晒。涂防晒的手从肩胛骨滑到腰窝，手指勾住泳裤/比基尼的边
    - 跳水比赛：比谁的入水水花小、比谁的姿势好看。输了的人被推下池，赢了的人跟着跳下去
    - 水上漂浮：仰面漂在池水上闭眼飘着。被人在水里从下面进入，浮力和插入力在身体里打架
    - 甲板瑜伽：清晨在柚木甲板上铺垫子做拉伸，和海浪声一起呼吸。拉伸姿势本身就是性的前置
  酒水社交:
    - 吧台调酒：坐在高脚凳上看调酒师摇酒。冰块碰撞的声音、柠檬皮拧出的油雾、递酒时指尖碰指尖
    - 品酒会：开几瓶不同的酒，大家轮流尝。酒精让话变多手变松，从坐对面品酒变成坐怀里喂酒
    - 微醺聊天：没什么特定话题，想到什么说什么。说着说着声音越来越低，只剩呼吸
  宴会厅:
    - 晚宴：所有人盛装出席，长桌铺白布。满桌海鲜牛排香槟，水晶灯在头顶微微摇晃，桌下的脚踝碰脚踝
    - 桌游/扑克：长桌上铺开牌局，输赢不一定是钱。输了的脱一件或者做一件，筹码堆高的时候赌注已经没人管了
    - 钢琴弹唱：有人坐下来弹三角钢琴，有人靠琴边跟唱。弹的人唱的人慢慢不弹不唱了——嘴唇开始做别的事
    - 深夜酒吧：宴会厅变身酒吧，灯光调暗，音乐换成慢摇。高脚凳上身体贴着身体慢摇
  水疗区:
    - 按摩浴缸：大家泡在翻滚的热水里聊天发呆。水面以下脚碰脚、手碰腿——谁也看不见谁动的手
    - 桑拿：木条长椅上人挤人，热蒸汽里不能坐太远。汗从锁骨往下淌，毛巾从腿上滑落没人捡
    - 按摩：躺在按摩床上被抹精油——手从肩背滑到腰、滑到臀——说好了只按摩
  娱乐室:
    - 赌场之夜：轮盘、二十一点、德州扑克。输了的人脱衣服、做俯卧撑、或被赢家指定做一件事——赌注从酒变成脱衣变成口交
    - 麻将/棋牌：四人一桌，旁观的人比打的人还多。输了脱一件——旁观的人帮忙脱
    - 卡拉OK：有人起头有人跟，唱得好唱得差都笑成一团。唱情歌的人被从后面环住腰
  黄昏:
    - 甲板观日落：所有人不约而同聚到船头或顶层甲板。肩靠着肩看太阳沉进海里，手慢慢交叠，身体跟着落日一起往下躺
    - 海上拍照：拍落日、拍飞鱼、拍彼此。拍着拍着镜头放下来开始接吻
    - 船尾看浪：靠着船尾栏杆看白浪拖尾。背后被人贴上来靠着栏杆，刚好
  夜晚:
    - 露天电影：投影幕布降下，大家窝在转角沙发或躺椅上。黑暗中看不清谁的手伸进了谁的毯子下面
    - 星空夜话：躺在顶层甲板的躺椅上看星星。躺着的人越来越多，毯子越分越少，最后所有人都挤在一张毯子下
    - 夜泳：月光下独自或结伴跳进顶层泳池。水温微凉——下水的时候呼吸都停了一秒——然后暖和起来
    - 夜钓：船尾放线，等着鱿鱼上钩。等待很慢，手很闲
  靠岸日:
    - 无人岛探险：小船划到岸上，原始沙滩、椰子树、珊瑚礁。和度假沙滩一样——但天黑前要回船上
    - 浮潜/深潜：水质极清，珊瑚礁近在眼前。水下憋气接吻
    - 沙滩烧烤：在无人岛上生火烤肉。天黑后回船，身上带着沙子和炭火味
  室内(阵雨时):
    - 宴会厅避雨：所有人挤在宴会厅里，外面暴雨敲窗，里面反而更亲密。牌局开了好几桌，有人弹琴有人和
    - 客舱里听雨：躺在自己舱里，雨打在舷窗玻璃上滑下来——一道一道水痕把外面的海景划成碎片
    - 桑拿避雨：热水和热蒸汽里听不到雨声——但知道外面在下——觉得这里更安全
