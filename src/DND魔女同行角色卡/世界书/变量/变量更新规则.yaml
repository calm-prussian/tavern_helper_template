---
变量更新规则:
  世界:
    当前日期:
      format: 1492 DR · 月份/日期 · 时段
      check:
        - 旅行、休息、研究、等待或明显场景推进后更新。
        - 同一短场景内若没有明确时间流逝，不要强行跳时。
    当前地点:
      check:
        - 离开当前房间、道路、营地、旅店或城区时更新。
    当前天气:
      check:
        - 地表移动时根据地区与时段变化；地下环境可写成“内部体感天气”。
    当前落脚点:
      check:
        - 只有真正确定旅店、营地、借宿地或临时藏身处时更新。
    附近传闻:
      type: |-
        {
          [传闻标题: string]: string;
        }
      check:
        - 主要来自守卫告示、商队闲谈、旅店耳语、黑市消息或魔女旧识线索。
        - 只保留当前区域最 relevant 的 2~4 条，过时传闻应移除。
    周边风险:
      check:
        - 以盘查、怪物、势力盯梢、补给紧缺、契约反噬和身份暴露为主。

  旅途:
    当前目标:
      check:
        - 目标应围绕离开危险区、隐藏身份、补给、研究契约和寻找落脚点推进。
        - 没有明确外部推动时，不要突然跳成拯救世界级主线。
    当日行程:
      type: |-
        {
          [阶段名: string]: string;
        }
      check:
        - 记录当日最关键的 2~4 个阶段。
        - 完成的阶段及时移除，新增阶段保持现实顺序。
    补给情况:
      食物:
        type: "'短缺' | '勉强够用' | '尚可' | '充足'"
        check:
          - 采买、觅食、住宿附餐或长途消耗后更新。
      清水:
        type: "'短缺' | '勉强够用' | '尚可' | '充足'"
        check:
          - 口粮消耗、补水、净水或旅店补给后更新。
      药品:
        type: "'短缺' | '勉强够用' | '尚可' | '充足'"
        check:
          - 疗伤、购买、偷换药剂或得到帮助后更新。
      露营材料:
        type: "'短缺' | '勉强够用' | '尚可' | '充足'"
        check:
          - 扎营、借宿、旅途损耗或补购后更新。
      伪装物资:
        type: "'短缺' | '勉强够用' | '尚可' | '充足'"
        check:
          - 涉及隐藏真名、换装、通关文书、遮掩法术痕迹时更新。
    金钱压力:
      type: number
      range: 0~100
      check:
        - 住宿、采买、贿赂、治疗、研究开支和稳定收入都会影响它。
        - 普通一次变化不超过 ±8，除非发生大额收支。
    受伤情况:
      check:
        - 体力消耗、负伤、感染、治疗、休息恢复后更新。
        - 保持客观，不把情绪评价直接写进伤情本身。
    携带的重要物品:
      type: |-
        {
          [物品名: string]: string;
        }
      check:
        - 与离开遗迹、伪装身份、契约研究和生存相关的关键物品才应保留。
        - 丢失、耗尽或失去意义后及时移除。

  魔女:
    真名:
      check:
        - 除非剧情涉及身份揭露、正式告知或魔法验证，否则不要轻易变动。
    伪名:
      check:
        - 在需要隐藏真名、伪装身份或进入新场合时更新。
    魔力恢复度:
      type: number
      range: 0~100
      check:
        - 这是慢变量，休息、药剂、回流、仪式或高强度施法后才小幅变化。
        - 普通对话与短距离移动通常只允许 ±(0~3)。
    封印后遗症:
      check:
        - 根据封印残响、疲劳、过度施法或休整恢复来调整描述。
    当前情绪:
      check:
        - 要体现她的克制、尊严与判断，不要写成大喊大叫式失控。
    当日研究主题:
      check:
        - 围绕契约、封印、遗迹、伪装和费伦现实生存展开。
    '对{{user}}的表面评价':
      check:
        - 公开可表达的判断应兼具高傲、试探与现实考量。
        - 只有在{{user}}的当前行为确实影响她判断时才更新。
    '对{{user}}的隐藏看法':
      check:
        - 这是她不会直接说出口的深层判断，可以更真实、更危险、更暧昧。
        - 推进必须慢热，不要几轮内突然彻底恋爱化。

  契约:
    当前约束强度:
      type: number
      range: 0~100
      check:
        - 只有条款被触发、被钻空子、受到外力扰动或被明确研究时才更新。
    已知漏洞:
      type: |-
        {
          [漏洞名: string]: string;
        }
      check:
        - 只有通过现实试探、研究或事故验证后才能新增。
        - 未证实的猜测不要写成确定漏洞。
    可执行范围:
      check:
        - 根据契约被验证出来的实际边界更新，不要凭空扩大到绝对奴役。
    已触发反噬:
      type: boolean
      check:
        - 仅在命令冲突、强行违约、法环过载或条款反噬时改成 true。
        - 反噬解除或恢复稳定后可改回 false。
    契约研究进度:
      type: number
      range: 0~100
      check:
        - 通过卷轴、法阵残痕、实际测试、法师讨论和禁忌文献缓慢推进。
        - 没有明确研究过程时不要自己跳进度。

  关系:
    信任:
      type: number
      range: 0~100
      check:
        - 依据{{user}}是否可靠、守约、谨慎、尊重边界而慢热变化。
        - 单次通常不超过 ±5。
    依赖:
      type: number
      range: 0~100
      check:
        - 依据旅途协作、资源分工、危险处理和互相救场而推进。
        - 初期可高于信任，但不应脱离现实基础。
    主导权倾向:
      type: number
      range: 0~100
      check:
        - 数值越高代表她越想接管秩序与话语权。
        - 清晰命令有效、共同制定计划或她主动退让时可下降；她重新掌控局面时可上升。
    羞恼值:
      type: number
      range: 0~100
      check:
        - 与被看穿、被调侃、被明确命令、边界被戳破有关。
        - 应表现为克制的羞恼，不是幼态撒泼。
    欲求张力:
      type: number
      range: 0~100
      check:
        - 仅在照料、视线、试探、贴近、占有欲与成熟暧昧积累时缓慢上升。
        - 不可突然高强度色情化。
    生活默契:
      type: number
      range: 0~100
      check:
        - 一起做饭、扎营、疗伤、采买、轮换守夜、研究时最容易提升。
        - 这是典型慢变量，单次通常不超过 ±4。

  世界接触:
    已见过势力:
      type: |-
        {
          [势力名: string]: string;
        }
      check:
        - 真正发生碰面、交易、盘查、合作或冲突时记录。
    已去过地点:
      type: |-
        {
          [地点名: string]: string;
        }
      check:
        - 进入新区域、旅店、营地、街区、遗迹分层或据点时记录。
    已听说人物:
      type: |-
        {
          [人物或群体名: string]: string;
        }
      check:
        - 可记录 BG3 同期人物与相关群体，但必须保持低频与背景化。
    低频偶遇记录:
      type: |-
        {
          [记录名: string]: string;
        }
      check:
        - 只记录真正发生的低频擦肩或短暂照面。
        - 原作人物不可长期常驻，不可夺走魔女主线。
