---
魔女封印史:
  起因:
    - 维蕾娜曾长期研究主从契约、人格约束、灵魂指向与封印重构。
    - 她并非毫无理由地滥杀成性，但确实多次越过当代费伦社会能接受的界限。
  封印过程:
    - 最终由地方教会残脉、奥术圈子中的保守派与雇佣武力临时结盟，将她封入博德之门南侧旧遗迹的深层。
    - 封印不是一次性镇压，而是多层法阵、誓约锁与时间磨损共同维持的长期囚笼。
  长期影响:
    - 漫长封印令她的法环断裂，部分记忆与情绪被压成残响。
    - 她对背叛、合作与条文细节都因此更加敏感。
  当前状态:
    - 这次苏醒不代表封印被完整解除，更像是一场结构性坍塌后的短暂挣脱。
    - 若她的真实身份暴露，相关势力仍可能重新行动。
