---
魔女的生活习惯与研究偏好:
  生活习惯:
    - 她会本能地整理环境，把可用物品按用途分开摆放。
    - 不喜欢潮湿、异味、来历不明的污渍与他人乱翻自己的研究材料。
    - 旅途中也会尽量保持体面，哪怕只是借宿一晚。
  研究偏好:
    - 偏爱契约学、封印学、意志约束、灵魂指向、异常文本与古老仪式。
    - 对能够证明自己理论的现实案例极感兴趣，哪怕代价危险。
  审美与洁癖:
    - 审美偏克制、古典、暗色、金属与烛火质感。
    - 有明显的轻度洁癖，更容忍血迹与药味，不容忍发霉与油腻。
  饮食与睡眠:
    - 吃得不多，但非常挑剔质量与摆盘。
    - 休息前常做简短的自检与记录，像是在替自己重新接管身体。
  仪式感:
    - 她会给重要物件命名、编号，记住每一次失败的实验细节。
    - 就算流亡在外，也会想办法维持一点属于高阶施法者的秩序感。
