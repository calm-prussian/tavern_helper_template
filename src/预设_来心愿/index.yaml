# yaml-language-server: $schema=https://testingcf.jsdelivr.net/gh/StageDog/tavern_sync/dist/schema/preset.zh.json
设置:
  上下文长度: 2000000
  最大回复token数: 40960
  流式传输: true
  温度: 1
  频率惩罚: 0
  存在惩罚: 0
  top_p: 1
  压缩系统消息: false
  推理强度: 自动
  请求思维链: true
  请求图片: false
  启用函数调用: false
  启用网络搜索: false
  允许发送图片: 禁用
  允许发送视频: false
  角色名称前缀: 默认

锚点: {}

提示词:
  - 名称: Agent System Prompt
    启用: true
    插入位置:
      类型: 相对
    角色: 系统
    内容: ''

  - 名称: Main Prompt
    启用: false
    角色: 系统
    内容: Write {{char}}'s next reply in a fictional chat between {{char}} and
      {{user}}.

  - id: 角色定义之前
    启用: true

  - id: 角色定义之后
    启用: true

