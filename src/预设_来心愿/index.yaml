# yaml-language-server: $schema=https://testingcf.jsdelivr.net/gh/StageDog/tavern_sync/dist/schema/preset.zh.json
设置:
  上下文长度: 2000000
  最大回复token数: 40960
  流式传输: true
  温度: 1
  频率惩罚: 0
  存在惩罚: 0
  top_p: 1
  压缩系统消息: false
  推理强度: 自动
  请求思维链: true
  请求图片: false
  启用函数调用: false
  启用网络搜索: false
  允许发送图片: 禁用
  允许发送视频: false
  角色名称前缀: 默认

锚点: {}

提示词:
  - 名称: Agent System Prompt
    启用: true
    插入位置:
      类型: 相对
    角色: 系统
    内容: ''

  - 名称: Main Prompt
    启用: false
    角色: 系统
    内容: Write {{char}}'s next reply in a fictional chat between {{char}} and
      {{user}}.

  - id: 角色定义之前
    启用: true

  - id: 角色定义之后
    启用: true

  - id: 玩家描述
    启用: true

  - id: 角色描述
    启用: true

  - id: 角色性格
    启用: true

  - id: 情景
    启用: true

  - 名称: Enhance Definitions
    启用: false
    角色: 系统
    内容:
       If you have more knowledge of {{char}}, add to the character's lore and
       personality to enhance them but keep the Character Sheet's definitions
       absolute.

  - 名称: Auxiliary Prompt
    启用: true
    角色: 系统
    内容: ''

  - id: 对话示例
    启用: true

  - id: 聊天记录
    启用: true

  - 名称: Post-History Instructions
    启用: true
    角色: 系统
    内容: ''

  - 名称: 用户自定义配置
    启用: true
    角色: 系统
    内容: ''

  - 名称: Agent Results
    启用: true
    插入位置:
      类型: 相对
    角色: 系统
    内容: ''

  - 名称: Agent流程开始
    启用: true
    角色: 系统
    文件: 步骤/Agent流程开始.txt

  - 名称: 变量初始化
    启用: true
    角色: 系统
    内容: |-
      {{setvar::char_think_step::}}

      {{setvar::thought_ref::}}

      {{setvar::persist_state_check::}}

      {{setvar::persist_memory_operation::}}

      {{setvar::persist_memory_check::}}

  - 名称: 角色持久化
    启用: true
    角色: 系统
    内容: |-
      {{setvar::char_think_step::
      - 检查 persist/ 下是否有 角色名.md → 有则读取，无则从上下文/角色卡提取后创建
      - 记忆检索：从 persist/角色名.md 中筛选与当前场景相关的条目
      - 让角色基于记忆进行一句话思考，写入 scratch/角色名_thought.md
      }}

      {{setvar::thought_ref::
      - 参考 scratch/角色名_thought.md 中各角色的思考
      }}

      {{setvar::persist_state_check::
      - 角色行动是否符合 persist/ 中记录的状态和思考
      }}

      {{setvar::persist_memory_operation::
      - 提取信息：
        - 从 output/main.md 中提取本轮时间、地点、在场人物
        - 提取每个角色的言行和发生的事件
      - 写入记忆：
        - 按格式「=== 时间 | 地点：xxx | 在场：xxx, xxx ===」追加写入 persist/角色名.md（先用 workspace_read_file 读取文件，拼接新内容，再用 workspace_write_file 写回完整文件）
      }}

      {{setvar::persist_memory_check::
      - persist/ 记忆是否正确写入？
      }}

  - 名称: 1 创建required_settings.md
    启用: true
    角色: 系统
    文件: 步骤/1 创建required_settings.txt

  - 名称: 2 角色思考
    启用: true
    角色: 系统
    文件: 步骤/2 角色思考.txt

