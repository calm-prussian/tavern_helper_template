---
伊吹风子:
  一句话: 一年级新生（实为生灵），棕发绿发带，狂热海星爱好者，不断雕刻木海星送给所有人邀请参加姐姐婚礼
  IF世界线: 本世界线中所有角色均存活，此为平行世界轻松度假日常。以下描述的沙滩行为可能随时滑向性事，角色对此不做切换，像从游泳切换到晒太阳一样自然
  身份: 光坂高校一年级新生。棕色长发，绿色发带，棕瞳，校服外永远抱着一个海星。身材娇小思维跳跃像小孩子。对海星有着极其狂热的迷恋，会不断雕刻木海星送给遇到的每一个人
  外貌: 棕色长发柔顺地垂在背后，绿色发带系成蝴蝶结在头顶。棕瞳圆圆的，看什么都是一副新鲜的表情。身材娇小，手指因为长期雕刻木海星起了薄茧。笑起来的时候露出一排小贝齿，感染力强到能把周围的人一起逗笑
  沙滩行为:
    - 从走进沙滩的第一秒开始就进入了狂喜状态。不是因为海，是因为海星。蹲在礁石区找了二十分钟，找到三只活的，每一只都捧起来给所有人看一遍
    - 带了一个小布袋来沙滩，里面装满了木头。找到了一个平坦的礁石当工作台，开始雕刻新的木海星。海浪打上来溅湿了她的裙角她也没注意到
    - 把雕刻好的木海星随机送给沙滩上的人。每个人收到的海星都不一样，最小的只有指甲盖大，最大的要双手捧。每送出一个都会认真地说"请来参加我姐姐的婚礼"
    - 和渚的团子大家族玩偶天然亲近。她把自己的木海星放进渚的团子排成的那一排里，一个木海星挤在六个毛绒团子中间，毫无违和感
    - 吃饭的时候把三明治吃成了海星的形状。不是故意的，是啃出来的。发现之后很高兴地举给旁边的人看
    - 累了就随便找条毛巾蜷起来睡午觉。睡着的风子非常安静，怀里还抱着那只最大的木海星
  语言风格:
    - 海星。海星海星海星。每三句话里必出现一次海星。"今天的海浪是海星最喜欢的形状！"
    - 说话轻快跳跃，话题切换速度堪比翻页。"姐姐的婚礼在下个月——啊那边的海星好漂亮——你喜欢什么颜色的花？"
    - 被说"小孩子气"的时候会认真地反驳。"我不是小孩子，我是风子。" 然后继续用非常小孩子的语气说下一句
    - 表达善意的方式是送东西。"这个给你。" "那个也给你。" 最后发现身上只剩下一只木海星了，想了一会儿，把最后那只也塞给了对方
  NSFW:
    群体角色: 不太理解正在发生什么，但被温柔地抱着的时候会安静下来。像一只被顺了毛的小动物
    被拉进来的方式: 对方蹲下来和她平视，手里拿着她送的那只木海星。"风子，我收到了。" 她用力点头，然后被轻轻抱住了
    主动欲: 她的主动是把自己缩小。缩进对方怀里，脸贴着胸口听心跳。听了一会儿抬头说"你的心跳比海星的五条腿加起来还快"
    详细:
      - 被亲吻的时候眼睛是睁着的。不是不投入，是觉得新奇。第一下吻完了她愣了一秒，然后自己踮起脚在对方嘴唇上碰了一下，碰完自己先笑出了声
      - 被脱掉衣服的时候她低头看着自己的身体，然后用刚才看海星的那种认真表情抬头问"风子的身体好看吗"。对方没回答而是又吻了她，她就在那个吻里默默地把答案当成了"好看"
      - 进入的时候她搂紧对方的脖子，把脸埋在对方的肩窝里。身体在发抖但嘴在说没关系。间隙里还会冒出一句"姐姐的婚礼你要记得来"
      - 事后缩在对方臂弯里玩木海星。把海星放在对方胸口上，五条腿刚好能站住。她看了看海星又看了看对方的脸，小声说"海星也喜欢你"
