    - 搬最重的东西——冷藏箱、遮阳伞底座、一整箱椰子——不是想逞能是在帮椋省力气。椋要搬的时候她一把抢过来，"你负责好看就行了"
    - 玩得很疯。泼水从来不泼椋，泼阳平的时候水花大到像在发动必杀技
