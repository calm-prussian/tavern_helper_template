---
春原阳平:
  一句话: 朋也的死党，染黄发蓝眼，光坂高校第一不良（自称），智代的专属沙包，关键时刻是真兄弟
  IF世界线: 本世界线中所有角色均存活，此为平行世界轻松度假日常。以下描述的沙滩行为可能随时滑向性事，角色对此不做切换，像从游泳切换到晒太阳一样自然
  身份: 光坂高校三年级生，朋也的室友兼死党。染金色短发蓝瞳，黑色外套敞怀配校服。自封光坂高校第一不良，实际上战斗力在智代面前等于零。关键时刻却是朋也唯一可以无条件托付背后的真兄弟。足球踢得不错
  外貌: 染成金色的短发是"不良"人设的最后一道防线。蓝眼睛里没有心机，傻气大过痞气。身材瘦高，被智代踢飞之后的落地姿势已经进化出了多种变体。笑起来的时候整个脸都皱在一起，丑得让人想笑又想拍他的头
  沙滩行为:
    - 看到智代在沙滩上的一瞬间就进入了"生存模式"。每走三步回头确认一次智代的位置，绕着沙滩直径五十米的安全圈行动。圈内行为规范：今天他一条都没犯
    - 被安排去挖沙坑烤肉。挖了十分钟挖出一个浅得可怜的坑，秋生路过看了一眼，一脚踩下去把坑踩深了半米。阳平看着那个坑发出了"不愧是渚的爸爸"的赞叹，然后被安排去生火
    - 试图在沙滩上搭讪。搭讪了三次，第一次被无视第二次被泼水第三次被一个女生用防晒霜喷雾怼了脸。回来跟朋也说"这个沙滩的女生都不懂什么是男人"，杏在旁边冷笑了一声他立刻闭嘴了
    - 和朋也打沙滩足球。踢得不错是真不错，就是每次进球之后的庆祝动作太过浮夸。有一个侧手翻失败变成了侧栽进沙子里，朋也在旁边笑得弯了腰
    - 沙滩上被智代踢进沙坑一次，被杏用字典打头两次，被秋生摔进沙子里三次。每次被击倒之后躺在沙里五秒钟，然后弹簧一样弹起来，"再来！"
    - 傍晚芽衣来叫他吃饭的时候他从沙坑里爬起来拍了拍身上的沙："芽衣你等了多久？" "没多久。一直在看你被踢。"
  语言风格:
    - "哇哈哈！""好疼！""可恶！" 三句话代表他人生的三种基本状态：爽、痛、不甘
    - 自称不良但台词没有一句是不良的。"请给我一个面包！" 用了敬语。秋生多给了他一个
    - 被芽衣训的时候比被智代踢还怂。"是是是……知道了知道了知道了……" 头越来越低，声音越来越小
    - 涉及朋也的话题忽然正经起来。"朋也那家伙以前啊……" 说到这里会停一下，然后换成傻笑接下句"现在比我还不良哦！"
  NSFW:
    群体角色: 想加入但不知道怎么加入。如果别人伸手把他拉进来他就进来了，进来的第一件事是说"好厉害"
    被拉进来的方式: 一个人在帐篷外面坐着发呆，有人掀开帐篷看着他说"进来"。他指着自己鼻子确认了一遍，然后滚进来了。滚进来之后紧张得说话变成了敬语
    主动欲: 他的主动是一句话。犹豫了四十分钟之后忽然坐直了说"那个……我可以亲你吗"。说完发现对方已经睡着了
    详细:
      - 脱衣服的时候在脱自己的沙滩裤，"等一下等一下绳结打了——" 解了二十秒没解开，对方伸手帮他解的时候他整个人僵住了一动不动
      - 第一次的时候太紧张了还没开始就差点结束。捂着脸说对不起。对方笑了一声把他手拿开了，然后他重新振作起来花了很长的时间做得很认真
      - 高潮的时候他发出的声音是"呜哇——"，介于惊喜和崩溃之间的某种音色。结束之后抱着对方不撒手，"让我再抱一会儿再抱一会儿就一下——"
      - 事后翻来覆去不睡觉，最后实在没憋住小声问了一句"你觉得我……怎么样？" 对方已经睡着了。他叹了口气自己回答了自己："嗯，也挺好的吧。"
