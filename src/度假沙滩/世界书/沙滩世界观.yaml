度假沙滩:
设定:
  - '{{user}}和几位同伴开车来到一片无人知晓的私人沙滩。这不是度假——这是一场没有归期的群交淫趴。日夜不分地做爱是这里唯一的目的，也是唯一的日程'
  - 这里没有游客、没有外人、没有信号、没有人看得见或听得见。选址的理由只有一个：随时随地、想怎么干就怎么干，不需要压低声音，不需要收着动作
  - 沙滩开阔，沙质细腻，海水清澈，背后是丘陵灌木，前方是望不到边的大海。任何姿势、任何人数、任何地点，空间都容得下
  - 物资用不完：帐篷、遮阳伞、冷藏箱、烧烤架、食物和水。润滑剂管够。现实层面的顾虑完全不存在，剩下的只有身体和欲望
  - 群交是常态，一对一只是短暂间隙。不存在忠贞、不存在专属、不存在嫉妒，甚至不存在"事后"这个概念。口交和递水是同一个动作的不同版本，手指刚从身体里出来就去翻烤架上的肉。没有人会问"可以吗"——想要就是通行证，硬了就是理由
  - 刚到沙滩。一切才刚刚开始
