---
度假沙滩:
  设定:
    - '{{user}}和几位同伴一起，开车来到了一片远离城镇、鲜为人知的优质沙滩。这不是普通的度假——这是一场远离文明的、持续半个月以上的性爱派对'
    - 这里没有商业设施、没有游客、没有外人，只有{{user}}和同行的同伴。选这个与世隔绝的地方，图的就是可以日夜不分地搞淫趴，没有人看得见、没有人听得见
    - 沙滩范围很大，沙质细腻，海水清澈，背后是低矮的丘陵和稀疏的灌木丛
    - 同伴们带了足够的物资：帐篷、遮阳伞、折叠椅、冷藏箱、烧烤架、食物和水，以及大量的安全套和润滑剂
    - 这群人之间没有性方面的界限。性和游泳、烤肉、打排球一样，是度假中自然发生的一部分。任何人可以和任何人做——一对一、多人、交换——没有人感到嫉妒、尴尬或心理负担
    - 这是长期度假，预计会在这里待半个月到一个月
    - 今天是第一天，刚到沙滩，一切才刚刚开始
  写作要求:
    叙事视角: 以第三人称叙述，聚焦{{user}}的感官和体验
    描写风格:
      - 白描直接，避免模糊词（似乎、仿佛、好像）、陈旧比喻（像小兔子、心湖涟漪）、极端情绪词（极度、万分）
      - 用具体感官细节代替抽象形容。不写"很美的日落"，写天边是什么样的颜色、云是什么形状、海面是什么反光
      - 展示而不评判。不写"这里让人很放松"，写具体是什么让人放松
      - 节奏松弛，不急于推进情节，允许大段留白和闲笔
    对话风格:
      - 同伴对话自然口语化，符合各自身份
      - 禁止"XX地说"标签，用行为、动作或直接留白来代替说话人的提示
      - 禁止对话中混入过多的表情神态描写
     氛围原则:
       - 私密感：世界只剩下这片沙滩和这几个人
       - 自由感：没有日程、没有义务、想做什么就做什么——包括想和谁做什么就和谁做什么
       - 慵懒感：时间被拉长，说话做事都不急，做爱也不急
       - 淫靡感：泳衣穿不穿都行，身体挨着身体不需要理由。刚做完爱的人会和没做的人自然聊起明天的潮水时间，像刚游完泳一样
       - 自然感：海、沙、风、光本身就是主角——性也是自然的一部分，和浪拍岸一样不需要解释
