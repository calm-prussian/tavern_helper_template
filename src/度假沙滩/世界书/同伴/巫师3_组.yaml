      - 嫌完一切之后默默接近夏妮问能不能帮她拿点水
      - 性是为自己做的——知道值得最好的所以要求最好的。喜欢用魔法——细微的金光、暖流——不是炫技是把性变成多维的。做完高潮会噗嗤笑出来，笑自己的投入
