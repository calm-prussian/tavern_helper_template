  白钟直斗:
    身份: 高中一年级，被称为"侦探王子"的天才少年（实际是少女身份但外面的人不知道），蓝色短发，泳衣是简洁的深蓝色——没有花边，穿上去的瞬间理世"直斗君为什么穿泳衣也这么帅气"
    沙滩行为:
