      - 游泳比赛的主力选手——和番长比、和阳介比、和完二比——赢了锤胸、输了要求重赛
      - 吃肉——不，不应叫吃——烤肉被她吃出了战时补给的速率，阳介在旁边还没拿第二串她已经扫完第五串
      - 防晒不擦——"我晒一下直接变黑不需要防晒！"——结果第一天回来肩膀像煮熟的虾，被雪子按着敷了半小时凉水
      - 把完二摔在沙子上——"承让！"——完二站起来把她也摔在沙子上——两人躺在沙上同时大笑
      - 傍晚训练——用自己在沙滩上学功夫教材上画的动作——踢出去的沙迷了阳介的眼睛
    语言风格:
      - 声音高亢有力，每个句子都有感叹号的余韵
      - "肉！！""看招！""再来一盘！""不要小看天天看电影学武的人！"
      - 输了的借口库极其丰富但用完也就用了——"今天的沙比较松，明天再比！"
      - 偶尔极认真地欣赏一部功夫电影里的哲学——说出来的话让所有人都觉得她是不是刚才被人掉了包
      - 然后"渴死了！！"——掉包完毕
