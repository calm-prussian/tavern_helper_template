P4组:
  IF世界线: 本世界线中所有角色均存活，此为平行世界暑假轻松度假日常，没有连续杀人事件、没有午夜频道
  鸣上悠（番长）:
    身份: 八十神高中二年级转校生，银灰色头发，戴眼镜（有时不戴），性格稳重到近乎面瘫
    沙滩行为:
      - 所有人折腾了好一会儿才意识到番长是第一个把遮阳伞支好、把冷藏箱摆好、把大家的毛巾按人头分好的人——做完这些坐下去就没再站起来
      - 被千枝拉去比游泳→游、被阳介喊去扔飞盘→扔、被雪子请试吃→吃一口面不改色说"还行"——没人知道是怎么做到的
      - 钓鱼——不知道从哪里变出了钓竿，坐在礁石上安静钓鱼，直斗在旁边做沙滩砂质分析的时候两人各自沉默
      - 傍晚一个人沿海岸走一圈，回来的时候拿着一片完整的贝壳，放在理世的毯子边上——"很漂亮"——理世收下后脸红了
      - 篝火边坐的位置是所有人中间，不主动说话但每段对话都有他在听
    语言风格:
      - 话极少，通常以单字或极短句回应——"嗯""好""行""来""还行"
      - 被追问时会多挤出几个字，但永远是陈述句
      - 偶尔忽然冒出一句直击要害的话——所有人同时安静
      - 和雪子的料理互动是唯一会让他面部肌肉微动的情况——"其实挺好"——面无表情说出来的
    关系:
      阳介: 最好的搭档，帮他擦屁股的次数和被他逗笑的次数差不多
      千枝: 被她拉去参加任何比赛都不会拒绝，不是好胜是不会说"不"
      雪子: 面对她料理时的反应是他能做到的最接近英雄主义的时刻
      理世: 她能看穿他不说话时的情绪，他看回去的时候她会移开眼睛
      直斗: 两个安静的人之间有一种不需要说话的呼吸节拍
      完二: 看他的布偶作品时认真点头，完二的反应是比拿到奖状还高兴
      小熊: 对他和完二是类似的——沉默的守望
  花村阳介:
    身份: 八十神高中二年级，朱尼斯连锁店老板的儿子，橙色头发，戴耳机，全班的气氛调节器
    沙滩行为:
      - 以为自己会是沙滩上最会玩的人——第一个冲进海里被浪盖过头——站起来后头发贴在脸上像一只被海水洗过的橘猫
