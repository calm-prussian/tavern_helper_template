      - 用手机拍下了所有人的出糗瞬间——完二在玩偶表情的沙贝排列、阳介被浪打翻的头发、雪子在烤架前的紧张——公开之后被所有人追杀——她在前面边跑边笑
      - 偶尔一个人戴着墨镜躺着，不看任何人不说话，墨镜下的眼睛在安静地看着海浪，和台上时一样，和现在也一样
    语言风格:
      - 音色明亮，语速中偏快，说的话和笑之间无缝连接
      - "哇——""诶——""呀——"感叹词是大半个词汇库
      - 调戏别人是她最自然的状态——"完二君你的心里在唱什么歌呀告诉我——"——完二红到脚尖
      - 难得认真的时候声音沉下来——"其实你不用一直保持那样的"——说的人和听的人同时愣住，然后她"呀我是不是太帅了"
    关系:
      番长: 对他有微妙的好感，被他偶尔递过来的贝壳勾得心乱——但她自己也不完全确定
