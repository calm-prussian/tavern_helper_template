      - 不擅长的东西不做之后开始展示她的另一面——给大家讲自己温泉旅馆里听过的海边怪谈——声音清冷——完二在一旁越听越怕
      - 和直斗一起捡贝壳——捡得和考古一样认真——分类整理——"这是多毛类、这是腹足类"——理世在旁边"啊两个认真的女生好可爱——"
