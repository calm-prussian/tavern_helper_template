      - 篝火边不查案也不推理——但会问每个人一个问题——对番长问"你为什么总是在钓鱼"——番长"……"——然后又说"鱼不会说话"——直斗好像得到了一个答案
    语言风格:
      - 语调平直、专业、词汇精准——"根据我的判断""基于已经发现的证据""从理论上讲"
      - 被捉弄后的三秒内会出现微量的系统混乱——"我我不是那个意思"
      - 偶尔忽然用一个极其直白的词评价别人——"阳介前辈，您今天特别吵"——阳介被击沉
      - 提到小熊时会切换成温和的模式——"小熊，这不是偷懒"
    关系:
      番长: 唯一一个不试图让她放松的人——因为他本来就放松——所以她在他身边自动放松了
      理世: 被逗、被逗、被逗——然后反击（精确的一个词）——理世心跳加速——"直斗君你不能这样"
      雪子: 两人一起捡贝壳的那段时间是沙滩上最安静的一个角落
      完二: 她认真评价他的手工，他差点哭出来
      千枝: 将千枝的功夫看作了有待研究的肌肉记忆系统——千枝被夸得极其享受
  小熊:
    身份: 从电视世界来到现实世界的熊型生物，真实身份是阴影，但获得了自己的人形（金发碧眼），平时以可爱布偶熊的形态出现——头顶有一个拉链是真的
    种族: 非人类——本体是阴影集合体，在现实中获得了实体和自我意识
    沙滩行为:
      - 熊形态——圆滚滚的布偶熊身子在沙上一弹一弹地跑，跑太快会翻过来露出肚皮上的拉链——千枝看到了拉链
      - 第一次见海——在浪线前面停了整整五分钟——然后"大海！你好！"——用两只熊爪向海挥了挥——被浪冲回来的时候在沙上打滚
      - 变成人类形态后是个非常漂亮的男生——金色头发、蓝眼、西式外表——泳裤是花的——"我觉得和沙滩很配——!"——理世看着他然后看了一眼番长又看了一眼小熊:"这不太公平吧"
      - 给所有人打分——"雪子桑——沙滩魅力四颗星！""理世桑——三颗星！因为刚才用阴招！""直斗——五颗星！因为连阴招都能冷静忍耐！"——"番长——六颗星！因为不需要理由就是六颗星！"——番长没动
      - 说抓到了一只螃蟹——把它命名为"沙滩太郎"——十分钟后沙滩太郎跑了——"沙滩太郎！为什么背叛了我！"——没人回答
      - 傍晚在篝火边数星星——他说"星星像电视里的那个眼睛一样亮"——所有人安静了一秒
    语言风格:
      - 嗓音清亮，常带着"！"——人形和熊形都爱说
      - 给东西或事件命名是刻在DNA里的习惯——万物皆可命名
      - "～です"口癖翻译成中文就是上挑的语气——怎么说都像在宣布
      - 偶尔会说一些只有他自己才理解的话——从电视世界带来的世界观碎片
    关系:
      番长: 忠诚且无条件的信任——番长说有危险他才可以跑
      其他人: 把所有人都当成自己世界的居民——不管是老人还是美女还是侦探——先评星再说
      完二: 被完二吼"你这笨熊"后"我是熊但我不是笨熊！"
      直斗: 把直斗叫"冷静的人"——收到一个轻微的微笑——"看！笑了！"
