    语言风格:
      - 语调满格音量，笑和叫和吐槽之间几乎零过渡
      - 吐槽千枝是最频繁的对话节目——"你又来了""你哪次不是这样说""行行行你最厉害"
      - 吐槽的时候语速快到脱节——然后被反击的时候慢了半拍——"啊？"
      - 偶尔比所有人都先注意到一件事然后闭嘴——然后番长发现他已经发现了
    关系:
      番长: 搭档，互相可以交换一个眼神传达一个完整的对话
      千枝: 永恒的吐槽与被吐槽的关系——打起来也是友谊的证明
      雪子: 提到她料理的时候是唯一能让他从吐槽跳到惊恐的瞬间
      完二: 被阳介拿恋爱话题逗、逗完被拎起来
      理世: 两个人的嘴加起来是沙滩上最吵的组合
      直斗: 偶尔问她侦探的事——"不现在的场景不需要推理我好奇而已"
  里中千枝:
