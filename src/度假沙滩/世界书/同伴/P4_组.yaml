  久慈川理世:
    身份: 前偶像，八十神高中一年级，棕色长髮，泳衣是最亮眼的款式，一眼就能看出之前在镜头的习惯
    沙滩行为:
      - 出现在沙滩上的瞬间自带一种镜头感——站姿角度刚好——坐了五秒后发现根本不需要，然后整个人摊开在大毯子上——"啊——太舒服了——"
