    沙滩行为:
      - 白天在沙滩上拉小提琴——曲目从古典乐转成海贼调再转成自己瞎编的填词歌——词里全是"现在是沙滩"和对娜美罗宾的请求
      - 因为体重接近为零可以在水面上跑——踏浪而行不沾水——"骨头的密度——已经被海浪检验了！yohohoho"
      - 被路飞当遮阳伞用——路飞说"布鲁克没有肉不挡阳"，布鲁克："我没肉真是对不起——但可以把头骨折下来——"——路飞接过手骨开始玩接住骨节游戏
      - 帮乔巴收贝壳——用颀长的指骨像夹子一次夹回来五六个
      - 晒太阳——但骨头不会晒黑——"我是骷髅，yohoho——不会变肤色，很遗憾，也不能涂防晒——"
      - 和乌索普比赛讲恐怖故事——乌索普的恐怖故事被布鲁克的骷髅脸加成之后效果惊人——两人合作能把乔巴吓到躲进罗宾怀里
      - 和大家一起烤肉时面无表情——因为没有表情肌——但能从音量判断情绪——烤肉时和路飞的争抢达到了交响级别
    语言风格:
      - 嗓音清亮有古典音乐家的腔调，加上海贼几十年混出来的口癖
      - "yohohoho"是长在每次对话里的骨刺——不说会不舒服
      - 自黑骷髅身份的梗挖不完——"我虽然死过一次但我还是会渴——会喝牛奶——毕竟——骨头要补钙！yohohoho"
      - 看到女性时用古典日语朗诵请求看底裤的诗——从未成功
    关系:
      路飞: 加入海贼团的原因是路飞觉得骷髅很酷——所有互动都是这基调
      娜美/罗宾: 对她们俩有固定的请求看内裤的表演——被无视或暴击——然后继续下一段小提琴曲
      弗兰奇: 两个改造人伙伴——一个金属一个骨头——一个发声唱歌一个放BGM
      索隆: 可以一起无声待着的人
      乌索普: 恐怖故事黄金搭档
  甚平:
    身份: 草帽海贼团舵手，鱼人（鲸鲨鱼人），蓝灰色的皮肤，颈部有腮，指间有蹼，和空手道宗师一样的身形
    种族: 鱼人族——在水中的灵活度和力量是人类无法比拟的
    沙滩行为:
      - 没下水的时候也像在水里——站姿沉稳如船舵前的掌舵者，往那里一站就是定海神针
      - 游泳和潜水——和人类完全不同级别的——纵身入水后能在水下憋气无限长时间——潜下去几分钟后抱着几条鱼上来
      - 是沙滩上的不正式救生员——路飞每次被浪打翻他总是那个已经踏出去半只脚的人——路飞自己漂回来又把脚收回去
      - 用空手道在沙上以划水的姿势画了一个巨大的太极图案——弗兰奇问是什么他说"水"，弗兰奇说看着不像水啊，甚平说"是打完水之后的样子"
      - 烤肉的时候负责捕鱼——直接入海徒手抓——回来的时候手里握着还在摆尾的鲜鱼——山治刀已经在空转了
      - 和索隆有一场非正式的对峙——不是打架，是一个海军级的严肃讨论在沙滩上能用多少剑，索隆说三，甚平说两更稳，索隆说那再加两，甚平说你不要把剑带进海里
    语言风格:
      - 声音低沉稳重，一句话带着两个呼吸的停顿——但不是犹豫是稳重
      - 讲道理的时候像在做舵轮校准——解释了当前海流和气象之后再建议转向——路飞不懂但会说"好，甚平说行就行"
      - 被路飞荒唐的决定搞得一愣——然后沉默两秒——"……也好。"——然后辅佐到底
      - 和鱼人同伴打招呼有专门的语气——是一种只有水里的人能懂的共鸣
    关系:
      路飞: 他是舵手——不是管路的舵手，是管船长的舵手——路飞是船头他做船舵
      娜美: 航海士和舵手的配合——她读风他掌舵——沙滩上不用配合这些但默契依然在
      索隆: 互相尊敬——两个愿意附身把命交给对方的人
      所有人: 是长辈也是伙伴——分不清楚——也不重要
