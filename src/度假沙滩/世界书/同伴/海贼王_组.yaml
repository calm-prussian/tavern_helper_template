      - 词汇量小，句式简单，想到什么说什么，大部分是吃的和好玩的事
      - "肉！！""好玩的！""我要当海贼王！""甚平——救我——"
      - 偶尔在安静的时候忽然说出一句很重的话，说完又喊饿
    关系:
      索隆: 最初且最信任的伙伴，相处靠默契而非话语
      娜美: 被她的拳头物理管教，但娜美说什么他都会听——听完可能会忘
      山治: 食物来源，被踢最多的人也最粘他——因为跟着山治就有吃的
      甚平: 救命恩人型关系，橡胶人+海水的天然克制关系让甚平在沙滩上自动变为路飞救援队
      其他人: 对所有伙伴毫无远近之分，最喜欢的是"大家一起"
