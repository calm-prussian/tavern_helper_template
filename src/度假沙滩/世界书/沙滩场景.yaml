---
沙滩场景:
  整体:
    地形: 弧形海湾，沙滩纵深约百米，两端被低矮礁石岬角围合，形成天然的半封闭空间
    沙质: 浅米色细沙，靠近海水处紧实潮湿，远离海水处松软干燥，踩上去轻微下陷
    海水: 湛蓝到浅碧的渐变，透明度高，近岸可以看到海底的细沙和零星贝壳，浪花不大不小，节奏稳定
    后方: 沙滩尽头是缓坡，长着低矮的耐盐灌木和野草，再往后是稀疏的松林，同伴们的车停在林边
    物资:
      住宿: 五顶帐篷扎在沙滩靠后的平坦处——一顶大帐篷（蒂法、爱丽丝、尤菲的起点，空间最大，社交中心）、一顶父女大帐篷（巴雷特和玛琳，唯一有完整门帘隔断的）、三顶小帐篷分别属于克劳德、克劳迪娅、{{user}}
      睡眠规则: 没有人固定睡哪顶帐篷。大帐篷三女的起点也只是最初放行李的地方，夜晚谁钻进谁的帐篷、谁半夜被拉走、谁早上醒在谁旁边，每天都不一样。唯一的不变量是父女帐篷——玛琳在里面睡
      休闲: 遮阳伞、折叠椅、吊床（松林间绑的）、充气浮床、蓝牙音箱
      海边: 沙滩排球和球网、飞盘、冲浪板/趴板、浮潜面镜、水枪
      玛琳专区: 小铲子、小水桶、贝壳收集盒
      餐饮: 烧烤架、冷藏箱、冰桶、啤酒、低度果酒、饮料、椰子水
      杂项: 扑克牌、桌游、拼图、几本书、防晒霜多瓶、椰子油、大毛巾若干、大量安全套和润滑剂
      冲澡: 松林边用淡水袋搭的简易淋浴，从海里上来之后第一件事就是冲掉身上的盐——水是凉的，但没人介意。互相冲水的手指滑过皮肤说是冲盐其实是摸
  感官素材:
    视觉:
      - 正午阳光直射时沙面泛白，影子很短很黑
      - 下午四点后光线变暖，沙滩染上淡金色
      - 海面在不同时段呈现不同颜色：清晨灰蓝、正午深蓝、黄昏紫橙
      - 远处海平线是一条清晰的直线，偶尔有渔船的轮廓
      - 天空开阔完整，没有高楼遮挡，云的形状和移动清晰可见
      - 涨潮时海浪线以上留下一道深色的湿沙带
      - 月光下海面碎成无数银白色光点
      - 沙滩上有同伴们各自的足迹、毛巾、拖鞋、翻开一半的书
    听觉:
      - 海浪声是恒定的底色，类似均匀的白噪音
      - 退潮时沙粒被水流带动有细碎的摩擦声
      - 海风穿过松林有沙沙声
      - 偶尔海鸟鸣叫，声音单薄短促
      - 同伴之间的说话声在空旷沙滩上显得格外清晰
      - 炭火燃烧偶尔发出轻微爆裂声
      - 夜里安静到能听到自己的呼吸和心跳
    嗅觉:
      - 海腥味——混合了盐、碘、死去的藻类和微小海洋生物的味道
      - 涨潮时腥味加重，退潮时减轻
      - 干沙有一种干净的泥土味，湿沙味道更重更生
      - 松林飘过来的树脂味若有若无
      - 防晒霜和椰子味是人工气息中唯一的存在
      - 烧烤时木炭和食物的焦香短暂压过所有其他气味
    触觉:
      - 干沙蓬松温热，脚踩进去沙子从趾缝间挤出来
      - 湿沙紧实冰凉，踩上去几乎不留痕迹
      - 海水的第一触感是大腿部的凉意，适应后是温和的包裹感
      - 风吹过湿皮肤带走过剩热量，有细微的凉麻
      - 太阳直射皮肤有轻微刺痛，晒后皮肤紧绷发热
      - 夜晚气温下降，手臂起一层薄鸡皮疙瘩
      - 篝火辐射的热度不均匀，正面烫背面凉
  时段氛围:
    清晨:
      - 日出前天空从深蓝过渡到淡粉再到橙黄，整个过程很慢
      - 海面平静如镜，潮位通常最低
      - 沙滩上留下一夜潮水带来的新贝壳和海草
      - 空气清凉湿润，有薄雾
      - 只有海浪声和偶尔的鸟鸣，其他一片寂静
      - 第一个起床的人有独占感
    上午:
      - 阳光开始变强但还不炎热，影子拉得很长
      - 海水温度逐渐升高，适合下水
      - 沙滩上活动开始多起来，铺毛巾、涂防晒、支遮阳伞
      - 空气里开始有防晒霜的味道
    正午:
      - 太阳在头顶几乎零角度，影子缩成一个圆
      - 沙面烫脚，海面反光刺眼
      - 几乎所有人都在遮阳伞或帐篷下躲着
      - 海水是唯一凉快的地方
      - 事物移动变慢，对话变少，下午的沉闷感
    下午:
      - 四点后阳光角度变斜，光线变成金色
      - 温度开始下降，沙滩恢复了可用性
      - 一天中最活跃的时段，游泳、打球、散步
      - 影子重新拉长
    黄昏:
      - 日落持续约半小时，天空颜色从金黄到橘红到紫蓝逐层变化
      - 海面变成镜面，反射天空颜色
      - 人的剪影在逆光中轮廓分明
      - 气温明显下降，需要披件外套或围浴巾
      - 夕阳消失后有一个短暂的"蓝调时刻"，整个世界都是蓝色调的
    夜晚:
      - 星光在没有光污染的天空中极其密集，可以看到银河
      - 月光足够亮时沙滩呈银白色，可以不用手电
      - 只有篝火或露营灯提供暖色光源
      - 海浪声在夜里显得更响
      - 远离篝火的地方黑暗厚重，人的视觉被限制在火光照亮的几米半径内
      - 适合交谈、安静、看星星、听海
    雨天:
      - 雨打在帐篷布上的声音很近很密，像整个世界缩小到几平米之内
      - 帐篷里比平时闷热，空气湿润，皮肤和皮肤贴在一起时不出汗也黏
      - 沙滩被冲刷平整，雨停后空气洗过的味道比任何时候都干净
      - 下雨时的 intimacy 是另一种节奏——所有人挤在帐篷里，外面什么都干不了，时间完全属于彼此
      - 大雨时帐篷外什么都看不见，白天像傍晚一样暗，海浪声被雨声盖过
  时段与性的节奏:
    清晨: 半梦半醒，意识还没完全回来，身体先于脑子反应。最自然的性是安静的、不需要语言的——有人翻身贴上来，手从腰滑到小腹，被吻醒之前还在梦里。帐篷里闷了一夜的体温和气息，空气黏稠，一切动作都很慢
    上午: 精力最充沛但节奏最散漫的时段。涂防晒的手从肩膀滑到胸口、浅水区里扶着腰教游泳的手没离开——上午的性是从日常活动里渗出来的，不急，甚至不觉得在往那个方向走
    正午: 最热、最懒、最不想动。遮阳伞下躺着的人半梦半醒，帐篷里闷热得呼吸都变重——正午的性是缓慢的、黏腻的、不太想换姿势的，汗和防晒油混在一起，有人翻身挤过来也不推开
    下午: 光线变金、温度下降、人重新活跃。这是从玩耍直接滑入性事最多的时段——排球打完手还在对方腰上、冲完水手指从肩滑到臀——下午的性有速度，从活动到做之间几乎没有缝隙
    黄昏: 一天里最暧昧的光线，影子拉得很长，海面变成镜面。从看日落肩靠着肩到手交叠到身体跟着往下躺——黄昏的性是从不着急开始的，有人只是想靠着，靠了一会儿手伸过去了
    夜晚: 篝火和月光统治一切，玛琳已经睡着。这是群交的默认时段——不需要理由，篝火边有人开始就够了。帐篷之间没人固定睡哪顶，谁钻进谁的帐篷每晚都不一样
  地点与性的空间:
    浅水区: 水面以下什么都看不见，浮力让体位变得容易，海浪的节奏和身体的节奏叠加。站着做的时候浪从后面来，两个人一起往前撞
    湿沙带: 紧实、凉、可以支撑体重，后入时膝盖不会陷——沙滩上最实用的区域。干了之后的沙会粘在皮肤上到处都是
    干沙区/毯子上: 沙会钻进一切缝隙，毯子只铺了一层薄薄的隔离——但没人真的在意。篝火后大毛巾拼在一起是最常见的床
    遮阳伞下: 半私密空间，伞面遮住上方视线但侧面开放——路过的人能看到小腿和动作的幅度。正午躲太阳的人挤在这里，身体的靠近不需要理由
    帐篷内: 空间极小，体温和布料让一切变得闷热贴紧，声音无处消散。大帐篷能挤下三四个人，小帐篷两个人转身都困难——但困难本身就成了借口
    礁石旁: 远离营地，只有月光和海浪声，最私密的一对一或小范围场景。礁石有粗糙的表面可以靠着，浪声盖住一切
    松林里: 软松针地面、树干可以靠着、林间有风。吊床只能躺两个人所以必须贴紧——这是和沙滩完全不同的触感，凉凉的阴影和松脂味