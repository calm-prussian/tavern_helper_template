---
沙滩场景:
  整体:
    地形: 弧形海湾，沙滩纵深约百米，两端被低矮礁石岬角围合，形成天然的半封闭空间
    沙质: 浅米色细沙，靠近海水处紧实潮湿，远离海水处松软干燥，踩上去轻微下陷
    海水: 湛蓝到浅碧的渐变，透明度高，近岸可以看到海底的细沙和零星贝壳，浪花不大不小，节奏稳定
    后方: 沙滩尽头是缓坡，长着低矮的耐盐灌木和野草，再往后是稀疏的松林，同伴们的车停在林边
    设施: 几顶帐篷扎在沙滩靠后的平坦处，遮阳伞、折叠椅、冷藏箱、烧烤架散落在周围
  感官素材:
    视觉:
      - 正午阳光直射时沙面泛白，影子很短很黑
      - 下午四点后光线变暖，沙滩染上淡金色
      - 海面在不同时段呈现不同颜色：清晨灰蓝、正午深蓝、黄昏紫橙
      - 远处海平线是一条清晰的直线，偶尔有一两个远洋货轮的模糊轮廓
      - 天空开阔完整，没有高楼遮挡，云的形状和移动清晰可见
      - 涨潮时海浪线以上留下一道深色的湿沙带
      - 月光下海面碎成无数银白色光点
      - 沙滩上有同伴们各自的足迹、毛巾、拖鞋、翻开一半的书
    听觉:
      - 海浪声是恒定的底色，类似均匀的白噪音
      - 退潮时沙粒被水流带动有细碎的摩擦声
      - 海风穿过松林有沙沙声
      - 偶尔海鸟鸣叫，声音单薄短促
      - 同伴之间的说话声在空旷沙滩上显得格外清晰
      - 炭火燃烧偶尔发出轻微爆裂声
      - 夜里安静到能听到自己的呼吸和心跳
    嗅觉:
      - 海腥味——混合了盐、碘、死去的藻类和微小海洋生物的味道
      - 涨潮时腥味加重，退潮时减轻
      - 干沙有一种干净的泥土味，湿沙味道更重更生
      - 松林飘过来的树脂味若有若无
      - 防晒霜和椰子味是人工气息中唯一的存在
      - 烧烤时木炭和食物的焦香短暂压过所有其他气味
    触觉:
      - 干沙蓬松温热，脚踩进去沙子从趾缝间挤出来
      - 湿沙紧实冰凉，踩上去几乎不留痕迹
      - 海水的第一触感是大腿部的凉意，适应后是温和的包裹感
      - 风吹过湿皮肤带走过剩热量，有细微的凉麻
      - 太阳直射皮肤有轻微刺痛，晒后皮肤紧绷发热
      - 夜晚气温下降，手臂起一层薄鸡皮疙瘩
      - 篝火辐射的热度不均匀，正面烫背面凉
  时段氛围:
    清晨:
      - 日出前天空从深蓝过渡到淡粉再到橙黄，整个过程很慢
      - 海面平静如镜，潮位通常最低
      - 沙滩上留下一夜潮水带来的新贝壳和海草
      - 空气清凉湿润，有薄雾
      - 只有海浪声和偶尔的鸟鸣，其他一片寂静
      - 第一个起床的人有独占感
    上午:
      - 阳光开始变强但还不炎热，影子拉得很长
      - 海水温度逐渐升高，适合下水
      - 沙滩上活动开始多起来，铺毛巾、涂防晒、支遮阳伞
      - 空气里开始有防晒霜的味道
    正午:
      - 太阳在头顶几乎零角度，影子缩成一个圆
      - 沙面烫脚，海面反光刺眼
      - 几乎所有人都在遮阳伞或帐篷下躲着
      - 海水是唯一凉快的地方
      - 事物移动变慢，对话变少，下午的沉闷感
    下午:
      - 四点后阳光角度变斜，光线变成金色
      - 温度开始下降，沙滩恢复了可用性
      - 一天中最活跃的时段，游泳、打球、散步
      - 影子重新拉长
    黄昏:
      - 日落持续约半小时，天空颜色从金黄到橘红到紫蓝逐层变化
      - 海面变成镜面，反射天空颜色
      - 人的剪影在逆光中轮廓分明
      - 气温明显下降，需要披件外套或围浴巾
      - 夕阳消失后有一个短暂的"蓝调时刻"，整个世界都是蓝色调的
    夜晚:
      - 星光在没有光污染的天空中极其密集，可以看到银河
      - 月光足够亮时沙滩呈银白色，可以不用手电
      - 只有篝火或露营灯提供暖色光源
      - 海浪声在夜里显得更响
      - 远离篝火的地方黑暗厚重，人的视觉被限制在火光照亮的几米半径内
      - 适合交谈、安静、看星星、听海
