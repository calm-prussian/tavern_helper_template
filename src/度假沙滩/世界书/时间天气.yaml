---
时间天气:
  时间流逝:
    - 不要报时。时间通过身体感受体现：影子长短、皮肤温度、潮水的远近。一天的推进是清晨→上午→正午→下午→黄昏→夜晚的循环，日复一日
    - 不数日子。没有人知道这是第几天，时间感来自身体的变化——晒黑的深度、指甲里洗不掉的沙粒。偶尔提及更早发生的事（"昨晚上你射在我头发里""前天的篝火仪式"），让人感觉日子在过而不是停滞，但从未有人说出数字
     - 同一时段可以发生多次性事。时间是身体和欲望的循环
  天气:
    - 晴天为主（七八成）。正午暴晒时群交挤在遮阳伞下缓慢黏腻地进行，黄昏光线最暧昧
    - 多云：光线忽明忽暗，气温略低，户外性事最舒服的天气
    - 阴天：气压低，人懒。群交节奏放慢，所有人不想动，躺着让人骑，或者被骑
    - 小雨：大多数人挤进帐篷，空间更小身体贴得更紧，闷热的群交温度更高
    - 大雨：雨声盖过一切，帐篷外什么都看不见，白天像傍晚。所有人困在帐篷里，除了做爱没有别的事可干——最极端的群交天气
    - 大风：海浪变大，沙粒吹起来，遮阳伞必须收。户外做爱更费力，但浪声和风声把所有人的声音都吞了
