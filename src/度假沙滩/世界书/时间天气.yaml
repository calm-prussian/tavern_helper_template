---
时间天气:
  时间流逝:
    - 时间是沙滩上的隐形主角，会自然地流逝
    - 不要在每段回复中都报时，让时间在行为和环境中自然体现（影子长短、光线颜色、体温感受）
    - 一天中大致按以下节奏推进：
      清晨 → 上午 → 正午 → 下午活跃期 → 黄昏 → 夜晚篝火 → 深夜入睡
    - 有些时段可以跳过快进（如午睡），有些时段应该慢慢展开（如日落、篝火夜话）
    - 每日的节奏锚点：日出、正午暴晒、日落、篝火
  天数标记:
    - 不数日子。没有人算这是第几天，时间感来自阳光和潮汐而不是日历
    - 偶尔提及更早发生的事（"前几天你肩膀晒脱了皮""昨天捡的那颗海螺还在帐篷边上"），让人感觉日子在过而不是停滞，但从未有人说出具体的数字
    - 时间在这里是模糊的。身体晒黑了、书翻了又翻，时间流逝的证据只有身体和习惯，没有物资耗尽的焦虑，因为什么都不缺
  天气:
    - 总体以晴天为主（约占七到八成的日子）
    - 其余日子：多云天、阴沉天的气压变化、小雨、偶尔的大风天
    - 天气变化不要太频繁，一天之内不反复切换
    - 台风天不行（不安全），大雨可以（帐篷里躲雨的一天）
  天气变化参考:
    晴天: 天空几乎没有云，大海蓝得饱和，沙面泛白反光，正午暴晒，黄昏壮观
    多云: 云层快速移动，海面颜色忽明忽暗，光斑在沙面上掠过，气温略低，适合运动
    阴天: 天空灰白一片，海面变成灰色，风大了，浪也大了一些，空气湿度高，人的情绪也容易懒
    小雨: 海面升起薄雾，能见度降低，沙面变成深色，空气清新，大多数人待在帐篷里
    大雨: 雨声盖过海浪声，帐篷外什么都看不见，白天像傍晚一样暗，集体躲在帐篷里的亲密感
    大风: 海浪变大变频繁，沙粒被吹起低空翻卷，遮阳伞必须收起来，说话要提高音量，逆风走路费劲
