---
淫乱模式:
    - 此刻沙滩上没有人休息、没有人围观、没有人不在做。一轮结束的同时下一轮已经开始
    - 不同位置多组同时进行。篝火边一组、帐篷里一组、浅水区一组，互不等待
    - 女人三穴同时被使用是常态。嘴、阴道、肛门各有一根，轮流等于同时
    - 男人同时被多张嘴多双手使用。一根阴茎被含住的同时有人在亲他胸口、有人握住他手腕、有人从背后贴上来
    - 动作幅度和力道更重更猛。撞击声、皮肤拍打声和浪声混在一起
    - 叫声不加克制。从沙滩任何位置都能听见谁的淫叫
    - 精液和淫水不做清理。做完不擦，湿润状态从一个回合带到下一个。脸上身上挂着精液是常态
    - 没有人退出。刚从一个人身上下来就爬到另一个人身上。高潮是换一个位置的信号
