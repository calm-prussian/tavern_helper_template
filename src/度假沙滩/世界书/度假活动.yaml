---
度假活动:
  水上活动:
    - 游泳：浅水区踩水、深水区自由泳、仰面漂浮看天空
    - 戏水：互相泼水、比谁游得快、教不会游泳的人
    - 冲浪/趴板：浪不大但足够玩，一次一次被浪打翻再爬上去
    - 浮潜：水质清的时候可以看到海底的沙纹、小鱼群
    - 泡水：什么也不做，就站在齐腰深的水里聊天发呆
    - 水上漂浮：仰面躺在水上闭眼漂着，随浪轻轻起伏
  沙滩活动:
    - 晒太阳：铺毛巾躺着，正面晒完翻面晒，涂防晒、戴墨镜、看杂志
    - 堆沙堡：比赛谁堆得高，挖护城河，用贝壳装饰
    - 捡贝壳：沿着潮线低头走，把好看的贝壳放进桶里
    - 沙滩排球：不需要网，就站在两边互相垫球，球经常掉沙里
    - 扔飞盘：接飞盘时沙里跑不稳，经常扑空摔在沙上
    - 埋人：把不想动的人用沙子埋起来，只露个头
    - 沙滩写字：用脚趾在湿沙上写写画画，下一波浪来冲掉
    - 慢跑/散步：沿着浪线赤脚慢跑，感受湿沙的硬度和凉意
    - 瑜伽/拉伸：清晨在海边铺垫子做拉伸，和海浪声一起呼吸
  午间/休憩:
    - 遮阳伞下打盹：听着海浪声半睡半醒
    - 吊床：在松林间绑吊床慢慢晃
    - 看书：翻几页就读不下去，放下书发呆
    - 听歌：分一只耳机给旁边的人，或者自己戴耳机发呆
    - 聊天：没什么特定话题，想到什么说什么
    - 玩桌游/扑克：帐篷里铺开垫子打牌，输赢无所谓
    - 拼图：带了一盒拼图，大家在遮阳伞下慢慢拼
  黄昏活动:
    - 海边散步：赤脚沿浪线走，海水偶尔没过脚踝
    - 拍照：拍落日、拍剪影、拍贝壳、拍海浪、拍彼此
    - 收集贝壳和石头：挑最好看的装袋
    - 看日落：坐在沙滩上不说话的半小时
    - 冲掉海水：回帐篷或车边用备好的清水冲掉身上的盐，换干净衣服
  夜晚活动:
    - 篝火：围坐在篝火边烤火，看火星升上去消失在黑暗里
    - 看星星：躺在沙滩上仰头看星空，指认星座，聊宇宙和外星人
    - 夜话：篝火让交谈变容易，一些白天不说的话题会自然浮上来
    - 听海浪：不说话就听海浪有节奏地拍打，很催眠
    - 烤棉花糖/烧烤：用篝火的余烬烤东西，表皮焦香
    - 讲故事：轮流讲有趣的事、学生时代、旅行经历
    - 唱歌：有人起头有人跟，唱得不好笑成一团
    - 夜间游泳：月光下海水发着荧光，少部分人敢下水
    - 守夜：不想睡的人留在篝火边添柴，看夜色从最深蓝慢慢变浅
  雨天活动:
    - 帐篷里聊天：雨打在帐篷布上的声音很近很均匀，帐篷内说话听得很清楚
    - 听雨：什么也不做，就躺在帐篷里听雨声
    - 打牌/桌游：帐篷里铺开垫子
    - 看书/写日记：难得的安静
    - 雨停后出去：沙滩被冲刷平整，空气洗过的味道
