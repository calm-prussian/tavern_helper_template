---
度假活动:
  说明: 以下活动均可自然滑入性事。色色和度假不是两个类别——它们是同一件事。
  水上活动:
    - 游泳：浅水区踩水、深水区自由泳、仰面漂浮看天空。游回来被浴巾擦干的手顺势滑进泳裤/泳衣
    - 戏水：互相泼水、比谁游得快、教不会游泳的人。教游泳的身体接触从扶腰变成抱紧
    - 冲浪/趴板：浪不大但足够玩，一次一次被浪打翻再爬上去。浪打翻时两个人叠在一起
    - 浮潜：水质清的时候可以看到海底的沙纹、小鱼群。水下憋气接吻
    - 泡水：什么也不做，就站在齐腰深的水里聊天发呆。水下手指从腰滑到腿间
    - 水上漂浮：仰面躺在水上闭眼漂着，随浪轻轻起伏。被从下面进入，浮力和插入力在身体里打架
  沙滩活动:
    - 晒太阳：铺毛巾躺着，正面晒完翻面晒，涂防晒、戴墨镜、看杂志。涂防晒的手从肩膀滑到胸口、滑到小腹
    - 堆沙堡：比赛谁堆得高，挖护城河，用贝壳装饰。堆一半被扑倒在沙堡上，沙子从胸前塌下去
    - 捡贝壳：沿着潮线低头走，把好看的贝壳放进桶里。走远了没人看见
    - 沙滩排球：不需要网，就站在两边互相垫球。接球摔倒的人被扶起来，手没离开腰
    - 扔飞盘：接飞盘时沙里跑不稳，经常扑空摔在沙上。摔在一起嘴唇碰到嘴唇
    - 埋人：把不想动的人用沙子埋起来，只露个头。被埋的人全身不能动，别人做什么都无法反抗
    - 沙滩写字：用脚趾在湿沙上写写画画，下一波浪来冲掉
    - 慢跑/散步：沿着浪线赤脚慢跑，感受湿沙的硬度和凉意
    - 瑜伽/拉伸：清晨在海边铺垫子做拉伸，和海浪声一起呼吸。拉伸的姿势本身就是性的前置
  午间/休憩:
    - 遮阳伞下打盹：听着海浪声半睡半醒。睡着的身体被手指轻轻碰醒
    - 吊床：在松林间绑吊床慢慢晃。吊床只能躺两个人所以必须贴紧
    - 看书：翻几页就读不下去，放下书发呆。旁边人的手从书页下面伸过来
    - 听歌：分一只耳机给旁边的人，或者自己戴耳机发呆。耳机线缠在一起人就靠近了
    - 喝一杯：从冷藏箱里摸出冰啤酒或果酒递给旁边的人。冰凉的瓶身上挂着水珠，碰到嘴唇的时候对方看着你的眼睛。一口一口喝到微醺，身体比平时更软更热
    - 聊天：没什么特定话题，想到什么说什么。说着说着声音越来越低，只剩呼吸
    - 玩桌游/扑克：帐篷里铺开垫子打牌。输了的惩罚从脱一件变成做一件
    - 拼图：带了一盒拼图，大家在遮阳伞下慢慢拼。拼累了躺下来，身体挨身体
  黄昏活动:
    - 海边散步：赤脚沿浪线走，海水偶尔没过脚踝。走着走着走到礁石后面
    - 拍照：拍落日、拍剪影、拍贝壳、拍海浪、拍彼此。拍着拍着镜头放下来开始接吻
    - 收集贝壳和石头：挑最好看的装袋
    - 看日落：坐在沙滩上不说话的半小时。肩靠着肩，手慢慢交叠，身体跟着落日一起往下躺
    - 冲掉海水：回帐篷或车边用备好的清水冲掉身上的盐。互相冲水的手指滑过每一寸皮肤，说是冲盐其实是摸
  夜晚活动:
    - 篝火：围坐在篝火边烤火，看火星升上去消失在黑暗里。冰啤酒递过来的时候两个人的手指碰到一起。靠着肩膀→接吻→手伸进衣服→围成一圈群交
    - 看星星：躺在沙滩上仰头看星空。躺在毯子上的人越来越多，身体越靠越近
    - 夜话：篝火让交谈变容易，几杯果酒下肚后一些白天不说的话题自然浮上来——包括想和谁做
    - 听海浪：不说话就听海浪有节奏地拍打。海浪声盖住身体发出的湿润声响
    - 烤棉花糖/烧烤：用篝火的余烬烤东西。喂食的手指被含住，烤串掉在沙上没人管。配冰啤酒，吃一口喝一口，没人注意自己喝了多少
    - 讲故事：轮流讲有趣的事、学生时代、旅行经历。讲着讲着就变成边做边讲
    - 唱歌：有人起头有人跟，唱得不好笑成一团
    - 夜间游泳：月光下海水发着荧光，下水后泳衣脱了漂在水面上
    - 守夜：不想睡的人留在篝火边添柴。守夜的一对一变成一对一加后来加入的人
  雨天活动:
    - 帐篷里聊天：雨打在帐篷布上的声音很近很均匀，帐篷里闷热的群交温度更高
    - 听雨：什么也不做，就躺在帐篷里听雨声。躺着躺着腿缠在一起
    - 打牌/桌游：帐篷里铺开垫子。果酒从冷藏箱里拿出来传着喝，输了的人脸比酒还红
    - 看书/写日记：难得的安静
    - 雨停后出去：沙滩被冲刷平整，空气洗过的味道
