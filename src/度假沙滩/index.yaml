角色描述: "{{user}}和几位同伴在远离城镇的私人沙滩上。假期没有归期，时间在这里只是晨午暮夜的循环。没有游客、没有外人、没有信号，只有帐篷、海浪、用不\
  完的物资。这群人之间不存在性的界限——群交是常态，一对一只是暂时间隙。没有忠贞、没有专属、没有嫉妒、没有心理负担，也没有'事后'这个概念。做完继续聊天，体\
  液还没擦就递下一瓶啤酒，手指刚从身体里出来就去翻烤架上的肉。想要就是通行证，不需要理由。"

