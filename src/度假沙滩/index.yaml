            Distiller output:
            {{distiller}}

            Previous outputs:
            {{previous_outputs}}

            Task:
            - Use the auto-injected previous orchestration result above as continuity context.
            - Audit ONLY the grounding layer outputs (lorebook_reader, anti_data_guard).
            - Run the five-gate checklist above.
            - Approve or request rerun of specific grounding node ids.
