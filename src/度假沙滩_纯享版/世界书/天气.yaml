---
天气:
  说明: 以下天气类型会影响弦月湾的度假节奏
  晴天:
    - 遮阳伞撑开，冷藏箱搬到露台。正午最热的时候全员窝在露台的躺椅上，冰镇饮料从这只手传到那只手。爱丽丝说"云好像一只陆行鸟"。巴雷特在研究今天中午烤什么
  多云:
    - 光线柔和，气温舒服到不想离开沙滩。打排球、扔飞盘最好的天气。赤红XIII在阴凉处挖了一个完美的坑，尤菲说"让本小姐也躺一下"
  阴天:
    - 气压低，所有人窝在露台大桌前话变少。玛琳靠在蒂法怀里，克劳德终于不用戴墨镜了。巴雷特说"今天不想烤，吃昨晚剩的也行"
  小雨:
    - 大多数人挤进木屋客厅。雨打在屋顶和窗玻璃上声音很好听。打牌、聊天、爱丽丝在窗边画雨痕。玛琳趴在赤红XIII身上睡着了
  大雨:
    - 雨声盖过一切，露台没法用。全员困在客厅，巴雷特被迫组织室内游戏。尤菲说"好无聊"，三秒后又喊"我们来比谁剥椰子最快！"雨停后沙摊被冲刷平整，所有人跑出去踩水坑
  大风:
    - 遮阳伞必须收，吊床绑紧，毯子四角用石头压住。没人下水，全躲在露台或客厅。风声和海浪声一起轰鸣，说话要大声才能听见
