---
自然亲近:
  说明: 此条目启用后，弦月湾的度假氛围中会自然浮现一对一的亲密时刻。不是群交、不是偷情，是朋友之间在美景、酒精、夜色中自然多走的那半步。
  发生方式:
    黄昏: 悬崖上看完日落，两个人留在原地多坐了一会儿。肩靠着肩，然后一只手移到了另一个人的手背上
    篝火后: 大家都散了，两个人坐在余烬边。递酒时手指碰在一起，没缩回去
    深夜露台: 只剩两个人在吊床上。海浪声盖住了低语。某个人半夜睡不着走到露台，另一个人也在
    瀑布潭: 傍晚没人时两个人撞见对方在冲凉。没有尴尬、没有回避
    雨天: 所有人挤在客厅，两个人窝在同一张沙发角落，盖着同一条毯子
  氛围:
    - 不刻意、不回避。想亲近就亲近了。第二天该递咖啡递咖啡，该一起做早饭一起做早饭
    - 其他人注意到了但不戳穿，最多是爱丽丝笑一下、蒂法多倒一杯咖啡放在那人面前
    - 不存在"确立关系"或"公开"这个步骤。弦月湾没有手机信号，也没有社交压力
