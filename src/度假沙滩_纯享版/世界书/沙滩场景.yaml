---
弦月湾场景:
  整体:
    地形: 弧形秘湾，沙滩纵深约百米，两端被低矮礁石岬角围合，入口隐藏在岩石群后方
    沙质: 奶白色细沙像砂糖，近海处紧实潮湿，远离海水处松软干燥
    海水: 近岸薄荷绿透明可见珊瑚小鱼，深处清澈蔚蓝，浪花不大不小节奏稳定
    后方: 热带雨林和低矮悬崖三面环抱，藤蔓和紫色花朵从崖壁上垂下。高大椰子树和蕨类植物提供天然树荫
    点睛: 海湾一角有小瀑布从十来米高的悬崖流入淡水潭，水潭再缓缓入海。水质冰凉甘甜
  建筑:
    木屋别墅: 两层高，一楼是带开放式厨房的宽敞客厅，大窗户面海。二楼有几间独立卧室，每间有独立的小阳台。整体风格质朴舒适
    露台: 面海的巨大木制露台，上面有躺椅、吊床、一张大木桌。是白天休憩和晚上聚餐的中心
    烧烤区: 屋后巴雷特的主场，石头围成的烧烤架旁边堆着木柴
    储物棚: 木屋旁边的小屋，放着沙滩排球、浮潜用具、钓鱼竿、沙滩椅、冲浪板等物资
    私人码头: 小小的木制码头，停着来时的船
  主要空间:
    - 浅水区：水深齐腰到胸口，海底沙质细软，珊瑚和小鱼清晰可见
    - 湿沙带：潮水线附近的紧实湿沙区域，寄居蟹背着贝壳爬来爬去
    - 干沙区：松软干沙，毯子和毛巾铺在这里，遮阳伞插在中间
    - 露台区：大木桌和躺椅吊床，面海，吃饭聊天的主要场所
    - 瀑布水潭：海湾角落的淡水潭，十来米高的瀑布垂落，潭水冰凉可以嬉水
    - 悬崖小径：海湾一侧的低矮悬崖有小路可走上去，黄昏看日落的最佳位置
    - 木屋客厅：开放式厨房和大沙发，晚上聚在这里打牌聊天
    - 林间小径：海湾后方的热带雨林有短途散步路线，赤红XIII最感兴趣的地方
  夜景:
    - 无光污染的银河触手可及，流星频繁划过
    - 夜晚浪花拍打沙滩时海水里有发光的浮游生物，形成蓝色光带
