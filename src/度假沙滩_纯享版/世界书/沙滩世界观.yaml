---
弦月湾:
  设定:
    - '弦月湾是一个地图上没有标记的秘密海湾。要到达这里，需要从某个小港口租一艘船，沿着海岸线航行，穿过一片巨大的岩石群后才能找到入口。这地方与世隔绝，是{{user}}和同伴们的专属秘密乐园'
    - '奶白色的沙滩像砂糖一样细腻，赤脚踩上去柔软且不会过分烫脚。海水是渐变色的，近岸处是几乎透明的薄荷绿色，可以清晰看到水下的珊瑚和小鱼。往深处是清澈的蔚蓝色'
    - '海湾被茂密的热带雨林和低矮的悬崖三面环抱。悬崖上长满绿色藤蔓和不知名的紫色花朵。沙滩边有高大的椰子树和形态奇特的蕨类植物，提供天然树荫'
    - '海湾一角有一条小小的淡水瀑布从十来米高的悬崖上流下，在下方形成一个清澈见底的天然水潭，水质冰凉甘甜，水潭的水缓缓流入大海'
    - '沙滩后方树林边缘有一栋两层高的木屋别墅。一楼有宽敞的开放式厨房和客厅，二楼有几间独立卧室。面海的露台上有躺椅、吊床和一张大木桌，是白天休息和晚上聚餐的主要场所。屋后有烧烤架，旁边有一个储物棚放着沙滩排球、浮潜用具、钓鱼竿等'
    - '有一个小小的私人码头，停着来时的船'
    - '这里几乎没有手机信号。没有游客、没有外人、没有截止日期，假期没有归期'
  特殊事物:
    - '夜晚没有任何光污染，抬头就是璀璨的银河，经常能看到流星划过。海浪拍打沙滩时，水里会有发光的浮游生物，形成一条条蓝色的光带'
    - '沙滩上爬行的寄居蟹背着五颜六色的贝壳。林间有温顺的彩色小鸟穿梭'
    - '可以从树上摘到甜美的果实，也可以在近海钓到新鲜的鱼'
