---
度假活动:
  说明: 弦月湾的度假日常。大家各自以自己的方式享受这个没有归期的假期
  水上活动:
    - 游泳：浅水区踩水、深水区自由泳、仰面漂浮看天空。蒂法能漂很久，尤菲试图踩水打架
    - 戏水：互相泼水、比谁游得快。爱丽丝和尤菲围攻克劳德，克劳德面无表情但没跑
    - 浮潜：近岸海水清澈，戴面镜看珊瑚和小鱼。尤菲和蒂法可以潜很久
    - 泡水：什么也不做，站在齐腰深的水里聊天发呆。巴雷特扛着玛琳在水里"开快艇"
    - 水上漂浮：趴在充气浮床上闭眼漂着，随浪轻轻起伏。蒂法的最爱
  瀑布潭:
    - 瀑布冲凉：站在瀑布下让冰凉的水砸在肩膀上。克劳德会站很久，说是在"冷静"
    - 潭水嬉水：不习惯咸水的人来淡水潭玩。爱丽丝喜欢在这里漂花瓣。玛琳在浅水处踩水花
  沙滩活动:
    - 晒太阳：铺毛巾躺着，正面晒完翻面晒，涂防晒、戴墨镜。克劳德假装睡觉但没睡着
    - 堆沙堡：比赛谁堆得高，巴雷特用义肢挖沙子建"要塞"，玛琳给城堡插小树枝当旗子
    - 捡贝壳：沿着潮线低头走，爱丽丝总捡到最漂亮的，然后送人
    - 沙滩排球：不需要网，两边互相垫球。蒂法是扣球主力，尤菲飞扑接球全身沙子
    - 扔飞盘：赤红XIII嘴上不屑但每次都冲出去接。玛琳扔的飞盘飞不到一米远
  午间休憩:
    - 露台打盹：躺在露台的吊床上听着海浪声半睡半醒。玛琳随机在某个人身上睡着
    - 看书听歌：翻几页读不下去，放下书发呆。分一只耳机给旁边的人
    - 喝一杯：从冰箱里摸出冰啤酒或果酒。冰凉的瓶身挂着水珠，一口一口喝到微醺
    - 聊天：没什么特定话题，想到什么说什么。从"今天中午吃什么"聊到"昨晚梦到什么"
    - 玩桌游扑克：客厅铺开垫子打牌。尤菲解说型选手，克劳德闷声赢所有人
  黄昏活动:
    - 悬崖看日落：沿着悬崖小径走上去，坐在崖边看夕阳沉入海平面，把天空和海面染成金红
    - 海边散步：赤脚沿浪线走，海水偶尔没过脚踝。蒂法喜欢拉人陪她走
    - 拍照：巴雷特用防水相机疯狂拍玛琳。尤菲偷拍克劳德的丑照
  夜晚活动:
    - 露台聚餐：大家围坐在大木桌前。巴雷特主烤，蒂法摆盘，其他人负责吃和夸
    - 篝火：在沙滩上生一堆篝火，看火星升上去消失在银河里。烤棉花糖、弹吉他、讲故事
    - 看星星：躺在沙滩上仰头看星空。爱丽丝会讲关于星球的故事。经常有流星划过
    - 浮游生物：夜晚浪花拍打沙滩时泛着蓝色荧光。爱丽丝开心得拉着每个人看
    - 夜谈：篝火让交谈变容易，几杯果酒下肚后白天不说话的话题自然浮上来
  雨天活动:
    - 客厅打牌聊天：雨打在屋顶上很均匀。所有人挤在客厅的沙发和地毯上
    - 听雨：什么也不做，就躺在窗边听雨声。玛琳趴在赤红XIII身上
    - 室内比赛：尤菲发起各种室内比赛，"比谁剥椰子最快"或"比谁讲的笑话最冷"
    - 雨停后出去：沙滩被冲刷平整，空气洗过的味道。所有人跑出去踩水坑
