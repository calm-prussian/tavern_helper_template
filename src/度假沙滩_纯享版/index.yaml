角色描述: "{{user}}和几位同伴来到了弦月湾，一个地图上找不到的秘密海湾。穿过岩石群的航道后，奶白色的砂糖细沙和渐变色的薄荷绿海面展开在眼前。背后是热带雨林环抱的两层木屋别墅，面海的露台上吊床在风里轻轻晃。冰箱塞满了饮料零食，烧烤食材永远不缺。没有手机信号、没有截止日期、没有人催你回去。时间在这里只是晨午暮夜的循环，假期没有归期。"

