---
毕业典礼场景:
  整体:
    地点: 加雷马格大修道院——帝国边境的古老 stone 建筑群，建于丘陵顶端，可俯瞰周边森林和湖泊
    时间: 傍晚典礼结束后 → 宴会 → 深夜 → 黎明
    天气: 初夏夜晚，微风，无月或满月
  空间:
    宴会厅:
      - 长桌摆满食物和酒水，烛光摇曳，墙上是历代校长的画像
      - 人们从座位散开，三三两两聚在一起聊天、跳舞、敬酒
      - 乐师在角落演奏轻松的曲目，声音刚好填满空间但不刺耳
    花园:
      - 修道院后方有大片玫瑰花丛和小径，夜晚有萤火虫
      - 喷泉在月光下泛着银色光芒，是情侣幽会的经典地点
    大礼堂:
      - 白天举行毕业典礼的地方，椅子还留在这里，可以用来做各种事
    宿舍区:
      - 学生的房间——单人床或双人间，凌晨最热闹的区域
    大教堂:
      - 庄严肃穆的空间，神职人员的大床在这里——讽刺的是在这里做的事
    湖边:
      - 修道院旁的湖，夜晚平静如镜，倒映星光——适合想要安静一点的地方
    训练场:
      - 白天练武的地方，有木桩和草人，夜晚变成捉迷藏的场所
  感官素材:
    视觉:
      - 烛光在每个人脸上投下摇曳的暖色阴影
      - 宴会厅的水晶吊灯反射出彩虹色的光斑
      - 人们穿着毕业礼服——男生修身西装，女生白衬衫配各色长裙
      - 深夜有人开始脱掉外套、松开领结、卸下发饰
      - 月光下的湖面像铺了一层银箔
      - 宿舍里烛光、人影、肢体交织
    听觉:
      - 宴会厅的交谈声、笑声、碰杯声逐渐变成嬉闹
      - 远处的乐声和近处的私语交织
      - 夜晚湖边只有水声和虫鸣
      - 深夜狂欢的声音——笑声、喘息、尖叫、起哄——从各个房间传出
      - 黎明时分鸟鸣声渐起
    嗅觉:
      - 宴会厅：食物香气、酒气、香水混杂
      - 花园：玫瑰花香、夜露的泥土气息
      - 房间：薰衣草香包、烛火的白杨味、人体汗味混合
      - 湖边：水汽、青草、夜晚特有的凉意
    触觉:
      - 礼服面料——丝缎、亚麻、棉
      - 酒过三巡后身体开始发热，皮肤相触的触感变得敏感
      - 夜晚微凉的风吹过裸露的皮肤
      - 烛光的热度、身体的体温、葡萄酒的后劲
  时段氛围:
    傍晚:
      - 典礼刚刚结束，人们从礼堂走向宴会厅，礼服整洁，表情兴奋
      - 敬酒、交谈、笑声——一切还在"正常"范围内
    夜幕降临:
      - 宴会进行到中后段，酒意上涌，话题开始变得大胆
      - 有人开始开带颜色的玩笑，有人悄悄离席
    深夜:
      - 狂欢高潮——整个修道院变成巨大的派对
      - 没有人睡觉，所有人都在参与或旁观
      - 地点不再固定——宴会厅、花园、宿舍、大教堂、湖边、训练场
    黎明:
      - 疲惫但满足的人们东倒西歪地躺着
      - 有人已经睡着，有人还在继续
      - 天亮后没有人提起"接下来"——因为时间不会进入第二天
      - 当第一缕阳光洒进修道院，一切自然地淡回傍晚——典礼重新开始，就像刚才的一切从未发生