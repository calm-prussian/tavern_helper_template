---
海南环岛:

  路线: 海口→文昌→万宁→陵水→三亚→东方→海口，九天约七百公里。

  海口 — 出发:
    位置: 海南北端，城市海滨
    营地: 西海岸滨海营地。离市区不远，但海风吹得到
    氛围: 第一天。新鲜感和手忙脚乱混在一起。后视镜里是逐渐变小的城市天际线，前面是九天的空白。爱丽丝把脚放在仪表盘上（被蒂法说了"放下来"）。三个人对拖挂还不熟，晚上搭遮阳棚花了半小时，最后发现少看了说明书的一步。蒂法蹲在地上重新翻说明书，爱丽丝在旁边打手电筒，"下次我们就熟了。"
    第一天晚上三个人躺在那张一米四的床上。天窗外面的星星很清晰，城市里看不见这么多。没人说话，听着对方呼吸，蒂法的呼吸慢而长，爱丽丝的快而浅，{{user}}在中间。
    美食_海口:
      - 海南粉: 细粉配酸菜、花生、肉丝、秘制卤汁
      - 椰子水: 路边三块钱一个，摊主用砍刀劈开。喝完让他把椰肉刮下来
      - 老爸茶: 一种生活方式，下午骑楼下面一壶红茶加几笼点心

  文昌 — 东郊椰林:
    位置: 海南东北，椰林半岛
    营地: 东郊椰林房车营地，被大片椰子树围在中间
    氛围: 椰林很大。路两边都是高耸的椰子树，阳光从叶子缝隙里碎成一地。空气比海口更湿一点，椰子味混合着远处的海味。白天三个人骑了租来的单车在椰林小路里穿，爱丽丝骑在最前面，回头喊快点。蒂法骑在最后，确保没有人掉队。{{user}}的自行车链掉了两次，蒂法蹲下来帮忙上链，手沾了机油。擦在牛仔裤上。
    晚饭在一家路边的文昌鸡店。鸡肉嫩得三个人安静了五分钟。爱丽丝吃完第一口看了蒂法一眼，"以后吃别的鸡怎么办。"蒂法:"回文昌。"
    美食_文昌:
      - 文昌鸡: 白切，骨头带血的正宗做法，皮脆肉嫩蘸姜葱酱油
      - 椰子鸡火锅: 文昌椰子多、便宜、现劈，两个椰子的水倒进锅里煮鸡，汤是甜的
      - 东郊椰林烤乳猪: 只在周末出摊，皮烤成脆的肉还带汁

  万宁 — 石梅湾:
    位置: 海南东南，冲浪圣地。日月湾在旁边
    营地: 石梅湾营地，离海滩步行三分钟，能听到浪声
    氛围: 第一天下午暴雨。雨势来得很快，三个人刚从车上下来准备去海边，天就黑了。赶紧缩回拖挂里，车门关上的同时雨劈里啪啦砸在车顶。雨声很大，在拖挂里说话要抬高音量。爱丽丝:"计划泡汤，"蒂法把雨声当背景音，烧了水泡茶。三个人挤在卡座上，腿碰腿。煮水的蒸汽和雨声和没有人说什么特别的午后。
    雨停了之后天还是灰的。但海滩上没人，整片海滩是他们的。沙滩被雨浇过之后更细更凉。蒂法站在水边看远处灰蒙蒙的海天交界，"明天会晴。"到了日月湾发现真的有浪，花了半天学冲浪。蒂法教{{user}}，爱丽丝在旁边摔了一百次然后终于成功站了五秒。
    美食_万宁:
      - 后安粉: 猪肉汤底河粉配炸虾米和葱花，猪骨汤滚了整夜，胡椒多
      - 东山羊: 海南万宁独有的黑山羊，干煸做法最好吃
      - 和乐蟹: 青蟹的一种，个头大，白灼就行，黄和肉都快撑出来
    性爱场景_无人海滩: 万宁的午后、陵水的傍晚、东方的日出之前，能找到没有人的海滩。沙滩边缘有岩石挡着，浪声盖过说话声音。用一张大浴巾平铺在沙子上，浴巾不够长，三个人的身体超出了边缘。做完起身后浴巾皱成一条绳，沙子在头发里、耳朵后、衣服折缝里。蒂法抱着浴巾走到水边甩了十几下，沙子还在但心情好。回去的车上三个人都湿着，是又下去泡了一次海水再上来的。

  陵水 — 分界洲岛附近:
    位置: 海南东南偏南
    营地: 靠海的营地，不远处有海鲜菜市场
    氛围: 海水的颜色从这里开始变，从灰蓝变成蓝绿。上午去潜水，爱丽丝第一次看到水下珊瑚，嘴巴在呼吸管里叫了一声，冒了一串泡泡上来。蒂法在水下很从容，肺活量好，能在水里待很久。{{user}}被一条小鱼追着啄了膝盖，上岸后给两人看，"你们看，小鱼咬我。"爱丽丝:"那是亲你。"
    下午从菜市场买了虾、花蛤、石斑鱼。蒂法在房车里做了一顿白灼，电磁炉烧水，姜丝切得很细。三个人在车外遮阳棚下剥虾吃，手指头是腥的。夕阳把沙滩从黄色染成橙色。爱丽丝剥了一个虾递到蒂法嘴边，蒂法张嘴接了。然后剥了一个给{{user}}。这个动作重复了好几轮。
    美食_陵水:
      - 陵水酸粉: 细粉加酸汤、沙虫干、鱿鱼干、花生、香菜，酸汤是发酵米汤
      - 海鲜: 菜市场买虾蟹鱼自己做，蒂法擅长白灼和清蒸

  三亚 — 亚龙湾/海棠湾:
    位置: 海南最南端
    营地: 亚龙湾附近正规营地。海棠湾有更适合安静居住的营地
    氛围: 三亚是九天里最"城市"的一站。海滩上人多，色彩鲜艳的遮阳伞沿着海湾一字排开。三个人决定不在人多的海滩待太久，转去了免税城逛了半天。爱丽丝试了五六款香水，最后没买。蒂法在旁边的运动店看了一双拳击手套，也没买。{{user}}买了三杯冷饮，付款的时候发现三亚物价确实比文昌贵了一截。
    第二天换到海棠湾，那边人少。找到了一处可以浮潜的礁石区。傍晚回去的路上经过海棠湾的广场，有人弹吉他，爱丽丝停下听了一首歌。海棠湾营地的晚上是这趟旅行里最安静的一晚。三个人早早洗漱完躺在拖挂大床上，明天就要开始往北走了。爱丽丝说:"时间过得好快。"蒂法"嗯"了一声。{{user}}没说话，但手臂被两个人各枕了一边。
    美食_三亚:
      - 清补凉: 椰奶底，薏米、红豆、绿豆、通心粉、椰肉、西瓜粒，暑气降一半
      - 抱罗粉: 粗米粉，卤汁浓，配牛肉干和猪肚
    性爱场景_礁石区浅滩: 三亚海棠湾的礁石区，退潮时有浅水区，水刚到膝盖。礁石被海水磨成圆的，踩上去不扎。水是透明的，往下能看到脚趾。这里可以做但要站着; 在水里移动慢，水阻是天然的限速装置。爱丽丝最喜欢:"水里不一样。"理由是浮力。蒂法:"水里站不稳。"但还是做了。结束后不远处有人声，两个游客在捡贝壳。三个人迅速分开。分开的样子太刻意了，爱丽丝憋不住笑。"你们俩的表情，"
    性爱场景_海滩篝火后: 日月湾允许篝火，在划定区域内。晚上三个人围坐在篝火旁边烤棉花糖，火星飘起来往天上飞。火灭了之后只剩木炭的红光。温度刚退，夜风从海面吹过来有一点点凉。裹着同一张毯子走回去。回到拖挂里身上还有篝火的烟味，头发里和衣服上。这种味道在做爱时会注意到，像一种背景气息。

  东方 — 鱼鳞洲:
    位置: 海南西岸
    营地: 鱼鳞洲附近营地，灯塔在视线范围内
    氛围: 西海岸和东海岸是两种海南。风更大、浪更急、夕阳更红。鱼鳞洲的灯塔在山坡上，傍晚的时候阳光从灯塔正后方沉下去，整个灯塔变成一个剪影。三个人坐在岸边看落日，这是九天里看的最完整的一次日落。爱丽丝拍了三十几张照片，从中挑了一张最好看的发到三个人的群里:"这趟旅行的封面。"
    晚上去当地的渔港买鱼。渔港的气味浓烈，柴油味、海水味、鱼的味。一个老渔民蹲在码头补渔网，头也不抬。蒂法买了一条海鲈和两只花蟹。回去的路上爱丽丝在车里唱歌，是一首她们高中时流行的歌。蒂法接了一句歌词。{{user}}不会唱，但听了整首。
    最后一晚在拖挂里。三个人都知道明天要还车了。做的比平时久。结束后爱丽丝说"还想再旅行一次"。蒂法没说话，但睡之前把手搭在两个人都能够到的位置。
    美食_东方:
      - 海鲈鱼: 西海岸的鱼肉质比东岸紧，蒂法整条清蒸大火七分钟，淋蒸鱼豉油和滚油
      - 四更烤乳猪: 小乳猪整只烤，皮更脆肉更薄，傍晚的摊子前排队

  海口 — 还车:
    位置: 回到起点
    氛围: 上午开车回海口。这条路是D1来时的同一条路，但方向反了。来时车窗外面是未知，回时车窗外面是"记得"。爱丽丝路过文昌方向的路牌说:"那个文昌鸡太好吃了。"蒂法:"下次再吃。"说的是"再"。
    下午还车。把拖挂里的所有东西清出来，垃圾丢掉、冰箱清空、地上的沙子扫干净。蒂法检查了三遍没有落东西。最后三个人站在空荡荡的拖挂门口看了几秒。这个拖挂在这九天里是一个小小的家。爱丽丝:"谢谢你哦，小房子。"拍了拍车门框。蒂法笑了一下。车钥匙交回租车行。九天的旅行结束。

  全岛通用美食:
    - 椰子主要是文昌和琼海的多，别的地方的椰子不一定好喝
    - 海鲜大排档没有菜单，自己选鱼选做法（清蒸、白灼、椒盐、加辣），看着他捞出来免得被掉包
    - 路边水果摊: 椰子、芒果、菠萝、龙眼、红毛丹，海南水果比内地便宜很多
