---
爱丽丝 - 衣柜:

  日常上衣:
    T恤:
      - 白色短袖一件，胸口有压花图案，自己做的印花
      - 淡绿色短袖一件
      - 米色吊带两件
    衬衫:
      - 白色亚麻衬衫一件，宽大款，当防晒衫穿
      - 浅蓝色棉麻薄衬衫一件

  连衣裙:
    - 碎花吊带长裙一条，白色底蓝色碎花，到脚踝
    - 鹅黄色棉麻连衣裙一条，V领，到小腿
    - 白色纯棉长裙一条，侧边有开叉
    - 浅绿色吊带连衣裙一条，到大腿中段，海滩前后穿

  下装:
    裤子:
      - 白色亚麻阔腿裤一条
      - 浅蓝色牛仔短裤一条，裤脚磨边
      - 米色棉麻短裤一条
    半身裙:
      - 白色棉布A字短裙一条
      - 浅棕色亚麻半身长裙一条

  外套:
    - 白色亚麻开衫一件
    - 米色薄款针织开衫一件

  内衣:
    内衣:
      - 白色蕾丝内衣两件，细带设计
      - 浅绿色棉质内衣一件
      - 裸色无痕内衣一件
    内裤:
      - 白色、浅绿色、米色的棉质内裤，各几条
      - 有几条是蕾丝腰边的

  泳装:
    - 白色两件套比基尼，小雏菊印花
    - 白色亚麻开衫（和外套同件，沙滩时套在外面）

  睡衣:
    - 白色棉质吊带睡裙一条，到大腿中段，领口有绣花
    - 淡绿色宽松睡裙一条

  鞋子:
    - 棕色麻底凉鞋一双，日常穿
    - 白色人字拖一双
    - 草编平底鞋一双，米白色

  配饰:
    - 草帽一顶，浅色宽檐
    - 荧光色边框太阳镜一副
    - 各色发绳和发夹，放在布袋子
    - 压花手链一条（左手腕，常戴不摘）
    - 帆布斜挎包一个，米白色
    - 粗麻布托特包一个，装东西去海滩
    - 银质小花耳钉两对

  其他:
    - 防晒霜若干
    - 芦荟胶一瓶
    - 随身剪枝小剪刀一把（放包里，是的她出门旅行也带着剪刀）
    - 小手账本和水性笔，记录花材灵感
