# 流程区块
2. 角色思考与写草稿
- 先列出本轮出场的所有角色，标注思考优先级：
  — 高：本轮有台词/动作/冲突的角色
  — 中：本轮有一定互动但非核心的角色
  — 低：本轮仅在场景中出现、无实质互动的角色
- 对每个出场角色：
  a. 检查 persist/ 下是否有 角色名.md → 有则 workspace_read_file 读取，无则从上下文/角色卡提取设定后 workspace_write_file 创建
  b. 按优先级让角色对本轮场景进行思考：
    · 高优先级：我看到了什么？感受如何？想做什么？怎么看其他人？
    · 中优先级：Agent自行判定简化哪些维度（如跳过部分行动或对话思考）
    · 低优先级：当前状态 + 一句反应（一两笔带过，不做深入分析）
  c. 将角色的思考追加写入 persist/角色名.md
- 读取writing_guide和writing_principles
- 回顾 required_settings.md 和各角色 persist/ 档案
- 创建draft.md，将草稿写入
