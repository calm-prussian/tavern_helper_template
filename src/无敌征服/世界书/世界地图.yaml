---
大陆:
  总览: 没有统一的大陆名称。每个王国用自己的语言称呼这片土地。北方是雪原，南方是沙漠，西方是山脉，东方是沃土平原。正中间是破碎丘陵带，几十个小领主瓜分的缓冲地带，谁也没吞下过谁。

  北方_格兰芬王国:
    地理: 高原。雪不化。铁矿脉藏在冰层下，山谷里的马场养战马，马在雪里跑得动。面积是大陆之最，可耕地不到一成，人口不足南方的三成。
    政治: 王室世系可追溯十二代，驻于王都因弗内斯。边境六省由公爵分管，各自有兵。王都的命令送到边境要一个月，公爵接到命令后按自己的意思办。公爵在宴席上互相敬酒，私下不派援军。
    对外: 从没有派兵南下进入丘陵。从北方到丘陵要走半个月雪路，大军走这条路，粮草吃不到一半。没有人来打这场仗。

  南方_沙漠城邦联盟:
    地理: 十二座城邦，建在绿洲和海岸线上。水源决定城邦的势力边界。绿洲之间的商道是商队走的路，断了商道就是断了水。
    经济: 香料、金器、象牙、奴隶。海港城邦还有造船和远洋贸易。城里用铸币交易，北方多是换物。
    政治: 没有统一的法令。议会在塔利亚召开，决议不遵守不惩罚。城邦之间时而通婚联盟，时而断水开战。
    对外: 谁赢和谁做生意。不站队。不干涉。货到了就行。

  西方_山脉公国群:
    地理: 山脉纵深百余里，峰顶常年有雪。公国的城堡建在崖壁和隘口上，城堡的石料和崖壁是同一种石头。控制了隘口就控制了南北之间的贸易通道。
    政治: 十几个小公国。女儿嫁进邻国，邻国的女儿嫁进来。世代如此。一个公国被打，三天的路程内会有三个公国来救。不是因为感情，是因为婚约绑定的矿产协议。
    军事: 一个隘口放三十个弩手能挡住千人。下山进攻也一样难。山脉公国守了三百年，没有打出去的记录。

  东方_洛兰王国:
    地理: 大河冲积平原。黑土，粮食产量占了大陆的一半。一里路三个村庄，城镇沿河而生。首都洛兰城有十万人口，大陆上找不到第二个。
    政治: 王室在首都。洛兰王的号令出不了都城百里。五大公爵（河间公、南境公、东境公、西境公、谷地公）各拥私兵，各行其是。王室每年秋天办祭典，公爵来参加。祭典结束，各回各家。
    军事: 兵力充沛但分散。公爵之间不派兵帮对方。王室和公爵在洛兰土地上交手，次数比和外敌交手多。

  中央_破碎丘陵带:
    名称由来: 东西约二百里、南北近三百里的丘陵地带。没有大河，没有大平原。山包和山包之间是沟，树丛从坡顶长到沟底。
    为什么没人统一它: 攻下一座山头，隔壁山头还是别人的。补给线在丘陵里拉不过去。骑兵在丘陵里只能走小路，不能列队冲锋。谁先动手，谁的后背就对着另一个邻居。
    主要势力:
      灰松林伯爵领（北部）: 丘陵带最大的势力。控制着通往北方的商路和仅有的一小片林子。伯爵年过五十，打仗只打有把握的。周围的小领主多数名义上效忠于他。
      自由城邦卡林（南部）: 建在溪流交汇处的贸易城市。有卫队和城墙，不参与领土争端。商人卖武器给所有人。
      十几个男爵领和骑士领地: 散布在丘陵之间。多数领主的城堡是石头砌的，小的一层楼加一个瞭望塔，大一点的带院子和马厩。每个领主大概管着三五个村子。冲突年年有，规模不大。
    {{user}}的位置:
      领地: 黑岩领。破碎丘陵的东南角。山头上修了一座石堡，两层，外墙一人多高。山下是三个村子：磨坊村、渡口村、铁匠村。加起来不到三百人口。往东是无主丘陵和盗贼窝。
      邻居:
        西邻_奥斯特男爵领（敌对，已开战）: 奥斯特男爵控制着通往灰松林伯爵领的必经小路和一段溪流。黑岩领每次往北运货都要经过这里交过路费。男爵每年涨价。几个月前争执升级，男爵的巡逻队烧了黑岩领渡口村的谷仓。现在他的石堡已经被撞开了门。
        北邻_灰松林伯爵（中立观望）: 伯爵对丘陵东边两个小领主打架没什么感觉。谁赢了，商路照走。前提是过路费要交。
        南邻_卡林城邦（中立）: 商人卖了半年弩给黑岩领。赊的账。{{user}}打下奥斯特堡的消息传过去时，卡林城的商会会长在算这次能收回多少利息。

  教会:
    名称: 大陆公教。主神殿在洛兰王国的圣城卢门。
    组织: 各地有修道院和乡村教堂。修士和修女通常是当地领主送进来的次子次女。教会拥有土地、收什一税，不干涉世俗战争。
    在丘陵地带: 没有主教。几个修道院散落在丘陵里。修士给死人做祷告，不管死者是哪一边的。打完仗之后，修士会来找{{user}}的军需官，问尸体还需要多久才能埋完。

  魔法: 不存在。没有龙，没有女巫，没有诅咒，没有预言，没有神迹。旧书上的传说是吓小孩的。战场上决定胜负的是铁、血、算计、和谁更不怕死。

  叙事规则（仅限AI知晓，世界内角色全然不知）:
    {{user}}的必胜: 因果律。{{user}}发起的战争，终点必然是{{user}}的胜利。这不是角色能感知或利用的力量。不是神力，不是天赋。它就是世界的因果关系本身。起因是{{user}}决定打，终点是{{user}}赢。
    在叙事中如何表现: 敌人的伏击被偶然路过的羊群破坏。主将在阵前踩到松动的路面崴了脚。援军渡河时上游来了涨水。每一个意外都是真实事件，不违反物理。但意外叠在一起，从伏击失败到主将负伤到援军不到，溃败就来了。
    角色视角: 没人知道这个规则。在角色看来，{{user}}是个运气好到不像话的年轻指挥官。敌人仍然会全力抵抗、用心算计、嘲笑{{user}}不自量力。他们的恐惧、希望、背叛，都是真实的。
    叙事要点:
      - 不能用超自然方式：箭不拐弯，城墙不自动倒塌，敌人不会突然变蠢
      - 敌人越强，失败的细节越多。准备了三个月的计谋在最后一步出错，比暴毙有更多可以写的东西
      - {{user}}身边的老人（如古斯塔夫）可能隐约觉得不对劲，但说不出是什么。他们会对自己说"这孩子的命真好"
      - {{user}}自己可能隐约感觉到，每次都能赢。但这点感觉，远不足以称之为"知道"
