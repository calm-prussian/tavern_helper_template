---
军队（初始）:
  初始规模: 不到三百人。骑兵二十余骑，黑岩领能凑出来的所有马和骑手。步兵两百多人，有的打过边境冲突，有的春天刚扔下锄头。
  装备: 不统一。老兵的锁子甲是父辈传的，有人穿着皮背心。武器有长矛、阔剑、猎弓、草叉。钢弩二十把，去年从卡林城邦买的，赊了半年粮税。
  指挥: {{user}}亲自带队。没有幕僚，没有参谋。古斯塔夫管骑兵，黑岩领的老人，从{{user}}父亲那一辈就在打仗，左耳缺了一块。步兵分三队，各由一名军士带着。
  攻城能力: 没有投石机。没有攻城塔。打奥斯特的城门靠的是连夜砍树搭冲车。松木横梁上包了浸水的生牛皮。撞了一天撞开的。
  士气: 不低。不是因为有信心。是因为跟着{{user}}打的几场边境冲突都赢了。新丁说是{{user}}用兵好，老兵觉得是运气。赢了就是赢了。打胜仗的兵走路时背是直的。

  扩张:
    兵源: 攻下的村庄和城镇可以征兵。放下武器的敌军可以收编。卡林城邦有雇佣兵，给钱就打。
    装备升级: 战利品里有锁子甲、长剑、钢弩。卡林城邦可以买到更多。攻下有铁匠铺的城镇后可以自己造。
    攻城器械: 攻下有工坊的城镇后可以造投石机和攻城塔。目前只能搭冲车。
    指挥体系: 兵力增加后，{{user}}需要分出将领管各路。受封的降将、立功的老兵、花钱雇来的佣兵队长，都可以是选项。

当前状态（拿下奥斯特堡后）:
  刚打完第一仗: 奥斯特男爵死在城墙上。石堡已破。残兵溃散。
  损失: 死了三十几个。剩下的人分成两类：有伤的，和有战利品的。
  城中: 在搜。按规矩，男爵已死，城归{{user}}。但规矩具体怎么落实，还没定。老兵在等{{user}}开口。

正在面对的问题:
  投降的人: 男爵的寡妇跪在城门口。是受降还是杀，是收还是放。
  统治: 城怎么管。留多少兵。原来的税官还用不用。邮驿还通不通。
  后患: 奥斯特男爵有没有亲族。会不会有人来报仇。灰松林伯爵在看。
  俘虏: 放下武器的奥斯特士兵。是收编还是遣散还是关起来。
  下一步: 打谁。要不要趁兵锋继续往北。还是先稳住这座城。

征服规则（初始，随扩张逐步制度化）:
  这是{{user}}的第一座城。以前在黑岩领，规矩是父亲定的。现在父亲不在了。规矩要{{user}}来定。赏谁，罚谁，赦谁，占谁的房子。每一件事都在写下自己日后的先例。
  城池增多之后，临时规矩会变成制度。投降条款会写下来。战利品分法会有成文比例。统治会从"{{user}}说了算"变成"按规矩办"。但那是以后的事。现在只有{{user}}一个人在做决定。
