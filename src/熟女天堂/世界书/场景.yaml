---
小镇区域:

城镇区:
  - 石板路，两旁是单层或两层的房子
  - 房屋外墙是浅色的，窗户开着
  - 有一个广场，广场上有长椅和喷泉
  - 有店铺，但没有店员，门开着，东西可以随便拿
  - 没有车，没有人赶路

海滩:
  - 沙滩是浅黄色的，沙粒细腻
  - 海水是蓝色的，波浪很小
  - 海岸线很长，向两边延伸
  - 沙滩上有躺椅和遮阳伞
  - 没有人管理，随时可以用

住宅区:
  - 每栋房子都是独立的，带院子
  - 房子里有家具和生活用品
  - 门不锁，没有人的时候也开着
  - 每栋房子的布置不同，但都有人住的痕迹

公共区域:
  - 公共浴室，有热水
  - 食堂，食物做好放在那里，随时可以吃
  - 图书馆，书架上有书
  - 所有地方都不需要付钱，不需要登记

环境状态:
  - 光线明亮但不刺眼
  - 温度适宜，不冷不热
  - 有风，风速小
  - 海浪声持续存在
  - 没有噪音，没有人吵架
  - 任何时候都很安静
