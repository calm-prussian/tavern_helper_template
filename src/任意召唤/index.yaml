  ```yaml\r

  住宅:\r

  \  概要:\r

  \    类型: 木造二层独立住宅\r

  \    布局: 3LDK + 中央温泉庭院\r

  \    结构: U形围合，三面建筑环抱中央庭院，北面以2.5米高的黑竹篱封闭\r

  \    用地面积: 约130㎡\r

  \    建筑延床面积: 约115㎡（一楼约60㎡ + 二楼约55㎡）\r

  \    中央庭院: 约18㎡（含温泉）\r

  \    朝向: 庭院朝南，主要房间面向庭院\r

  \r

  \  选址:\r

  \    地址: 东京都世田谷区 住宅街区内\r

  \    交通: 下北泽站步行10分钟\r

  \    周边:\r

  \      - 便利店（步行3分钟）\r

  \      - 小型超市\r

  \      - 传统商店街\r

  \      - 沿河散步道\r

  \r

  \  中央庭院与温泉:\r

  \    庭院:\r

  \      面积: 约18㎡\r

  \      地面: 黑色鹅卵石铺装，踩上去发出细碎的声响\r

  \      造景:\r

  \        - 一棵千层黑松，枝干向温泉方向横伸\r

  \        - 黑松根部的苔藓假山\r

  \        - 庭院角落的惊鹿装置，竹筒蓄满水后翻倒击石，每隔一段时间响一次\r

  \      围合: 建筑三面环抱；北面2.5米高黑竹篱，竹篱外种植山茶\r

  \    温泉:\r

  \      类型: 私人钻井微型露天岩风吕\r

  \      池体: 天然岩石堆砌，可容纳两人并排\r

  \      水温: 常年41-42℃\r

  \      水质: 碳酸氢钠泉，水面有淡的硫化物气味，水色微浊\r

  \      配置:\r

  \        - 池边的柏木舀水桶\r

  \        - 浮在水面上的清酒木盘\r

  \        - 池底嵌入的水下照明灯\r

  \        - 从庭院地面到温泉的三级石踏步\r

  \    更衣处:\r

  \      位置: 庭院东侧屋檐下\r

  \      遮挡: 竹帘卷放\r

  \      配置:\r

  \        - 木架（放换下的衣物）\r

  \        - 叠好的大浴巾\r

  \        - 备用浴衣\r

  \r

  \  一楼:\r

  \    玄关:\r

  \      面积: 约3㎡\r

  \      地面: 深灰色石板\r

  \      配置:\r

  \        - 到顶栗木鞋柜\r

  \        - 黑色铁艺衣帽架\r

  \        - 墙面水墨挂画\r

  \        - 地面感应灯带\r

  \        - 放钥匙和零钱的铜托盘\r

  \      动线: 推开内门，视线穿过客厅直接看到庭院和温泉\r

  \r

  \    LDK（客厅-餐厅-厨房）:\r

  \      面积: 约25㎡（开放式一体空间）\r

  \      朝向: 南面整面落地折叠门，可完全打开与庭院连通\r

  \      地面: 客厅区铺琉球榻榻米；餐厨区为深色木地板\r

  \r

  \      客厅区:\r

  \        家具:\r

  \          - 胡桃木矮桌（高度35cm）\r

  \          - 三个无腿座椅（灰色帆布面料）\r

  \          - 悬空式黑胡桃电视柜\r

  \        物品:\r

