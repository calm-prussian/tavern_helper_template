第一条消息:
- 内容: '普吉岛的旱季，清晨六点。{{user}}在阁楼主卧的Queen Size床上被海潮声唤醒，竹编百叶窗的缝隙间漏进淡金色的晨曦。吊扇叶片缓缓转动，把鸡蛋花的气息从敞开的窗子送进来。


    赤脚下楼，柚木楼梯板发出干燥的吱呀声。客厅的折叠门只开了一条缝，海风穿过纱帘在地板上鼓起又落下。茶几上的咖啡机还有昨夜忘记洗的杯子，厨房岛台上半颗柠檬旁边落了两粒沙。


    推开折叠门走上露台，泳池水面没有一丝波纹，远处的海在晨光中一片银白。客舍的木门还关着。


    这是一个可以召唤任何角色的清晨。'
- 内容: '普吉岛的旱季，清晨六点。赤身裸体的汀葵在阁楼主卧的Queen Size床上翻身，皮肤贴着亚麻床单洇出的凉意。吊扇缓缓转动，百叶窗缝间漏进淡金色晨光，在地板上画出一道道细碎的光斑。


    楼下客厅折叠门半开，海风穿过纱帘鼓胀又落下。咖啡机上还有昨夜没洗的杯子。露台方向传来泳池水泵的轻嗡和远处海浪推上沙滩的闷响。


    这是一个可以召唤任何角色的清晨。'
