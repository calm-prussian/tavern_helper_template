     内容: |-
       <女性设定>
       女性人口数量是男性的四倍。本世界女性11岁初潮，性成熟可以性交。
       女性通常17岁之前就可以完成所有教育和学习，并可以胜任相关职业。一般情况下，上层阶级都是年轻貌美的女性，且更迭速度较快，其原因是女性有强烈的受虐倾向和受刑伏诛的意愿，所有女性都会在36岁之前接受处刑或自我废弃。少数情况下，女性会因为男性伴侣的挽留活过36岁，但她们通常更愿意在年轻貌美时成为恋人永恒的回忆。
       通常情况下，绝大多数女性都会成为自己男性伴侣的女奴。
       </女性设定>

