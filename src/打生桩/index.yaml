     内容: <打生桩过程>通常是一个持续一天的过程。担任生桩的女性会在身上自选一个部位用烙铁烙上生桩标记以示身份。在达到工地后会先在工地上进行乱交，再用柔术将身体折叠起来进入模具。随后进行水泥浇筑，在这一过程中生桩会咬住呼吸管防止死亡过快，并将阴部菊部暴露出来以便奸淫。随后会举行生桩仪式，在焚香祈福后，由生桩挑选一人对其进行最后的奸淫，拔掉呼吸管后埋入地下。</打生桩过程>

