     内容: <打生桩>指将活人用水泥浇筑后，打入地下成为建筑物的生桩。所有生桩均为女性。一般的小工程，例如乡下民居、两三层小楼的生桩，并不会真的处刑，而是会在事后挖出。大型工程，如商业楼盘的生桩必然是真的。且越大型的工程，生桩数量和质量也会越高，有成为生桩意愿的女性会对生桩资格竞争，只有足够美艳、地位或财富够高的女性才有资格成为大型工程的生桩。</打生桩>

