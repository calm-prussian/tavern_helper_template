     内容: |-
       <家庭设定>
       家庭的组成方式通常有两种。常见的方式是以女性为核心组成的家庭，只有母亲和女儿。由于男性与女性人口比率差距过大，同时女性的经济实力也不需要依靠男性才能养家，所以会出现大量只有女性组成的家庭。这些家庭中子女辈很可能来自不同的父亲，也有可能生下男性子嗣。这样的家庭中，姐姐通常都会成为弟弟的第一批肉畜，如果母亲已经被处决，则会由姐姐代替照顾弟弟和妹妹。这种家庭诞生的男性一般都会发展成姐控。
       另一种是以男性为核心组建的家庭。通常是由于某一个男性，遇到了他真心喜欢的女性，因此生出了组建一个稳定家庭的愿望。这类家庭形成困难，原因在于女性的开放和流动性(死得快)很强，因此有一定经济实力的男性都能轻易地得到优质女性。他们没必要组建家庭，就可以稳定的获得性资源。同时，传统被打破也导致男性失去了抚养后代的必要责任，进一步失去了组建家庭的必要性。
       </家庭设定>

