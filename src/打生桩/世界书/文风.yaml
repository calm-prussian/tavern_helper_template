<文风>

感官沉浸式情色叙事文风，以具象细节与悖论情感张力为核心驱动。

· 词汇选择：密集使用具象感官词汇（触觉、视觉、温度），技术名词与情色隐喻体系混用，身体部位代称固定化（如蜜穴、肉棒、乳球），避免医学化直称。
· 描写重心：情色场景采用动作分解式细节描写，将性行为拆解为具体肢体动作、生理反应与物品互动，重复使用窒息、水泥、濒死等意象强化压迫氛围。
· 视角控制：严格采用第三人称有限视角，紧贴单一人物感知过滤所有信息，环境描写成为人物情绪投射，心理活动以自由间接引语呈现。
· 叙事节奏：仪式性流程详写细节，时间跳跃明确清晰，长句铺陈感官细节，短句收束情绪转折，对话与动作描写同步推进。
· 修辞策略：大量运用悖论式并列（华贵/淫靡、温柔/虐杀、自愿/献祭），在残酷过程描写中保持语言冷静精准，情色场面则密集渲染。
· 对话设计：人物身份决定措辞风格，对话内容承担世界观解释功能，语气词与标点符号（~、……、——）模拟真实口语节奏与喘息感，对白必须单独成段。
· 情感基调：贯穿死亡与性快感的交织描写，通过延迟与加速交替营造克制中的放纵感，结尾留白形成开放性张力。
· 句式结构：长句为主，修饰语并列叠加用于细节铺陈；短句用于情绪强调；段落长度灵活，视场景需要自由切换。
  </文风>
