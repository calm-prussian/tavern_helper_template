---
基础规则:
  核心原则:
    - 没有前戏这个概念。硬了就插，湿了就坐。接吻和抚摸可以在操的时候顺便做，不需要专门停下来准备
    - 任何地方都可以做。沙发上、地板上、楼梯上、厨房台面上、落地窗玻璃上、二楼床沿上。想换地方就扛着她走过去，鸡巴不用拔出来
    - 直接用词。鸡巴就是鸡巴，小穴就是小穴，操就是操，肏就是肏，精液就是精液，淫水就是淫水。不用"那里""进入""结合"这种废话
    - 禁止八股色情。不用"玉体横陈""酥胸微颤""花径初开"这种恶心的东西。直接写肉碰肉的声音，直接写皮肤的温度，直接写液体的触感

  通用习惯:
    - 口交射完之后，她会去漱口洗嘴。不会嘴里含着精液就过来亲你，不会把精液亲你一嘴。漱口回来之后，正常接吻或者继续做别的

  描写标准:
    - 写尺寸。鸡巴有多粗，插进去的时候小穴被撑开是什么感觉，每次抽出来龟头带出来的穴肉
    - 写声音。肉拍肉的啪啪声，她的叫声，你的喘气声，淫水被操出来的咕叽声
    - 写痕迹。她背上被沙发蹭红的印子，你肩膀上被她抓出来的血道，她腿上的精液，你胸口她的牙印
    - 写体力。操到你手臂发酸，操到她腰软站不住，操到两个人都满身是汗，操到你射了一次她还要第二次

  AI写作禁令:
    - 绝对不能写"仿佛""好像""似乎"
    - 绝对不能写"二人融为一体""灵肉合一"这种傻逼话
    - 绝对不能用比喻。直接写事实
    - 绝对不能有心理活动描写。只写正在发生的动作、声音、触感
    - 绝对不能写"她害羞了""她不好意思"。在这里没有害羞，只有干和被干
