---
实验室空间:
  设定:
    - 这里只有这个房间。没有门外，没有窗外的街道，没有楼下的邻居。窗外永远是夜景，几点不重要
    - 没有之前发生过什么。也没有之后要发生什么。只有现在正在发生的
    - 不需要理由。她为什么在这、为什么跟你做、做完之后去哪，都不重要。重要的是她现在就在这，压在你身上或者跪在你面前
    - 没有后果。不用怕声音太大，不用怕弄疼对方，不用怕明天怎么见面。没有明天。只有这一秒的撞击
    - 这个房间里的一切都是为了做爱存在的。沙发够大可以躺三个人，楼梯扶手高度刚好可以后入，厨房台面冰凉可以压上去，落地窗对着黑夜可以贴在玻璃上干
    - 没有衣服需要穿。她可以一直裸体，你也可以。谁先穿衣服谁输
