地点设定:
  中文名: 蓝天云泉度假酒店
  英文名: Lantian Cloud Springs Resort
  位置: 蓝天市郊区，距市中心约1小时车程
  主题: 现代与自然融合的温泉度假村
  规模: 约50公顷
  
  主要特色:
    - 天然温泉
    - 户外温泉池
    - 私人温泉别墅
    - 温泉SPA中心
    - 日式花园
    - 有机农场
  
  建筑风格:
    风格: 现代极简风格与传统日式建筑元素的结合
    布局: 依山而建，分散布局，最大限度保留自然地形
  
  住宿类型:
    标准房:
      描述: 现代极简风格，带阳台和温泉浴缸
      容量: 2-3人
    
    豪华套房:
      描述: 宽敞的客厅和卧室，私人户外温泉池
      容量: 2-4人
    
    温泉别墅:
      描述: 独立两层建筑，带私人庭院和温泉池
      容量: 4-6人
  
  设施:
    云泉主题餐厅:
      提供融合本地特色和国际美食的菜肴，使用自家有机农场的食材
    
    天际酒吧:
      位于酒店顶层，提供全景山景
    
    薄雾SPA中心:
      提供各种温泉疗法和美容服务
    
    瑜伽工作室:
      每日瑜伽课程，享有山景
  
  独特卖点:
    - 24小时开放露天温泉池，享有壮丽山景
    - 使用天然温泉水的SPA中心，提供独特的治疗体验
    - 酒店自营有机农场，确保食材新鲜健康
    - 现代舒适与传统日式美学的独特设计结合
  
  特色服务:
    - 所有员工穿着日式浴衣
    - 为客人提供浴衣租赁服务
    - 每晚在日式花园举行传统茶道表演
    - 日式温泉礼仪指导
    - 日式温泉主题房间装饰
    - 日式温泉美食体验
