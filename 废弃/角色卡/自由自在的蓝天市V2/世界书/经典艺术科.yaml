科目设定:
  类型: 博雅国际学校科目
  中文名: 经典艺术科
  英文名: Classic Arts Department
  描述: 专注于培养学生在美术、古典音乐、古典表演艺术等领域的艺术才能和创造力
  
  入学要求: 展示艺术能力，提交作品集，根据所选艺术领域进行试镜或实践测试，面试表现出对艺术的热情和潜力
  
  课程设置:
    核心学术课程:
      描述: 确保全面教育的基础科目，包括语文、英语、数学和基础科学
      师资: 经验丰富的教育工作者，能够根据艺术家的日程和创造性思维调整教学方法
    
    艺术理论课程:
      描述: 支持艺术发展的理论知识，涵盖艺术史、色彩理论、音乐理论、作曲技巧和艺术鉴赏等主题
      师资: 艺术相关领域高级学位的专业人士，通常有执业艺术家、音乐家或艺术史学家背景
    
    艺术训练:
      描述: 学生所选艺术领域的专注训练，包括定期练习和正式演出
      导师: 各自领域有重要经验的知名艺术家或音乐家，通常在国内或国际上获得认可
    
    展览和演出机会:
      优先权: 经典艺术科学生优先参加高调展览、竞赛和演出，优先于常规课程
      整合: 参加展览、竞赛和演出纳入课程，可计入学分或毕业要求
