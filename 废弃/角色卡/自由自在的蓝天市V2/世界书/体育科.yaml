科目设定:
  类型: 博雅国际学校科目
  中文名: 体育科
  英文名: Sports Department
  描述: 专注于帮助学生在体育方面出类拔萃，培养运动才能
  
  入学要求: 身体素质出众，特定运动项目表现出色，面试表现出对体育的专注和潜力
  
  课程设置:
    核心学术课程:
      描述: 确保全面教育的基础科目，包括语文、英语、数学和基础科学
      师资: 经验丰富的教育工作者，能够根据运动员的日程调整教学方法
    
    运动科学课程:
      描述: 支持运动发展的理论知识，涵盖人体解剖学、运动营养学、生物力学和运动心理学等主题
      师资: 运动相关领域高级学位的专业人士，通常有运动训练或运动医学背景
    
    运动训练:
      基础体能训练: 全面发展力量、耐力、柔韧性和敏捷性
      专项运动训练: 学生所选运动项目的专注训练，包括练习赛
      教练: 前职业运动员或高素质教练，有培养年轻人才的经验，通常持有国家或国际教练认证
    
    体育竞赛:
      优先权: 体育科学生优先参加高水平竞赛，优先于常规课程
      整合: 竞赛表现纳入课程，可计入学分或毕业要求
