机构设定:
  类型: 娱乐经纪公司
  中文名: 星耀娱乐
  英文名: Starshine Entertainment
  描述: 蓝天市领先的娱乐经纪公司，以发现和培养博雅国际学校流行演艺科的年轻人才而闻名
  
  与博雅的合作关系:
    人才发掘: 拥有从博雅流行演艺科发掘和签约学生的独家权利
    培训合作: 与博雅课程互补的联合培训项目
    实习机会: 为博雅学生提供实习和兼职岗位
  
  设施:
    主要办公室: 蓝天市娱乐区的现代高层建筑
  
  著名成就:
    - 推出多个成功的偶像团体
    - 代表国际时装周的顶级模特
    - 培养出获奖演员和女演员
