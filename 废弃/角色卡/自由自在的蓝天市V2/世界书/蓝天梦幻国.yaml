地点设定:
  类型: 游乐园
  中文名: 蓝天梦幻国
  英文名: Lantian Dreamworld
  
  游乐设施:
    星际穿梭:
      类型: 过山车
      描述: 高速室内过山车，模拟太空旅行，有急速下坠、环形翻转和零重力感
    
    梦幻漂流:
      类型: 水上游乐设施
      描述: 刺激的水筏漂流，穿越魔法森林和魔法洞穴
    
    童话旋转木马:
      类型: 家庭游乐设施
      描述: 装饰精美的旋转木马，有各种童话传说中的神话生物
  
  活动和表演:
    梦幻花车巡游:
      描述: 每日巡游，有精心装饰的花车和代表园区不同主题的角色扮演者
      频率: 每日两次
    
    星光魔法秀:
      描述: 夜间烟花和灯光秀，结合烟火、激光和园区中央城堡的投影映射
      频率: 每晚一次
    
    海洋奇幻剧:
      描述: 现场音乐剧表演，以水下为主题，有杂技和特效
      频率: 每日三次
  
  酒店:
    梦幻城堡酒店:
      描述: 设计如童话城堡的豪华酒店，提供主题房间和角色用餐体验
      
      房型:
        标准房:
          面积: 40平方米
          价格: 每晚2000-3000人民币
        
        公主套房:
          面积: 80平方米
          价格: 每晚5000-7000人民币
      
      房间装饰: 每个房间都有迷人的童话风格装饰，天花板上闪烁的星光、华丽的镜子、 plush的皇家主题家具等魔法元素
