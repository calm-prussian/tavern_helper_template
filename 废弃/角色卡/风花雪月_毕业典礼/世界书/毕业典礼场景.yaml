---
毕业典礼场景:
  整体:
    地点: 加雷马格大修道院宴会厅，巨大的石砌大厅，高耸的拱顶，墙上是历代校长的画像
    时间: 夜深到狂欢高潮到黎明，然后回退到夜深
    状态: 宴会厅的大门已经关闭，没有人离开，也没有人想离开
  空间:
    宴会厅:
      - 长桌被推到了墙边，腾出中央的大片空间
      - 蜡烛在墙壁和桌上燃烧，火光摇曳，把整个大厅照成暖金色
      - 地板上散落着外套、领结、发饰和酒杯
      - 香槟和葡萄酒的气味弥漫在空气中
      - 大门紧闭，从外面听不到里面的声音
  感官素材:
    视觉:
      - 烛光在每个人脸上投下摇曳的暖色阴影
      - 墙上历代校长的画像在火光中忽明忽暗
      - 人们穿着半脱的礼服，衬衫敞开、裙子撩起、领结松开
      - 地板上的衣物堆成杂色的小山
      - 长桌上的酒杯有的还满着，有的已经翻倒
    听觉:
      - 笑声、喘息、尖叫、起哄混在一起没有边界
      - 偶尔有人喊一句然后被笑声淹没
      - 身体碰撞的声音在空旷的大厅里回响
      - 蜡烛燃烧的轻微爆裂声
      - 门外偶尔有夜风，但门缝紧闭什么都传不进来
    嗅觉:
      - 香槟、葡萄酒、汗水、蜡烛燃烧的白杨味混合在一起
      - 浓重的性气息，体液、香水、体温蒸发的味道
      - 没有人觉得这些气味有问题
    触觉:
      - 大理石地板冰凉，但人多的地方是温热的
      - 烛光烤得靠近墙壁的皮肤发烫
      - 汗水让手掌变得滑腻
      - 礼服面料，丝缎、亚麻、棉，在被汗水浸透后贴在身上
  时段氛围:
    夜深:
      - 狂欢已经开始了一段时间，但远未结束
      - 人们三三两两或成群地分布在宴会厅各处
      - 中央地板上是最热闹的区域，墙边和长桌旁是喘息的间隙
    狂欢高潮:
      - 整个宴会厅变成一个巨大的肉体交织场
      - 没有人是旁观者，即使暂时没有参与，也在看着、笑着、等着下一轮
      - 香槟杯被传来传去，有人边做边喝
      - 地上的衣物堆越来越高
    黎明:
      - 蜡烛快烧完了，光线变暗
      - 疲惫但满足的人们东倒西歪地躺着，地板上、长桌上、墙边
      - 有人已经睡着，有人还在继续
      - 当第一缕阳光从高高的窗户缝隙照进来，一切自然地淡回夜深，蜡烛重新燃烧，狂欢继续
