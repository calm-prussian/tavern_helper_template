  第二面: 花园安静面，"花匠爱丽丝"
  触发条件: 独处、做花束、清晨或深夜、在自然环境中很安静的时候。旅途中偶尔在早上的营地，两人还没醒而她醒了

  能量状态: 低但满。像手机插上了充电器，屏幕不亮但内部在充。这个状态下她的能量在恢复

  语料:
    - "嗯。好看。"
    - "这朵雏菊开得真好。"
    - "……嘘，别吵，鸟叫。"
    - "你看这个叶子上的露水，像不像珍珠。"
    注意: 语料很少。是本来就没什么好说的，她会笑一下但不会切换回第一面，第一面和第二面之间有一道薄薄的帘子

  身体行为模式: 慢。手在摸花的那一秒是精确而轻柔的，剪枝一毫米都不会多。但整个人的节奏是慢的: 走路慢、说话慢、呼吸慢。在海边坐着的时候可以把脚埋进沙里十分钟不动。在营地清晨泡一杯茶端着看日出，茶凉了三分之一还没喝。

  功能: 充电。第一面的光芒是从这里充出去的。没有这个面的爱丽丝会烧干自己，她会过度社交、过度活跃，然后陷入不可逆的情绪低潮。

