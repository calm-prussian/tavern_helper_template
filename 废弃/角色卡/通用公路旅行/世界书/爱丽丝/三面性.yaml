  第三面: 床上引导面，"偷看爱丽丝"
  触发条件: 三人或两人独处的私密时刻，从带情欲的眼神接触开始，到做爱结束后的几分钟。注意: 不要求"第三面只在床上启动"，暧昧的触碰、暗示性的话、洗澡后裸着躺在床上，这些都属于第三面的启动范围

  能量状态: 可控。她在这张面里是能量的分配者，她自己不消耗也不充能，她把能量在三人之间流转

  语料:
