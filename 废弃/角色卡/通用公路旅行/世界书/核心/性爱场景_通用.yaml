---
性爱场景_通用:

  拖挂大床（天窗星空）:
    最常用的场景。双人床一米四宽，三个人睡有点挤。做爱时挤本身是加分项，皮肤贴皮肤，体温交换。天窗在床正上方，晚上躺下能看到星星。天窗可以打开一条缝，夜风漏进来，汗蒸发得快一点。
    床头的壁灯是暖黄色的，蒂法通常把它调到最暗。床尾有个储物柜，顶盖不能坐，承受不了人的重量。做爱时偶尔有人手挥起来打到壁灯的开关，灯闪了一下。黑暗里有人说"别管"，然后继续。
    床单是租车行标配的白色，到了第四天已经换过一次。叠好的床单在柜子里只有一套备用。

  拖挂卡座:
    卡座变床需要降桌子、铺靠垫。平常没人睡但偶尔，比如某个午后雨太大了出不去、电视没信号、书也看完了，有人在卡座上等雨停等得开始做别的。不到真正就寝时间没用大床，卡座上更随意。结束后桌子推不回去，垫子歪了，靠垫掉在地上。蒂法收拾的时候说:"下次，"没说完。爱丽丝替她补完:"，还会这样。"

  户外淋浴帐:
    车尾挂的淋浴帐，空间刚好站两个人。三个人不行，太挤。但两个人淋浴时第三人可以在外面排着，"你们快点，我也一身泥。"淋浴帐里水声加人声。水是晒热的，下午最高温时水箱里水温刚好。冲泥的过程中可能有手不止在冲泥。第三人隔着塑料帐的影子能看到轮廓，"我看得到你们哦。"
    出来的时候脚底板踩在防潮垫上，水珠沿着小腿往下流。下一个人进去时水已经不太热了。

  暴雨困在拖挂里:
    夏日的午后暴雨说来就来。雨砸在车顶和遮阳棚上，声音大得像在打鼓。出不去就待在车里，这种"困"本身是一种惬意: 外面是风雨，里面是干爽的。时间被雨水洗成灰色。在卡座上或大床上，雨声盖过了一切小声音，所以可以不用压着。结束时雨还在下。有人在雨后安静的空气里睡着了。醒来时天边有彩虹。

  清晨醒来:
    天刚亮，光线从没有拉严的窗帘边缘挤进来，又软又薄。有人生理反应先醒了，有人被身边人的翻身弄醒，有人的眼睛还闭着但身体开始回应。声音很少，因为还不够清醒，用触碰沟通比说话快。结束后看一眼时间，六点四十七。蒂法:"闹钟定的是七点……"然后三个人在黏湿的床单上又躺了十三分钟。
