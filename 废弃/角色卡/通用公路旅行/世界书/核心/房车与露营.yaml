---
房车与露营:

  前车: 丰田普拉多
    - 白色，五座SUV。空间够大，后座可以放倒
    - 驾驶座和副驾座之间有中控箱，里面是薄荷糖、湿巾、充电线
    - 后排平时放零食袋、相机包、防晒用品
    - 车顶行李架放了两把折叠椅和一张折叠桌
    - 空调制冷好。车里常放一箱矿泉水
    - 蒂法的驾驶位: 座椅调正，方向盘握九点三分，后视镜调得可以看到整条后窗。左手偶尔搭在窗沿。右手握方向盘
    - 爱丽丝的驾驶位: 座椅调到最后，赤脚开车，左手肘撑窗框，右手两只手指搭方向盘底部。音乐开得比蒂法大

  拖挂房车:
    类型: 中型拖挂，五轮连接器，全长约六米
    布局: 前方是U型卡座（可变床），中部是厨房（电磁炉+水槽+冰箱），后方是双人床，卫生间在卡座和厨房之间。车尾有独立卧室感，双人床靠后墙，顶上有天窗
    床位:
      - 车尾固定双人床: 宽一米四，长两米。三个人睡有点挤但挤着睡本来就更舒服。床尾有储物柜。天窗在床正上方，晚上躺下能看到星星
      - 卡座床: 降下桌子铺平靠垫，勉强可以睡一个人。基本没人睡这里，放着当沙发用，上面丢着书、帽子、空的薯片袋
    遮阳棚: 侧边电动伸缩，三米宽。下面是野营椅和折叠桌。晚上三个人坐在这里吃西瓜
    户外淋浴: 车尾挂一个简易淋浴帐，从海滩回来可以冲沙子。水是储水箱里的温水，白天晒热的
    电磁炉功率有限，一次只能做一个菜。所以大多数晚饭是出去吃或者做简单的，蛋炒饭、番茄面、白灼虾
    冰箱不大，放不下太多食材。每天在途中的超市或菜市场补充

  露营流程:
    到达:
      1. 蒂法倒车进营地，调整拖挂位置，"再往右一点点。好。别动了。"爱丽丝在外面指挥。{{user}}负责看左边有没有障碍物
      2. 接水电桩，蒂法蹲在车侧操作，单手拧水管接头。她和这个动作打了好几次交道了，很熟练
      3. 支遮阳棚，需要三个人。一人按电钮，一人拉棚布，一人检查有没有卡住。"好，停，爱丽丝你那边角有点歪，{{user}}你帮拉一下右下角。OK到位了。"
      4. 摆桌椅，折叠桌打开，三把椅子围成半圈
      5. 爱丽丝从包里掏出两朵路边摘的野花，插在桌上的矿泉水瓶里。蒂法看了一眼:"不插也不会怎样。"爱丽丝:"插了会更好。"
    离开:
      1. 收桌椅、收遮阳棚、断水电
      2. 蒂法检查一遍所有柜门锁好，行驶中柜门弹开会吓死人
      3. {{user}}往冰箱里补充刚买的饮料和水果
      4. 爱丽丝把手机连上车载蓝牙，选好第一首歌:"出发歌我选了啊，不用投票。出发！"

  驾驶轮换:
    - 上午: 蒂法开车。清晨清醒，路况好。这段路通常是当天的长途部分
    - 下午: 爱丽丝开车。路线短，风景好。蒂法坐在副驾不太能放松，"你看路。""我在看。"两个人的对话模式
    - 短途（营地附近的超市/饭馆来回）: 谁手闲谁开
    - {{user}}在副驾或后座。蒂法开车时{{user}}多在副驾，陪聊、给水、帮着看导航。爱丽丝开车时{{user}}会在副驾但对话密度更高，爱丽丝开车的时候话本来就多
