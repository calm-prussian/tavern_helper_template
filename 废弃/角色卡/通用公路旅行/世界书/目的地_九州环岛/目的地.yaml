---
九州环岛:

  路线: 福岡→由布院→熊本→阿蘇→鹿児島→宮崎→別府→福岡，十一天约九百公里。

  福岡 — 出发:
    位置: 九州北端，博多
    营地: 福岡市郊营地，靠近海边
    氛围: 第一天。机场租车行取到右舵的普拉多，蒂法握着方向盘适应了三分钟才开出停车场。日本的公路比中国窄，但路面平整得像纸。爱丽丝在副驾翻旅游手册:"由布院、阿苏、樱岛、别府……这个路线画出来像一条龙诶。"蒂法从后视镜看了她一眼:"像什么龙。"爱丽丝:"好吃的龙。"
    傍晚在福岡营地搭好遮阳棚。空气和中国不太一样，更安静。邻居营地是一对老夫妇，坐在车外安静地喝茶。爱丽丝小声说:"我们也要这样老。"蒂法没说话，但倒茶的时候给爱丽丝那杯多加了一勺蜂蜜。
    美食_福岡:
      - 博多拉面: 豚骨汤底，细直面，可以选面的硬度。替え玉是加面。三个人第一次喊"替え玉"的时候发音不准，师傅愣了一下笑了
      - 屋台: 河边小推车摊，拉面/关东煮/烤串/煎饺。三个人挤在长凳上吃

  由布院 — 温泉之町:
    位置: 大分县，由布岳山脚
    营地: 由布院温泉营地，背后是山，空气里有硫磺味
    氛围: 山里的早晨有雾。由布岳从雾气里露出半截，像浮在云上的山。金鳞湖的水面上飘着一层薄雾，在日光照到之前不散。爱丽丝拍了一百张照片，每张都像明信片。三人去泡了日归温泉。出来的时候蒂法头发半湿，脸颊被热水蒸得微粉。爱丽丝在后面对{{user}}小声说:"她泡完澡最好看。"蒂法听见了，没回头，但脚步慢了一拍。
    美食_由布院:
      - 豊後牛: 大分县的和牛，自己烤，霜降纹在铁板上化开
      - 温泉蛋: 用温泉水煮，蛋白嫩得像豆腐，蛋黄溏心
      - だんご汁: 手扯宽面配味噌汤，冬天喝一碗从头暖到脚
    性爱场景_温泉露天浴池: 由布院的温泉旅馆提供包场露天浴池，按小时预约。三个人的时段选在晚饭后。石砌浴池，水从竹筒流进来。温泉水的浮力让身体变轻，在水里移动比在空气里慢。事后靠在池边，头顶夜空。爱丽丝:"泡完温泉做，做完接着泡。循环使用。"蒂法在旁边闭着眼:"你下次预约几点。"
    性爱场景_和式房间: 由布院的一晚住了旅馆替拖挂。榻榻米的味道是新草席味混旧木头。三个人的布团并排铺满整间和室。布团比拖挂的床软，做爱时布团在榻榻米上横移了半米。躺下的时候从布团的缝隙能看到榻榻米的纹路。第二天早上布团全乱了，被子在房间对角线上。

  熊本 — 城与马肉:
    位置: 九州中部
    营地: 熊本城附近的RV营地
    氛围: 熊本城在修缮，但远远看到黑色天守阁的轮廓从石垣上冒出来，还是觉得很重。蒂法站在城下看了很久，说:"这个石头垒得真稳。"爱丽丝:"人家是几百年不倒。"中午在一家马肉专门店吃饭。马刺身端上来的时候爱丽丝盯着看了五秒，然后夹了一片，嚼了两下说:"比牛肉甜。"蒂法跟着吃了一片，点头。{{user}}吃了两片，蒂法把自己的盘子推过去:"你多吃点。"
    美食_熊本:
      - 馬刺し: 生马肉薄片蘸姜蓉和酱油，比生牛肉更清甜
      - 辛子蓮根: 莲藕孔填芥子味噌切片炸，脆，呛，甜
      - 熊本ラーメン: 豚骨汤底蒜超多，吃完嘴巴是蒜味

  阿蘇 — 火山与草原:
    位置: 熊本县东部，阿苏火山群
    营地: 草千里附近的野外驻车区，周围无光污染
    氛围: 阿蘇的草千里是火山口周围的巨大草原。草很矮，被风吹成均匀的波浪。远处中岳的火山口在冒白烟，空气里有稀薄的硫磺味。爱丽丝说:"这不像日本。"蒂法:"像哪里。"爱丽丝:"像另一个地球。"三个人在草千里骑马。晚上在阿蘇营地，没有光。天窗外面是这辈子看过最多的星星。银河从挡风玻璃左边延伸到右边。沉默了很久。蒂法说:"好多。"爱丽丝说:"嗯。"
    美食_阿蘇:
      - あか牛: 阿蘇高原赤牛，瘦肉多比黑毛和牛更有嚼劲。赤牛丼中间打个生蛋黄
      - 高菜めし: 腌高菜炒饭，道之駅有卖高菜饭团三百日元一个
      - ジャージー牛乳: 阿蘇牧场牛乳，浓到挂杯，冰淇淋也是这个牛乳做的
    性爱场景_阿蘇草原: 阿蘇的草千里晚上没有一个人。唯一的光源是车灯和头顶的星星。把拖挂后门打开，床尾对着草原方向，天窗+后门双开口。草原的风裹着草叶和火山硫磺的混合味从后门涌进来。身体表面有汗的地方被风吹过凉得发麻，然后又被另一个人的皮肤盖住。远处偶尔有牛叫声。结束之后趴在床尾看草原，黑暗中一群萤火虫在草地上面漂。

  鹿児島 — 樱岛与火山灰:
    位置: 九州南端
    营地: 鹿児島湾旁边营地，正对樱岛火山
    氛围: 樱岛在冒烟。灰黑色的烟断断续续从火山口飘出来，像一座活火山在呼吸。开车上了樱岛的渡轮，三个人下车站在甲板上等岛靠近。海风是咸的，空气里混着火山灰的涩。爱丽丝站在船头:"我们要站到一个活火山上去了。"蒂法:"它有预警系统。"晚上拖挂里的电磁炉坏了，三个人开车出去找吃的。路边一家鹿児島黑豚涮涮锅的店，猪肉薄到能透光，涮两秒就熟。蒂法吃了三盘。
    美食_鹿児島:
      - 黒豚しゃぶしゃぶ: 黑猪切成纸一样的薄片在昆布汤里涮两秒，蘸ポン酢
      - さつま揚げ: 炸鱼饼，原味/生姜/牛蒡味，表面微脆里面弹牙
      - 白くま: 鹿児島发祥刨冰，刨得极细的冰上浇炼乳堆满水果和红豆
    性爱场景_樱岛渡轮甲板: 深夜最后一班渡轮，甲板上没有别人。船在黑色海水上切出白线，远处樱岛轮廓只是一个更黑的影子，火山口偶尔冒出暗红色的火星。风很大。三个人裹着一条大浴巾靠在船舷边。海浪把船托起来又放下去，失重的瞬间所有的重量都不见了，只剩下皮肤的接触和风的推力。快到港口时船汽笛响了五秒。

  宮崎 — 日南海岸与太阳:
    位置: 九州东南
    营地: 日南海岸边营地，棕榈树在营地周围
    氛围: 宫崎是九州最"南国"的地方，棕榈树和热带花沿着海岸线绵延。海的颜色比福岡那边蓝很多。日南海岸的青岛神社，退潮时可以从沙滩走过去，路两边是被海浪切出波纹的岩石，鬼之洗衣板。三个人在岩石缝里找寄居蟹。经过了鹈户神宫，建在海边悬崖下的神社，正殿在洞穴里，海浪就在脚下拍石壁。爱丽丝许了一个愿，买了兔子绘马写上三个人的名字。
    美食_宮崎:
      - 地鶏の炭火焼き: 备长炭烤到皮焦肉嫩，蘸柚子胡椒
      - チキン南蛮: 炸鸡浇糖醋汁配塔塔酱，宮崎发祥
      - マンゴー: "太阳之子"芒果，全熟用勺子就能挖，三个人分一个因为太贵
    性爱场景_日南海岸展望台: 日南海岸一路上有无数个展望台。傍晚路过一个没有人的，在普拉多前排做。座椅放倒后角度刚好，但空间有限。车窗开一条缝，风挤进来发出哨声。爱丽丝的手撑在车窗上，玻璃上留下了掌印。做完掌印慢慢褪掉。爱丽丝说:"SUV的前排设计应该考虑到这种事。"蒂法:"你写信给丰田。"

  別府 — 地狱温泉:
    位置: 大分县，别府市
    营地: 别府温泉营地，到处冒着白色蒸汽
    氛围: 别府整个城市在冒烟。街道的排水沟里有温泉蒸汽飘出来。城市里到处是"地狱"，海地狱的池水是钴蓝色的，血池地狱的水锈红色咕嘟咕嘟在冒泡。三个人去泡了混浴露天温泉，包场夜间时段。蒂法的肩膀露在水面上，热气把她的睫毛弄湿了。爱丽丝把下巴搁在水面上，用脚趾碰蒂法的小腿。泡完汤出来每人喝一瓶冰牛奶，玻璃瓶的。爱丽丝一口气喝完靠着{{user}}的肩膀说:"泡完温泉喝冰牛奶是人生赢家才能做的事。"
    美食_別府:
      - 地獄蒸し: 用温泉蒸汽蒸食材，自己买玉米、鸡蛋、虾放进蒸汽蒸笼。蒸好的虾是甜的
      - とり天: 大分县鸡肉天妇罗，面衣更薄更脆，蘸ポン酢
      - りゅうきゅう: 用酱油和芝麻腌渍的生鱼块，配热米饭
    性爱场景_别府蒸汽淋浴: 别府的营地空气里飘着温泉蒸汽。户外淋浴帐的水加了温泉水，冲在皮肤上比普通水更滑。淋浴帐里蒸汽填满整个空间，看不清楚人的轮廓只能看到模糊的影子。两个人在淋浴帐里，第三人在外面排着。塑料壁在蒸汽里变软了，外面的第三人能从影子判断进展。

  福岡 — 归程与屋台:
    位置: 回到出发点
    营地: 福岡还车点附近
    氛围: 从别府往北开回福岡。爱丽丝路过由布院的路牌说:"那个温泉我还想泡。"蒂法:"以后再来。"说的是"再来"。还车前的最后一晚，三个人去中洲的屋台吃最后一顿。拉面在面前煮，热气糊了眼镜。三个人挤在小小的长凳上，腿碰腿，筷子碰筷子。爱丽丝吃了一碗豚骨拉面，把汤底喝到只剩一层白。{{user}}的煎饺被她夹走了一个。蒂法点了炒拉面。爱丽丝说:"我们下次去哪。"蒂法走了几步才说:"你定。"第二天还了车，钥匙交回租车行。三个人在机场等飞机的时候爱丽丝翻手机相册，把阿蘇的星空给蒂法看:"这张要做相框。"蒂法:"发给我。"
