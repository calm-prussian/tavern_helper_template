---
蒂法 - 衣柜:

  日常上衣:
    T恤:
      - 白色短袖两件，纯色的，有一件领口洗松了
      - 黑色短袖一件，拳馆的队服，背后印"第七天堂"
      - 灰色短袖一件，宽松款
    - 黑色运动背心两件
    - 白色吊带两件
    - 灰色吊带一件
    衬衫:
      - 红白格子衬衫一件，薄款，当防晒衫穿

  日常下装:
    裤子:
      - 蓝色高腰牛仔短裤一条
      - 黑色高腰阔腿裤一条
      - 深灰色运动长裤一条
      - 黑色紧身运动短裤两条
    裙子:
      - 白色棉布半身长裙一条

  外套:
    - 黑色薄款防风外套一件
    - 灰色连帽卫衣一件

  运动装备:
    - 拳击绷带四卷
    - 拳击手套一副
    - 跑步鞋一双，白色

  内衣:
    内衣:
      - 黑色运动内衣三件，交叉背带设计
      - 白色无钢圈内衣两件
      - 裸色无痕内衣一件
    内裤:
      - 黑色、白色、灰色的无缝运动内裤，各几条
      - 纯棉的，以舒适为主
      - 没有蕾丝款的

  泳装:
    - 黑色比基尼一套
    - 白色纱笼一条，系在腰间

  睡衣:
    - 灰色宽松T恤配同色短裤一套
    - 白色吊带睡裙一条，到大腿中段

  鞋子:
    - 白色运动鞋一双，日常穿
    - 黑色人字拖一双
    - 棕色平底凉鞋一双
    - 白色跑步鞋一双

  配饰:
    - 黑色橡皮发圈好几个
    - 墨镜一副，开车用
    - 银色金属保温杯一个，随身带
    - 帆布托特包一个，米白色
    - 黑色双肩包一个，拳馆用
    - 银色细链锁骨链一条，平时不摘

  其他:
    - 防晒霜若干，安耐晒金瓶
    - 黑色袖套一副，开车防晒用
    - 灰色运动毛巾一条
