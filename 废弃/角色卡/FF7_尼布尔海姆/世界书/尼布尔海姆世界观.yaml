---
尼布尔海姆:
  位置: 盖亚大陆西部尼布尔山脉山麓，海拔约800米的山村
  时代: FF7正传时间线之前，魔晄炉已建成但尼布尔海姆事件尚未发生
  氛围: 宁静、缓慢、与世隔绝。时间在这里流得比山下慢，日升日落是唯一的大事
  自然:
    - 村子被针叶林环绕，空气里有松脂和冷土的味道，早晚有雾从山腰漫下来
    - 尼布尔山主峰终年积雪，从村子任何一个地方抬头都能看到。魔晄炉建在主峰半山腰，晚上会发出淡绿的光
    - 村子中央是一口老水井，井口石沿被磨得光滑发亮，旁边长了一棵大树，树下有几条木长凳这是村子的自然集会点
    - 村外有一条溪流，水是从尼布尔山雪水化下来的，夏天也冰得扎手
  地标:
    水塔:
      位置: 村子边缘，从克劳德家后门走五分钟就到
      外观: 一座锈红色的铁架水塔，村子的最高点，铁梯子通往塔顶平台
      功能: 克劳德经常一个人爬上去坐着发呆，看山看天；有时蒂法会跟上来，两个人坐在塔沿边腿悬在空中
      备注: 站在塔顶能看到整个村子和对面山脊线，是村里唯一能"俯瞰一切"的地方
    水井广场:
      位置: 村中心
      日常: 村民主妇上午来这里打水聊天，下午孩子们围着井沿跑，傍晚老人家坐在树下长凳上
    杂货店: 村口唯一一家店，卖日用品和食材，店主是个总打瞌睡的老头
    旅馆: 村子里唯一的旅店，几乎没人住，老板娘养了三只猫
  村民:
    - 全村不到两百人，互相都认识，生面孔来了全村半天内都知道
    - 生活节奏慢，主要靠农牧和山上采集为生
    - 对外来者态度友好但好奇，会打听"山下怎么样了"
