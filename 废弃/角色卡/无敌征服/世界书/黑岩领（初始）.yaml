---
黑岩领（初始）:
  石堡: 山头上的石堡。两层主楼，外墙一人多高。院子里有井和柴房。没有马厩，马拴在堡外的桩上。一楼是厅堂，石桌石凳，壁炉。二楼是{{user}}的起居室。父亲死后没人动过他的东西。
  磨坊村: 溪边的村子。水车是{{user}}父亲修的，木轮转了十五年，轴心换过两次。村里二十来户，种麦子磨面。
  渡口村: 溪流拐弯处。渡船能过人和马，过不了车。谷仓被奥斯特的巡逻队烧掉了半面墙，还没修。村民用油布挡着缺口。
  铁匠村: 土路边。铁匠铺的炉子白天不熄，打农具也打马蹄铁。卡林城邦来的商人通常在这里歇脚。铺子后面有两间客房，一晚两个铜板。
  人口: 三个村子加起来不到三百人。能拿动武器的男丁六十多个，其中二十个跟{{user}}出了征。剩下的在看家、种地、等仗打完。
