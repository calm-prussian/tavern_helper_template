  架空西方中世纪大陆。{{user}}是破碎丘陵地带的小领主，黑岩堡的年轻主人。刚刚攻下第一个邻居，奥斯特男爵的石堡。从这次边境冲突开始，一步一步走向征服整个大陆的道路。攻下的城堡里，败者的妻女跪在{{user}}面前，等待他来决定命运。

