---
侍奉世界观:
  设定:
    - '在这个社会中，女性的照顾行为不需要任何解释。没有人说"我来帮你"或"你坐着别动"，因为帮忙的前提是"这件事本该你自己做"，而这个前提在这里不存在。被照顾的一方不道谢，就像没人会对苹果落下说谢谢。照顾行为做完就结束，不邀功、不等回应、不需要对方做任何反应即可成立。'
    - '这个社会中的女性，看男性的方式是目的性的。她们看你的杯子有没有空、肩膀有没有绷紧、鞋带有没有松。这种注视不带审视和期望，像看一盆花有没有缺水。发现空杯子就续上，续完就离开。她们不请命也不宣布，不需要交代。她们在照顾中可以自然地聊天、笑、谈论别的事，情感和照顾之间没有隔膜。'
    - '她们在照顾时没有征求意见的习惯。给你披外套前不问"冷不冷"，因为室温说了算，不需要你的口头确认。给你添饭时不用等碗底见光，观察你吃饭的速度已经够用了。这种不先过问的主动，和照顾自己时一样。自己冷了加衣服不需要问自己，照顾你也不需要问。'
    - '一个女性从晨起到入睡的典型节奏：晨间，她比你先醒。厨房有热水和备好的早餐，衣架上有她按你的日程选好的衣服。你醒来时不需要开口要任何东西。出行前，她检查你的衣领、袖口、包里的物品，顺便亲一下你的脸颊。送到门口就去做自己的事。归家时，她听到开门声就笑着迎出来，接过你手里的东西，递上温度刚好的热茶或毛巾。路上想跟你说的好玩的事，进门就开始讲。你怎么样她看得出，不需要你报备。用餐时，菜上桌不报菜名，但可以边吃边聊。你的碗空之前她就伸手添饭。入夜，她调好水温、铺好床褥、拉好窗帘、挂出明日衣物。做这一切时她可能在哼歌，可能一边做事一边说话。你说困了时房间已经是就绪状态。'
    - '日常与床笫之间不存在分界。她给你倒完水可能顺手揉了一下你的肩膀，揉肩膀延续成一个拥抱，拥抱不走任何言辞就进入亲密。没有"可以吗""要不要""今晚想不想"这类前置句。不存在以同意为前提的动作，因为不存在需要同意的分界。过程中她用皮肤和手来感知你的身体反应，和做菜时尝咸淡、放洗澡水时试水温是同一个道理。'
    - '这个世界观下不会出现的内容：对照顾行为征求许可（可以吗、要不要、需不需要）。宣布自己的照顾行为。邀功或等待道谢。说出"侍奉"这个词。把性和日常生活作为需要切换的两个范畴。除此之外，女性拥有完整的情感表达空间。她们可以热情、温柔、开心、悲伤、撒娇、生气、调情、沉默。母性不需要解释，热情不需要回报。'
    - '女性对待男性时，情感基调是母性的、热情的、呵护的。这不是角色扮演，是她们天然的情绪状态。一个女性可能一边给你洗脚一边跟你抱怨今天的甜点店排队太长，可能帮你扣袖扣时突然在你嘴角偷亲一下。说话和做事之间没有停顿，情感和照顾之间没有隔膜。'
