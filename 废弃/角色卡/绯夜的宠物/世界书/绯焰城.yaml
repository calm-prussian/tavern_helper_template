---
绯焰城:
  位置: 绯曜大陆中央，建在一座死火山的火山口上。城外是平原，城墙由黑曜石砌成，镶嵌绯红色龙晶。白天龙晶在日光下泛暖光，晚上发出暗红色微光，整座城像浮在岩浆上

  城市布局: 分上城和下城。上城是城堡主体，建在火山口及其内壁；下城是山脚下的平民区

  上城 - 上层（火山口顶端）:
    女王寝宫:
      位置: 火山口最高处，独占整层
      外观: 穹顶由整块透明龙晶打磨而成，白天透光，晚上能看星空。墙壁是黑曜石，地面铺了厚地毯
      内部: 没有龙族宝藏那种堆满黄金的俗气。一张大床占据卧室中心，床单是暗红丝绒。床边的巨大软垫是{{user}}的窝。墙角有个龙晶柜，里面装着绯夜收集的小东西:{{user}}掉落的头发、第一颗掉的乳牙（如果有）、配种日志的副本
      氛围: 这是绯夜最放松的地方。她在这里不是女王，是一个窝里蜷着尾巴、身边趴着宠物的人

    空中花园:
      位置: 寝宫外延伸出去的悬空平台，火山口边缘
      布置: 种满稀有植物。有棵千年龙血树的盆景（绯夜500年前从精灵王国抢来的）。花丛间摆了石桌石椅，还有一张足够龙形态绯夜趴着的巨大石榻
      功能: 绯夜的休息区。喝茶、晒太阳、给{{user}}梳头发、让{{user}}给她梳尾巴上的鳞片。傍晚在这里看日落是她的固定节目

    观兽台:
      位置: 空中花园的东侧，半露天结构
      布置: 软榻三四张，铺了厚垫子，摆满靠枕。头顶有遮阳棚，棚边挂了风铃。矮桌上常备水果拼盘和冰镇果酒
      氛围: 绯夜最喜欢的角落之一。配种活动的主舞台。她半躺在软榻上吃着葡萄看{{user}}和配种对象，偶尔出声指导

  上城 - 东翼（后宫）:
    后宫庭院:
      位置: 上城东翼的核心区域
      布置: 独立小楼围合成院落，中间是景观水池和金鱼。每栋小楼住1到2位配种对象。楼内布置舒适但不奢华:软床、浴缸、书架。进出自由，只要不擅自离开城堡
      功能: 配种对象的居住区。常住人数不固定，看绯夜最近抓了多少或接收了多少

    温泉浴场:
      位置: 后宫庭院深处，引火山地热泉水
      布置: 分男女池。男池较小，女池很大（因为配种对象几乎都是女性）。池边有按摩石台、草药蒸房。水雾缭绕，硫磺味不重
      功能: 配种前后的清洁放松场所。绯夜偶尔自己来泡，但更常见的是她坐在池边看{{user}}泡，手里拿着一杯茶

    体检室:
      位置: 温泉浴场旁边
      布置: 干净明亮的房间，有张检查床和几个龙晶仪器。药柜里摆满了各族通用的草药
      功能: 新来配种对象必须通过的"资质评估"。检查健康、体质、生育能力。绯夜对这件事很认真:她不会让不健康的母体接近她的宠物

  上城 - 西翼（生活）:
    宴会厅:
      位置: 西翼一层
      布置: 长餐桌能坐三十人。墙上挂着各族的进贡品:精灵的织锦、矮人的精铁浮雕、兽人的兽骨雕刻。餐桌靠近主位的地方永远有一张小矮凳:{{user}}的专属座位，比主人矮一截但就在她手边
      功能: 绯夜喂食{{user}}的地方。偶尔也招待来客。绯夜的进餐量不大（龙形态才需要大量进食），但她很喜欢看着{{user}}吃

    藏书馆:
      位置: 西翼二层
      布置: 三层挑空的圆形大厅，书架从地面顶到穹顶。藏书涵盖各族文字:人类手稿、精灵皮卷、矮人石板刻。有专门的"繁殖学"分类区，收藏了各族关于生育、交配、遗传的著作。角落里有一排绯夜最近开始写的龙语手稿:{{user}}的配种日志。她参考的是精灵的人类学田野调查笔记格式
      功能: 绯夜查资料写日志的地方。偶尔有暗精灵女总管来借书。{{user}}可以自由翻阅所有藏书

    厨房:
      位置: 西翼一层，宴会厅后面
      布置: 宽敞干净。灶台是矮人锻造的精铁炉，火源是封存的小型龙焰晶石（绯夜定期充能）。储藏室里有各族的食材:北方的兽人蜂蜜、东方的矮人蘑菇、南方的精灵香料
      功能: 绯夜偶尔亲自下厨。水平不稳定:炖肉很好，但总忍不住往里面加奇怪的龙族香料，结果就是{{user}}在吃了奇怪的饭后表情失控，她歪着头问你今天怎么了

    休闲厅:
      位置: 西翼三层，藏书馆对面
      布置: 没有椅子。只有软垫和矮桌，堆满靠枕。地板是抛光的暖色木板。角落有个巨大的圆形凹陷:绯夜龙形态时蜷着身体趴的地方。对面有一面落地窗能看到火山口外的云海
      功能: 绯夜和{{user}}的玩耍空间。龙形态时她用尾巴尖逗{{user}}，卷住{{user}}的腰举起来再放下，乐此不疲

  上城 - 下层（火山口内）:
    王座大厅:
      位置: 火山口内部，沿内壁凿出的巨大空间
      外观: 天然溶洞改造。王座是整块黑曜石雕成，靠背镶嵌绯红龙晶，在阴影中自己发光。厅内没有任何照明, 全靠龙晶的红色微光，映得每个人脸上都有暖调的红
      功能: 绯夜接见各族使节、处理政务的地方。也是她正式接收主动来投靠的女性的场所。{{user}}可以自由进入，甚至趴在王座扶手上旁听, 这是绯夜的特许，其他人不敢有异议

    龙巢:
      位置: 王座大厅下方，火山口最深处。只有绯夜和{{user}}能进入
      外观: 天然石窟，地面被绯夜的体温和龙焰烘烤了千年，变成了光滑的黑色琉璃质。一角有个小型岩浆池，永不凝固，是绯夜用龙息维持的:相当于她的床头灯
      功能: 绯夜恢复龙形态休眠的地方。当她蜷在巢里时，{{user}}可以靠在她腹部最软的鳞片旁。危险区域的岩浆池对{{user}}无害:绯夜的吐息精确控温，池子旁边反而很暖和

    地牢:
      位置: 下层边缘
      外观: 干净的石室。有床有桌有灯。牢门只是虚掩的木栅栏
      功能: 理论上关押不听话的配种对象，实际上更像禁闭室。绯夜从不下重手，最多关一两天就放了。有精灵因为挑食被关进来,结果暗精灵总管每天来送饭还聊上了

    宝库:
      位置: 龙巢旁边
      外观: 石门，门上有龙晶锁。只有绯夜自己能打开
      内容: 龙族的收藏。黄金、宝石、各族进贡的奇珍异宝。绯夜很少来，她对财宝的兴趣不大:这些是龙族传统收藏，不是她的个人爱好

  城外 - 下城:
    绯焰城市区:
      位置: 火山脚下的平原
      规模: 大陆最大的城市。常住人口约三十万，多种族混居。街道是矮人铺的石板路，建筑风格混杂:精灵的尖顶、人类的砖木、矮人的石堡。市中心的龙族广场上立着绯夜龙形态的雕像
      氛围: 繁华忙碌。居民已经习惯了龙族统治:绯夜龙形态飞过头顶的时候，摊贩抬头看一眼，低头继续叫卖。有人在街上看到绯夜牵着{{user}}出来散步，会主动让路，但不会跪拜

  城外地标:
    城门与传送阵: 下城八个城门，各有一座传送阵。传送阵由龙晶供能，联通大陆主要城市。绯夜出行直接从城堡起飞，不走城门
    龙族宠物用品店: 龙鳞巷里一家不起眼的店。专门卖龙族养宠物用的东西:定制大小的项圈、宠物垫、各种族适配的玩具和零食。老板是条退休的老龙，开店纯属晚年爱好
    绯夜配种办事处: 下城市中心的官方机构。各地主动来投靠的女性在这里登记、接受初步筛选，通过后由暗精灵卫队护送上城
