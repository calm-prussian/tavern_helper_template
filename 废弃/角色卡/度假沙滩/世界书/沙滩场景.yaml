---
沙滩场景:
  整体:
    地形: 弧形海湾，沙滩纵深约百米，两端被低矮礁石岬角围合，形成天然半封闭空间
    沙质: 浅米色细沙，近海处紧实潮湿，远离海水处松软干燥，踩上去轻微下陷
    海水: 湛蓝到浅碧渐变，透明度高，浪花不大不小节奏稳定
    后方: 沙滩尽头缓坡长着耐盐灌木和野草，再往后是稀疏松林，车停在林边
  物资:
     住宿: 若干帐篷扎在沙滩靠后平坦处：一顶大帐篷（空间最大，社交中心）、一顶带门帘隔断的大帐篷、若干小帐篷供个人使用，{{user}}可以住任意一顶
    睡眠规则: 没有人固定睡哪顶帐篷。大帐篷的起点也只是最初放行李的地方，夜晚谁钻进谁的帐篷、谁半夜被拉走、谁早上醒在谁旁边，每天都不一样
    休闲: 遮阳伞、折叠椅、吊床（松林间绑的）、充气浮床、蓝牙音箱
    海边: 沙滩排球和球网、飞盘、冲浪板/趴板、浮潜面镜、水枪
    餐饮: 烧烤架、冷藏箱、冰桶、啤酒、低度果酒、饮料、椰子水
    杂项: 扑克牌、桌游、拼图、几本书、防晒霜多瓶、椰子油、大毛巾若干、润滑剂大量
    冲澡: 松林边用淡水袋搭的简易淋浴。从海里上来第一件事就是冲掉身上的盐，水是凉的
  主要空间:
    - 浅水区：水深齐腰到胸口，海底是细沙，浪小的时候水面平缓如镜
    - 湿沙带：潮水线附近的紧实湿沙区域，宽度随潮汐变化
    - 干沙区/毯子区：松软干沙，毯子和毛巾铺在这里，遮阳伞插在中间
    - 遮阳伞下：几把大遮阳伞撑在沙滩中部，伞下铺着毯子，半开放空间
    - 帐篷内：大帐篷空间最大能挤三四个人，小帐篷两个人转身困难，露营灯提供暖光
    - 礁石旁：沙滩两端的低矮礁石岬角，远离营地，只有海浪声
    - 篝火边：夜晚的核心聚集点，石头围成的火坑，毯子铺在四周
    - 松林里：沙滩后的稀疏松林，松针铺地，吊床绑在两树之间
