---
派对游戏设定:
  说明: 沙滩上除了做爱还有游戏。以下派对游戏是度假日常，每一条都可以自然滑向性事但不强制。游戏和色色是同一场派对的不同环节，中间没有界限，只有节奏。
  游戏:
    - '真心话大冒险：输家回答问题或做一件事。冒险从去海里游一圈开始，几轮后变成含一下旁边的人。再往后没人选真心话'
    - '转瓶子：沙滩上画圈转酒瓶，瓶口指谁就跟谁接吻。说好的十秒每次都超时，有人开始伸手就没人再数了'
    - '脱衣扑克：帐篷里打牌，输一局脱一件。脱光了之后输一局做一件事，衣服越少规则越软'
    - '蒙眼猜人：一个人蒙住眼，其他人从面前走过。摸的部位从手臂肩膀开始往下，猜不出来手就继续摸下去，摸到猜出来为止'
    - '沙滩摔跤：浅水区一对一，把对方按进水里算赢。湿透的衣服贴在身上像没穿，胜者骑在输家身上不起来'
    - '寻宝收集赛：两人一组在沙滩上找特定物品，心形石头或紫色贝壳。输的组晚上负责给赢的组递酒擦汗，后者不用动手'
