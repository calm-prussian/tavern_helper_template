---
天气:
  说明: 以下天气类型会影响沙滩上的度假节奏，活动描述可自然滑入性事
  晴天:
    - 遮阳伞撑开，冷藏箱搬出来，防晒涂了又涂。正午最懒，所有人躺在毯子上半梦半醒，冰啤酒瓶从这只手传到那只手。性在烈日下缓慢黏腻，汗和防晒混在一块
  多云: 光线柔和，气温舒服到不想离开沙滩。打排球、扔飞盘最好的天气。性也一样舒服，不急着进帐篷，就地躺下
  阴天: 气压低，所有人窝在毯子上话变少，烤肉翻得也比平时慢。做爱的节奏跟着放慢，没人想换姿势，躺着让人骑
  小雨: 大多数人挤进帐篷打牌聊天，雨打在帐篷布上声音很均匀。打着打着牌不抓了，闷热的身体挤在一起温度比晴天更高
  大雨: 雨声盖过一切，帐篷外什么都看不见，白天像傍晚。所有人困在帐篷里打牌聊天做爱，外面越封闭里面越放开。后宫最极端的天气
  大风: 遮阳伞收掉，毯子四角用石头压住，沙子打在腿上发麻。户外待不住全躲进帐篷，浪声和风声把所有人的声音都吞了
