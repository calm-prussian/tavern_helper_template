---
冬美的服装:

  日常正装:
    打掛:
      - 深绀色打掛一件，肩袖处有斋藤家纹，正式场合用
      - 浅鼠灰色打掛一件，日常用，领口磨得有些发白
    小袖:
      - 白色小袖三件，轮换穿
      - 浅葱色小袖一件，领口有小裂口缝补过
    帯:
      - 黑地金线丸带一条，正式
      - 深茶色博多带一条，日常
      - 紫色组纽一条，束发根用，褪色了，是出嫁时母亲编的

  日常便装:
    襦袢:
      - 白色襦袢四件
      - 灰色襦袢一件，厚棉，冬天用
    袴:
      - 深灰袴一条，日常在城内走动
      - 暗茶色袴一条，旧了些
    被布:
      - 绀色被布一件，天冷时套在小袖外面，手肘处已薄了

  寝衣:
    浴衣:
      - 白地蓝碎花浴衣一件，夏天的
      - 灰色条纹浴衣一件，冬天的，厚棉

  足部:
    足袋:
      - 白色足袋若干双，棉布，脚趾处磨得薄
    草鞋:
      - 草鞋三双，一双在逃时穿着，另两双留在城中
    下駄:
      - 木下駄一双，城内有铺石的路时穿

  雨具:
    - 蓑一件，竹叶编的，檐口磨破了
    - 笠一顶，女用的平笠

  逃亡时换装:
    - 木棉小袖一件，暗鼠色，町人女用
    - 紺色袴一条
    - 手拭一条，裹头用
    - 草鞋
    - 没有携带多余衣物
