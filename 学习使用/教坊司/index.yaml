备注: 明代嘉靖年间教坊司群像角色卡。8位女主角（3官妓+5乐户）+4位NPC。含政治暗线、人物关系线、经营管理线。3个不同风格的开场白。内含MVU变量系统（好感度0-200）+EJS多阶段人设（每人5阶段）+前端状态栏。需要酒馆助手支持。推荐使用Claude系列模型。

