  酒馆助手:
    脚本库:
      - 名称: MVUbeta
        id: 86f44028-eba4-4c8a-b3c2-7f2202a2406e
        启用: true
        类型: 脚本
        内容: import
          'https://testingcf.jsdelivr.net/gh/MagicalAstrogy/MagVarUpdate@beta/artifact/bundle.js'
        按钮:
          启用: true
          按钮列表:
            - 名称: 重新处理变量
              可见: true
            - 名称: 重新读取初始变量
              可见: true
            - 名称: 清除旧楼层变量
              可见: false
            - 名称: 快照楼层
              可见: false
            - 名称: 重演楼层
              可见: false
            - 名称: 重试额外模型解析
              可见: true

      - 名称: 标签补全
        id: fd0487a1-49ab-4afa-9b5c-c79f5f6748d1
        启用: true
        类型: 脚本
        内容: $(()=>{toastr.success('思维链标签修复脚本已加载'),eventOn(tavern_events.MESSAGE_RECEIVED,async
          n=>{try{const e=getChatMessages(n);if(0===e.length)return;const
          i=e[0];if('assistant'!==i.role)return;let t=i.message;const
          s=t;t=function(n){if(!n.includes('<content>'))return n;let e=n;const
          i=(e.match(/<thinking>/g)||[]).length;if(0===i)e='<thinking>\n'+e;else
          if(1===i){if(!e.trimStart().startsWith('<thinking>')){const
          n=e.indexOf('<thinking>'),i=e.slice(0,n).trimStart(),t=e.slice(n);e=t+(i?'\n'+i:'')}}else
          if(e.trimStart().startsWith('<thinking>')){const
          n=e.indexOf('<thinking>'),i=e.slice(0,n+10),t=e.slice(n+10);e=i+t.replace(/<thinking>/g,'')}else
          e=e.replace(/<thinking>/g,''),e='<thinking>\n'+e;const
          t=(e.match(/<\/thinking>/g)||[]).length,s=e.indexOf('<content>');if(0===t)e=e.slice(0,s)+'</thinking>\n'+e.slice(s);else
          if(1===t){if(e.indexOf('</thinking>')>s){e=e.replace('</thinking>','');const
          n=e.indexOf('<content>');e=e.slice(0,n)+'</thinking>\n'+e.slice(n)}}else{const
          n=e.indexOf('</thinking>');if(n<s){const
          i=e.slice(0,n+11),t=e.slice(n+11);e=i+t.replace(/<\/thinking>/g,'')}else{e=e.replace(/<\/thinking>/g,'');const
          n=e.indexOf('<content>');e=e.slice(0,n)+'</thinking>\n'+e.slice(n)}}const
          c=(e.match(/<thinking>/g)||[]).length,g=(e.match(/<\/thinking>/g)||[]).length;if(1!==c||1!==g)return
          console.warn('[思维链标签修复] 修复后 thinking 标签数量不正确，保持原内容'),n;const
          l=e.indexOf('<thinking>'),o=e.indexOf('</thinking>'),r=e.indexOf('<content>');if(l>o||o>r)return
          console.warn('[思维链标签修复] 修复后标签顺序不正确，保持原内容'),n;return
          e}(t),t=function(n){const
          e=n.indexOf('<thinking>'),i=n.indexOf('</thinking>');if(-1===e||-1===i)return
          n;const
          t=n.slice(0,e+10),s=n.slice(e+10,i),c=n.slice(i),g=s.replace(/<[\\/]*UpdateVariable[\\/]*>/gi,'');return
          t+g+c}(t),t!==s&&(await
          setChatMessages([{message_id:n,message:t}],{refresh:'affected'}),console.log(`[思维链标签修复]
          已修复第 ${n} 楼的标签`))}catch(n){console.error('[思维链标签修复]
          处理消息时出错:',n)}}),console.log('[思维链标签修复]
          脚本初始化完成')}),$(window).on('pagehide',()=>{console.log('[思维链标签修复]
          脚本已卸载')});

      - 名称: MVU变量结构
        id: 05665171-5a68-489a-a526-77f99dab63b1
