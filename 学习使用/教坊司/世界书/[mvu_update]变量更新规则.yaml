---
变量更新规则:
  世界:
    当前时间:
      format: 嘉靖${N}年${M}月${D}日 ${时辰}
      check:
        - 每次事件推进、休息或场景切换后更新
        - 时辰使用十二时辰制（子丑寅卯辰巳午未申酉戌亥）
        - 日常事件推进约半个时辰到一个时辰
        - 宴饮通常在戌时开始，持续一到两个时辰
    当前地点:
      check:
        - 场景转换时更新
        - 使用教坊内具体地点名（前院、接待厅、练功厅、乐户住所、官妓住所、诊室、后墙根、奉銮值房等）或教坊外地点

  ${柳如烟|沈玉书|赵蘅芜|苏小鸢|谢芸娘|白鹭|傅采薇|阿依}.好感度:
    type: number
    range: 0~200
    check:
      - update it by ±(2~8) according to the character's attitude towards {{user}}'s behavior in the current reply
      - only characters who are present in the scene or aware of {{user}}'s actions should be updated
      - 善意、尊重、保护行为加好感；冒犯、强迫、无视行为减好感
      - 每个角色有不同的偏好和禁区，好感变化应反映个体差异
      - 触碰角色标志性物件或底线时大幅减少（-10~-20）
      - 重大事件（救人、赎身、揭露真相等）可一次性变化 ±(10~25)
      - 柳如烟：不带目的的善意加好感最多；沈玉书：尊重学识加好感；赵蘅芜：帮寻女儿消息大幅加好感；苏小鸢：真诚陪伴加好感；谢芸娘：让她不用替别人扛加好感；白鹭：不像锦衣卫的行为加好感；傅采薇：不附条件的善意加好感；阿依：尊重苗疆文化加好感

  ${柳如烟|沈玉书|赵蘅芜|苏小鸢|谢芸娘|白鹭|傅采薇|阿依}.当前想法:
    check:
      - 反映角色对{{user}}最近行为或当前局势的内心想法
      - 用角色自己的口吻和用词习惯
      - 15~30字，简短有力
      - 只在角色出场或被{{user}}行为影响时更新
      - 柳如烟用算计口吻；沈玉书用克制文雅口吻；赵蘅芜用温和实在口吻；苏小鸢用活泼川味口吻；谢芸娘用轻柔口吻；白鹭用短硬口吻；傅采薇用精明口吻；阿依用带口音口吻

  ${孙嬷嬷|钱嬷嬷|林大夫|周红缨}.好感度:
    type: number
    range: 0~200
    check:
      - update it by ±(2~6) based on {{user}}'s management decisions and behavior
      - 孙嬷嬷：善待乐户尤其苏小鸢时加好感
      - 钱嬷嬷：不偏不倚、做事利落时加好感
      - 林大夫：尊重医术、关心女子健康时加好感
      - 周红缨：公正执法、不徇私时加好感
